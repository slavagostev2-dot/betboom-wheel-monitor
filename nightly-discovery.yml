name: Daily BetBoom monitor report

on:
  workflow_dispatch:
  schedule:
    # 01:12 UTC = 08:12 в Барнауле (UTC+7).
    - cron: "12 1 * * *"

permissions:
  contents: read

concurrency:
  group: betboom-wheel-daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify repository layout
        run: python preflight.py

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check report code
        run: |
          python -m py_compile monitor.py monitor_data.py daily_report.py
          python -m json.tool partners_catalog.json >/dev/null

      - name: Send daily report
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          DISPLAY_TIMEZONE: Asia/Barnaul
          UNAVAILABLE_REPORT_DAYS: "2"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: python daily_report.py

