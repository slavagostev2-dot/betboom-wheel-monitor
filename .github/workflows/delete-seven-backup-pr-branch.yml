name: Delete seven backup validation branch

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete:
    if: ${{ github.event.pull_request.head.ref == 'seven-backup-finalize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Delete technical validation branch
        shell: bash
        run: |
          set -euo pipefail
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/seven-backup-finalize"
