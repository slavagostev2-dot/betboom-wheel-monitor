name: Diagnose live VK delivery

on:
  push:
    branches:
      - diag/vk-live-delivery-20260721
    paths:
      - ".github/workflows/diag-vk-live-delivery.yml"

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main production code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          persist-credentials: false

      - name: Inspect zonertg12 delivery path
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          vk_runs="$(gh run list --repo "$GH_REPO" --workflow vk-wheel-notification.yml --limit 20 --json databaseId,status,conclusion,createdAt,updatedAt,event,headSha,url)"
          latest_vk="$(printf '%s' "$vk_runs" | jq '.[0] // {}')"
          vk_count_since_midnight="$(printf '%s' "$vk_runs" | jq '[.[] | select(.createdAt >= "2026-07-21T00:00:00Z")] | length')"

          monitor_runs="$(gh run list --repo "$GH_REPO" --workflow monitor.yml --limit 20 --json databaseId,status,conclusion,createdAt,updatedAt,event,headSha,url)"
          monitor_file="$(mktemp)"
          printf '%s' "$monitor_runs" | jq -r '.[] | select(.createdAt >= "2026-07-21T07:30:00Z") | .databaseId' | while read -r run_id; do
            [[ -z "$run_id" ]] && continue
            echo "===== MONITOR RUN $run_id =====" >> "$monitor_file"
            gh run view "$run_id" --repo "$GH_REPO" --log 2>&1 \
              | grep -Ei -C 12 'zonertg12|VK wheel notification|workflow scheduled|WARNING VK|freestream/zonertg12|новое колесо|активное колесо' \
              | tail -n 260 >> "$monitor_file" || true
          done

          ledger_result="$(python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          ledger=json.loads(Path('notification_delivery_state.json').read_text(encoding='utf-8'))
          entries=set((ledger.get('entries') or {}).keys())
          variants=[]
          for ident in ('zonertg12','ZONERTG12','Zonertg12'):
              raw='\x1f'.join(['vk:wheel-notifications','wheels',f'wheel:wheels:{ident}:detected',f'https://betboom.ru/freestream/{ident}'])
              key=hashlib.sha256(raw.encode('utf-8')).hexdigest()
              variants.append(f'{ident}={key in entries}')
          print(', '.join(variants))
          PY
          )"

          subscriber_summary="$(python3 - <<'PY'
          import os
          import vk_dynamic_subscribers as vk
          token=os.environ.get('VK_GROUP_TOKEN','').strip()
          if not token:
              print('token_missing')
          else:
              try:
                  peers=vk.conversation_peer_ids(token)
                  print(f'writable_user_conversations={len(peers)}')
              except Exception as exc:
                  print(f'error={type(exc).__name__}: {exc}')
          PY
          )"

          body="$(mktemp)"
          {
            echo '## zonertg12 VK delivery path'
            echo
            echo "VK workflow runs since 2026-07-21 00:00 UTC: $vk_count_since_midnight"
            echo "Latest VK workflow: $latest_vk"
            echo "VK subscriber check: $subscriber_summary"
            echo "VK dedupe key present for zonertg12: $ledger_result"
            echo
            echo '### Monitor log evidence'
            echo '```text'
            cat "$monitor_file"
            echo '```'
          } > "$body"
          gh issue edit 111 --repo "$GH_REPO" --title "zonertg12 VK delivery path" --body-file "$body"
