name: Telegram transport checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "telegram_transport.py"
      - "telegram_post_links_v2.py"
      - "recurring_wheel_events.py"
      - "bbvg_monitor_main.py"
      - ".github/workflows/telegram-resilience-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate telegram.me transport layer
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: |
          python -m py_compile telegram_transport.py telegram_post_links_v2.py recurring_wheel_events.py bbvg_monitor_main.py monitor.py monitor_data.py bbvg_monitor_runtime.py
          python telegram_transport.py
          python telegram_post_links_v2.py
          python recurring_wheel_events.py
          python - <<'PY'
          import bbvg_monitor_main as runtime
          import recurring_wheel_events
          import telegram_post_links_v2
          import telegram_transport

          assert runtime.monitor.fetch_all_sources.__module__ == "telegram_transport"
          assert runtime.monitor.fetch_public_channel.__module__ == "telegram_post_links_v2"
          assert runtime.monitor._bbvg_telegram_transport_installed is True
          assert runtime.monitor._bbvg_telegram_button_links_installed is True
          assert runtime.monitor._bbvg_recurring_wheel_events_installed is True
          assert runtime.monitor.FRESH_UNKNOWN_POST_MINUTES >= 360
          assert runtime.monitor.TELEGRAM_WEB_DOMAIN == "telegram.me"
          assert telegram_transport.public_source_url("test") == "https://telegram.me/s/test"
          assert telegram_transport.rewrite_telegram_url("https://t.me/test/1") == "https://telegram.me/test/1"
          assert telegram_transport.is_transient_transport_error(
              "NameResolutionError: Failed to resolve telegram.me"
          )
          assert telegram_post_links_v2.MINIMUM_FRESH_UNKNOWN_MINUTES == 360

          messages = runtime.monitor.fetch_public_channel("jestercast")
          post = next((message for message in messages if message.message_id == 1516), None)
          assert post is not None, "Live @jestercast post 1516 is missing from public preview"
          assert "https://betboom.ru/freestream/cct1" in runtime.monitor.extract_links(post.text)
          print("telegram.me recurring-event parser found @jestercast/1516 cct1")
          PY
