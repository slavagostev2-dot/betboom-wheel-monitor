name: Telegram transport checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "telegram_transport.py"
      - "bbvg_monitor_main.py"
      - ".github/workflows/telegram-resilience-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-requested-source:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read @jestercast public preview
        run: |
          python - <<'PY'
          import html
          import json
          import re
          import urllib.request

          request = urllib.request.Request(
              "https://telegram.me/s/jestercast",
              headers={"User-Agent": "Mozilla/5.0"},
          )
          page = urllib.request.urlopen(request, timeout=30).read().decode("utf-8", "replace")
          posts = list(re.finditer(r'data-post="(jestercast/\d+)"', page))
          rows = []
          for index, match in enumerate(posts):
              end = posts[index + 1].start() if index + 1 < len(posts) else len(page)
              segment = html.unescape(page[match.start():end])
              links = sorted(set(re.findall(
                  r'https?://(?:www\.)?betboom\.ru/freestream/[A-Za-z0-9._~-]+',
                  segment,
                  flags=re.I,
              )))
              if not links:
                  continue
              date = re.search(r'<time[^>]+datetime="([^"]+)"', segment)
              rows.append({
                  "post": match.group(1),
                  "date": date.group(1) if date else "",
                  "links": links,
              })
          print("JESTERCAST_WHEEL_POSTS=" + json.dumps(rows, ensure_ascii=False))
          assert rows, "@jestercast has no BetBoom wheel links in the public preview"
          PY

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate telegram.me transport layer
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: |
          python -m py_compile telegram_transport.py bbvg_monitor_main.py monitor.py monitor_data.py bbvg_monitor_runtime.py
          python telegram_transport.py
          python - <<'PY'
          import bbvg_monitor_main as runtime
          import telegram_transport

          assert runtime.monitor.fetch_all_sources.__module__ == "telegram_transport"
          assert runtime.monitor._bbvg_telegram_transport_installed is True
          assert runtime.monitor.TELEGRAM_WEB_DOMAIN == "telegram.me"
          assert telegram_transport.public_source_url("test") == "https://telegram.me/s/test"
          assert telegram_transport.rewrite_telegram_url("https://t.me/test/1") == "https://telegram.me/test/1"
          assert telegram_transport.is_transient_transport_error(
              "NameResolutionError: Failed to resolve telegram.me"
          )
          print("telegram.me transport integration passed")
          PY
