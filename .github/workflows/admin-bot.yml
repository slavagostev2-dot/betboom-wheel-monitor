name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "control_center_release.txt"
      - ".github/workflows/admin-bot.yml"
      - "notification_button_recovery.py"
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: read

jobs:
  validate-control-center:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      # BEGIN PARTICIPATION_HOTFIX
      - name: Integrate participation hotfix once
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          panel_path = Path("admin_panel_runtime_v41.py")
          panel = panel_path.read_text(encoding="utf-8")
          if "import hashlib\n" not in panel:
              panel = panel.replace("import argparse\nimport html\n", "import argparse\nimport hashlib\nimport html\n", 1)
          old = '''    def _mark_personal_from_notification(self, query: dict[str, Any]) -> None:\n        data = str(query.get("data") or "")\n        token = data.split(":", 2)[2]\n        context = self.snapshot().state.get("button_contexts", {}).get(token)\n        if not isinstance(context, dict):\n            raise ValueError("Контекст кнопки устарел")\n        key = str(context.get("wheel_key") or context.get("identifier") or "").casefold()\n        if not key:\n            raise ValueError("Не удалось определить колесо")\n        self.mark_personal_participation(key)\n'''
          new = '''    @staticmethod\n    def _notification_button_token(key: str, entry: dict[str, Any]) -> str:\n        normalized = str(key or entry.get("wheel_key") or entry.get("identifier") or "").casefold()\n        source = str(entry.get("source") or "").strip().casefold()\n        try:\n            message_id = int(entry.get("message_id") or 0)\n        except (TypeError, ValueError):\n            message_id = 0\n        if not normalized or not source or message_id <= 0:\n            return ""\n        raw = f"{source}:{message_id}:{normalized}"\n        return hashlib.sha256(raw.encode("utf-8")).hexdigest()[:14]\n\n    def _mark_personal_from_notification(self, query: dict[str, Any]) -> None:\n        data = str(query.get("data") or "")\n        token = data.split(":", 2)[2]\n        snap = self.snapshot()\n        state = snap.state if isinstance(getattr(snap, "state", None), dict) else {}\n        context = state.get("button_contexts", {}).get(token)\n        if isinstance(context, dict):\n            key = str(context.get("wheel_key") or context.get("identifier") or "").casefold()\n            if not key:\n                raise ValueError("Не удалось определить колесо")\n            self.mark_personal_participation(key)\n            return\n\n        matches: list[str] = []\n        active = state.get("active_wheels")\n        if isinstance(active, dict):\n            for key, raw in active.items():\n                if not isinstance(raw, dict):\n                    continue\n                normalized = str(key).casefold()\n                stored = str(raw.get("button_token") or "")\n                computed = self._notification_button_token(normalized, raw)\n                if token and token in {stored, computed}:\n                    matches.append(normalized)\n        unique = sorted(set(matches))\n        if len(unique) != 1:\n            raise ValueError("Контекст кнопки устарел")\n        self.mark_personal_participation(unique[0])\n'''
          if old in panel:
              panel = panel.replace(old, new, 1)
          elif "def _notification_button_token" not in panel:
              raise SystemExit("notification callback block not found")

          anchor = '    assert ("delete", "bb:p:token") in events\n\n'
          insertion = '''    assert ("delete", "bb:p:token") in events\n\n    events.clear()\n    panel.snapshot = lambda force=False: type(  # type: ignore[method-assign]\n        "Snap",\n        (),\n        {\n            "state": {\n                "button_contexts": {},\n                "active_wheels": {\n                    "hooch07": {\n                        "source": "hoochcs2",\n                        "message_id": 2198,\n                        "identifier": "hooch07",\n                    }\n                },\n            }\n        },\n    )()\n    panel._mark_personal_from_notification({"data": "bb:p:cba7abb40c5b77"})\n    assert ("participate", "hooch07") in events\n\n'''
          if "bb:p:cba7abb40c5b77" not in panel:
              if anchor not in panel:
                  raise SystemExit("notification callback self-test anchor not found")
              panel = panel.replace(anchor, insertion, 1)
          panel_path.write_text(panel, encoding="utf-8")

          agents_path = Path("AGENTS.md")
          agents = agents_path.read_text(encoding="utf-8")
          old_agents = '- Автоучастие: `auto_participation_worker.py` обрабатывает сохранённые event-запросы; `auto_participation_recovery.py` независимо пересканирует свежие публикации текущего `public_sources.txt`, сверяет ссылки с BetBoom API и восстанавливает потерянные active/event записи; `betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия.\n'
          new_agents = '- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку, но не отправляет пользователю окончательное сообщение о неудаче до independent recovery; `auto_participation_recovery.py` пересканирует свежие публикации текущего `public_sources.txt`, сверяет ссылки с BetBoom API, делает финальную browser-попытку, восстанавливает потерянные active/event и callback-context записи и только после собственной неудачи отправляет предупреждение о ручном участии; `betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия.\n'
          if old_agents in agents:
              agents = agents.replace(old_agents, new_agents, 1)
          elif new_agents not in agents:
              raise SystemExit("AGENTS auto participation line not found")
          agents_path.write_text(agents, encoding="utf-8")

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          title = "## 2026-07-21 — Исправлены ложная ошибка автоучастия и кнопка «Участвую»"
          if title not in changelog:
              insert_at = changelog.find("\n## ")
              if insert_at < 0:
                  raise SystemExit("changelog insertion point not found")
              entry = '''\n## 2026-07-21 — Исправлены ложная ошибка автоучастия и кнопка «Участвую»\n\n- Реальный инцидент `hooch07`: recovery подтвердил участие BetBoom после нажатия, но первая event-попытка успела отправить ложное предупреждение о неудаче. Теперь event-worker откладывает failure-alert, а окончательное предупреждение разрешено только после неудачи независимого recovery.\n- Recovery восстанавливает `button_contexts` и `button_token` для active-wheel, если состояние колеса пришлось восстановить после уже доставленного Telegram-уведомления.\n- `admin_panel_runtime_v41.py` умеет восстановить wheel-key старой кнопки `bb:p:<token>` по стабильной формуле `source + message_id + wheel_key`, поэтому уже отправленная кнопка остаётся рабочей даже при утрате `button_contexts`.\n- Временный helper `notification_button_recovery.py` удалён: ответственность оставлена в действующем production entrypoint, без новой runtime-прослойки.\n'''
              changelog = changelog[:insert_at] + entry + changelog[insert_at:]
              changelog_path.write_text(changelog, encoding="utf-8")

          workflow_path = Path(".github/workflows/admin-bot.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          workflow = workflow.replace('      - "notification_button_recovery.py"\n', '', 1)
          validation = '''      - name: Validate notification participation recovery\n        env:\n          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}\n          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}\n          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}\n          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}\n          BBVG_TEST_MODE: "1"\n        run: python notification_button_recovery.py --self-test\n\n'''
          workflow = workflow.replace(validation, '', 1)
          workflow = workflow.replace('        run: python notification_button_recovery.py\n', '        run: python admin_panel_runtime_v41.py\n', 1)
          begin = workflow.find("      # BEGIN PARTICIPATION_HOTFIX\n")
          end_marker = "      # END PARTICIPATION_HOTFIX\n"
          end = workflow.find(end_marker)
          if begin >= 0 and end >= 0:
              workflow = workflow[:begin] + workflow[end + len(end_marker):]
          workflow_path.write_text(workflow, encoding="utf-8")

          Path("notification_button_recovery.py").unlink(missing_ok=True)
          Path(".github/workflows/participation-hotfix-temp.yml").unlink(missing_ok=True)
          PY

          python admin_panel_runtime_v41.py --self-test
          python -m py_compile auto_participation_worker.py auto_participation_recovery.py admin_panel_runtime_v41.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить финальный результат автоучастия и кнопку Участвую"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
      # END PARTICIPATION_HOTFIX

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate candidate Control Center release
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: bash scripts/validate_control_center.sh

      - name: Validate notification participation recovery
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: python notification_button_recovery.py --self-test

      - name: Verify configured AI provider
        env:
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "natural_language_admin"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          from bbvg.ai_core import AIConfig
          config = AIConfig.from_env()
          assert config.provider in {"gemini", "openai"}, "Unsupported BBVG_AI_PROVIDER"
          assert config.model, "BBVG_AI_MODEL is empty"
          assert config.provider_configured(), "Selected AI provider key is missing"
          print(f"AI provider configured: {config.provider}/{config.model}")
          PY

      - name: Preserve role fingerprint and migrate state
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          access = bot_private_state.load_file().get("access", {})
          roles = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          Path("/tmp/bbvg_roles_before.json").write_text(
              json.dumps(roles, ensure_ascii=False, sort_keys=True), encoding="utf-8"
          )
          PY
          python migrate_bot_private_state.py
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          before = json.loads(Path("/tmp/bbvg_roles_before.json").read_text(encoding="utf-8"))
          access = bot_private_state.load_file().get("access", {})
          after = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          assert after == before, "State migration changed Telegram roles"
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(bot_private_state.enc.json)
          if ! git diff --quiet -- "${files[@]}"; then
            git add "${files[@]}"
            git commit -m "Migrate BB V.G. private state [skip ci]"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            done
          fi

  control-center:
    needs: validate-control-center
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: bb-vg-telegram-admin-panel
      cancel-in-progress: true

    steps:
      - name: Checkout validated repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime, timezone

          try:
              encrypted = json.load(open("bot_private_state.enc.json", encoding="utf-8"))
          except Exception:
              encrypted = {}
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          head_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          assert len(head_sha) == 40, "Unable to resolve panel production SHA"
          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "last_heartbeat_at": datetime.now(timezone.utc).isoformat(),
              "run_id": run_id,
              "workflow_run_id": run_id,
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "head_sha": head_sha,
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 41,
              "heartbeat_version": 1,
              "runtime_owner": "telegram_control_center",
              "update_consumer": "single_getUpdates_owner",
              "storage": "encrypted_bot_state",
              "state_format": encrypted.get("format", "unknown"),
              "state_key_mode": encrypted.get("key_mode", "unknown"),
              "role_persistence": "aes_gcm_three_way_remote_merge",
              "notification_integrity": "persistent_hmac_delivery_ledger",
              "notification_button_recovery": "active_wheel_token_fallback",
              "source_rating": "administrator_decisions_additive_finished_and_participating",
              "summary_delivery": "direct_in_process",
              "wheel_colors": "callback_payload_unchanged",
              "wheel_link_lifecycle": "timer_or_manual_deadline_else_two_hours",
              "scenario_suite": "10_scenarios_passed",
              "deferred_update": "none",
              "miniapp": "archived",
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Run BB V.G. control center v41
        id: run_panel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "natural_language_admin"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python notification_button_recovery.py

      - name: Start replacement control-center shift
        if: ${{ always() && steps.run_panel.outcome != 'skipped' && steps.run_panel.outcome != 'cancelled' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          gh workflow run admin-bot.yml --ref main

# v41: Gemini/OpenAI configuration is verified before the live runtime is replaced.
