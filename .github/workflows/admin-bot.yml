name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "admin_bot.py"
      - "admin_action.py"
      - "admin_action_v2.py"
      - "admin_action_v3.py"
      - "admin_runtime.py"
      - "admin_panel_v2.py"
      - "admin_panel_runtime_v25.py"
      - "admin_panel_runtime_v26.py"
      - "admin_panel_runtime_v27.py"
      - "admin_panel_runtime_v28.py"
      - "admin_panel_runtime_v29.py"
      - "admin_panel_runtime_v30.py"
      - "admin_panel_runtime_v31.py"
      - "admin_panel_runtime_v32.py"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "bot_notification_state.py"
      - "migrate_bot_private_state.py"
      - "candidate_moderation.json"
      - "intelligence_state.json"
      - "requirements.txt"
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-telegram-admin-panel
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate bot-only control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: |
          set -euo pipefail
          python -m py_compile \
            admin_bot.py admin_action.py admin_action_v2.py admin_action_v3.py admin_runtime.py \
            admin_panel_v2.py admin_panel_runtime_v22.py admin_panel_runtime_v25.py \
            admin_panel_runtime_v26.py admin_panel_runtime_v27.py admin_panel_runtime_v28.py \
            admin_panel_runtime_v29.py admin_panel_runtime_v30.py admin_panel_runtime_v31.py \
            admin_panel_runtime_v32.py bot_private_state.py bot_notification_state.py \
            migrate_bot_private_state.py rating_policy.py
          python bot_private_state.py
          python migrate_bot_private_state.py --check
          python admin_action_v2.py --self-test
          python admin_action_v3.py --self-test
          python admin_panel_runtime_v25.py --self-test
          python admin_panel_runtime_v28.py --self-test
          python admin_panel_runtime_v29.py --self-test
          python admin_panel_runtime_v30.py --self-test
          python admin_panel_runtime_v31.py --self-test
          python admin_panel_runtime_v32.py --self-test
          python - <<'PY'
          import inspect
          from pathlib import Path
          from admin_panel_runtime_v28 import TelegramPanelRuntimeV28
          from admin_panel_runtime_v32 import TelegramPanelRuntimeV32

          def callbacks(rows):
              return [button.get("callback_data") for row in rows for button in row]

          admin_main = callbacks(TelegramPanelRuntimeV32.compact_menu_rows(True))
          user_main = callbacks(TelegramPanelRuntimeV32.compact_menu_rows(False))
          assert len(admin_main) == len(set(admin_main))
          assert len(user_main) == len(set(user_main))
          assert set(admin_main) == {
              "page:active",
              "page:analytics",
              "page:sources",
              "page:settings",
              "page:control",
          }
          assert set(user_main) == {
              "page:active",
              "page:analytics",
              "page:sources",
              "page:settings",
          }
          assert "page:status" not in user_main
          assert "page:reports" not in admin_main

          analytics = inspect.getsource(TelegramPanelRuntimeV32.show_analytics)
          assert "summary:send" in analytics
          assert "page:report:inactive" in analytics
          assert "page:reports" not in analytics
          active = inspect.getsource(TelegramPanelRuntimeV32.show_active)
          assert "wheel:finished:" in active
          assert "sources_for_item" in active
          handler32 = inspect.getsource(TelegramPanelRuntimeV32.handle_callback)
          assert "confirm_finished_global" in handler32
          assert "candidate:defer:" in handler32

          control = callbacks(TelegramPanelRuntimeV32.control_menu_rows())
          assert "control:daily" not in control
          assert "page:status" in control

          admin_sources = callbacks(TelegramPanelRuntimeV32.source_menu_rows(True))
          user_sources = callbacks(TelegramPanelRuntimeV32.source_menu_rows(False))
          assert len(admin_sources) == len(set(admin_sources))
          assert len(user_sources) == len(set(user_sources))
          assert {"page:discovery", "page:intelligence", "source:add"} <= set(admin_sources)
          assert not {"page:discovery", "page:intelligence", "source:add"} & set(user_sources)
          assert "source:request" in user_sources

          handler = inspect.getsource(TelegramPanelRuntimeV28.handle_callback)
          assert "wheel:part:" in handler
          assert "wheel:inactive:" in handler
          assert "participate_wheel" in handler
          assert "mark_inactive_global" in handler
          persistence = inspect.getsource(TelegramPanelRuntimeV28._apply_admin_action_direct)
          assert "self.update_file" in persistence
          assert "git/ref/heads" not in persistence

          primary = [
              line.split("#", 1)[0].strip().lstrip("@")
              for line in Path("public_sources.txt").read_text(encoding="utf-8").splitlines()
              if line.split("#", 1)[0].strip()
          ]
          nightly = [
              line.split("#", 1)[0].strip().lstrip("@")
              for line in Path("source_catalog.txt").read_text(encoding="utf-8").splitlines()
              if line.split("#", 1)[0].strip()
          ]
          combined = [value.casefold() for value in primary + nightly]
          assert len(combined) == len(set(combined))
          assert combined.count("mariomaxtv") == 1
          assert combined.count("adekvatik") == 1
          assert combined.count("jestercast") == 1
          print("BB V.G. v32 compact lifecycle, analytics and source validation passed")
          PY
          python -m json.tool candidate_moderation.json >/dev/null

      - name: Restore and seal Telegram bot users
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          python migrate_bot_private_state.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- bot_private_state.enc.json; then
            echo "Encrypted Telegram bot state is already current."
            exit 0
          fi
          git add bot_private_state.enc.json
          git commit -m "Update encrypted Telegram bot state [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 32,
              "storage": "encrypted_bot_state",
              "miniapp": "archived",
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Run BB V.G. control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
        run: python admin_panel_runtime_v32.py

      - name: Start next control-center shift
        if: ${{ success() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run admin-bot.yml --ref main

# v32: compact active wheels, unified analytics and confirmed-finished rating.
