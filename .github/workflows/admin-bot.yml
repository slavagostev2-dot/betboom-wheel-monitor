name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "admin_bot.py"
      - "admin_action.py"
      - "admin_runtime.py"
      - "admin_panel_v2.py"
      - "admin_panel_runtime_v2.py"
      - "admin_panel_runtime_v3.py"
      - "admin_panel_runtime_v4.py"
      - "admin_panel_runtime_v5.py"
      - "admin_panel_runtime_v6.py"
      - "admin_panel_runtime_v7.py"
      - "admin_panel_runtime_v8.py"
      - "admin_panel_runtime_v9.py"
      - "admin_panel_runtime_v10.py"
      - "admin_panel_runtime_v11.py"
      - "admin_panel_runtime_v12.py"
      - "admin_panel_runtime_v13.py"
      - "admin_panel_runtime_v14.py"
      - "admin_panel_runtime_v15.py"
      - "admin_panel_runtime_v16.py"
      - "admin_panel_runtime_v17.py"
      - "admin_panel_runtime_v18.py"
      - "admin_panel_runtime_v19.py"
      - "admin_panel_runtime_v20.py"
      - "admin_panel_runtime_v21.py"
      - "admin_panel_runtime_v22.py"
      - "admin_panel_runtime_v23.py"
      - "private_state.py"
      - "private_state_deployment.json"
      - "sitecustomize.py"
      - "candidate_moderation.json"
      - "intelligence_state.json"
      - "requirements.txt"
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-telegram-admin-panel
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check private state deployment
        id: private_state
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          try:
              value = json.loads(Path('private_state_deployment.json').read_text(encoding='utf-8'))
          except Exception:
              value = {}
          ready = value.get('status') == 'deployed' and str(value.get('url') or '').startswith('https://')
          print(f"ready={'true' if ready else 'false'}")
          print(f"url={str(value.get('url') or '').rstrip('/')}")
          PY

      - name: Check BB V.G. control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: |
          python -m py_compile admin_bot.py admin_action.py admin_runtime.py admin_panel_v2.py admin_panel_runtime_v2.py admin_panel_runtime_v3.py admin_panel_runtime_v4.py admin_panel_runtime_v5.py admin_panel_runtime_v6.py admin_panel_runtime_v7.py admin_panel_runtime_v8.py admin_panel_runtime_v9.py admin_panel_runtime_v10.py admin_panel_runtime_v11.py admin_panel_runtime_v12.py admin_panel_runtime_v13.py admin_panel_runtime_v14.py admin_panel_runtime_v15.py admin_panel_runtime_v16.py admin_panel_runtime_v17.py admin_panel_runtime_v18.py admin_panel_runtime_v19.py admin_panel_runtime_v20.py admin_panel_runtime_v21.py admin_panel_runtime_v22.py admin_panel_runtime_v23.py private_state.py sitecustomize.py
          python admin_action.py --self-test
          python admin_panel_runtime_v3.py --self-test
          python admin_panel_runtime_v4.py --self-test
          python admin_panel_runtime_v5.py --self-test
          python admin_panel_runtime_v6.py --self-test
          python admin_panel_runtime_v7.py --self-test
          python admin_panel_runtime_v8.py --self-test
          python admin_panel_runtime_v9.py --self-test
          python admin_panel_runtime_v10.py --self-test
          python admin_panel_runtime_v11.py --self-test
          python admin_panel_runtime_v12.py --self-test
          python admin_panel_runtime_v13.py --self-test
          python admin_panel_runtime_v15.py --self-test
          python admin_panel_runtime_v16.py --self-test
          python admin_panel_runtime_v17.py --self-test
          python admin_panel_runtime_v18.py --self-test
          python admin_panel_runtime_v19.py --self-test
          python admin_panel_runtime_v20.py --self-test
          python admin_panel_runtime_v21.py --self-test
          python admin_panel_runtime_v22.py --self-test
          python admin_panel_runtime_v23.py --self-test
          python -m json.tool private_state_deployment.json >/dev/null
          python -m json.tool candidate_moderation.json >/dev/null
          python -m json.tool miniapp_deployment.json >/dev/null

      - name: Verify private state API
        if: steps.private_state.outputs.ready == 'true'
        env:
          PRIVATE_STATE_URL: ${{ steps.private_state.outputs.url }}
        run: curl -fsS --retry 5 --retry-delay 3 "$PRIVATE_STATE_URL/health"

      - name: Record panel status
        if: always()
        continue-on-error: true
        env:
          PRIVATE_STATE_READY: ${{ steps.private_state.outputs.ready }}
        shell: bash
        run: |
          set -uo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          ready = os.environ.get('PRIVATE_STATE_READY') == 'true'
          value = {
              'status': 'running' if ready else 'waiting_for_private_state',
              'brand': 'BB V.G.',
              'started_at': datetime.now(timezone.utc).isoformat(),
              'run_id': os.environ.get('GITHUB_RUN_ID', ''),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT', ''),
              'event': os.environ.get('GITHUB_EVENT_NAME', ''),
              'version': 23,
          }
          with open('admin_panel_status.json', 'w', encoding='utf-8') as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write('\n')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Run BB V.G. control center
        if: steps.private_state.outputs.ready == 'true'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
        run: python admin_panel_runtime_v23.py

      - name: Start next control-center shift
        if: ${{ always() && steps.private_state.outputs.ready == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run admin-bot.yml --ref main
