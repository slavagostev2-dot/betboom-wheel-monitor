name: Telegram Control Center
run-name: Telegram control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "admin_bot.py"
      - "admin_runtime.py"
      - "admin_panel_v2.py"
      - "admin_panel_runtime_v2.py"
      - "admin_panel_runtime_v3.py"
      - "requirements.txt"
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: betboom-telegram-admin-panel
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Telegram control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: |
          python -m py_compile admin_bot.py admin_runtime.py admin_panel_v2.py admin_panel_runtime_v2.py admin_panel_runtime_v3.py
          python admin_panel_runtime_v3.py --self-test
          python -m json.tool bot_access.json >/dev/null

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          value = {
              "status": "running",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 3,
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update Telegram control center status [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Run Telegram control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
        run: python admin_panel_runtime_v3.py

      - name: Start next control-center shift
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run admin-bot.yml --ref main
