name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "admin_bot.py"
      - "admin_action.py"
      - "admin_action_v2.py"
      - "admin_runtime.py"
      - "admin_panel_v2.py"
      - "admin_panel_runtime_v2.py"
      - "admin_panel_runtime_v3.py"
      - "admin_panel_runtime_v4.py"
      - "admin_panel_runtime_v5.py"
      - "admin_panel_runtime_v6.py"
      - "admin_panel_runtime_v7.py"
      - "admin_panel_runtime_v8.py"
      - "admin_panel_runtime_v9.py"
      - "admin_panel_runtime_v10.py"
      - "admin_panel_runtime_v11.py"
      - "admin_panel_runtime_v12.py"
      - "admin_panel_runtime_v13.py"
      - "admin_panel_runtime_v14.py"
      - "admin_panel_runtime_v15.py"
      - "admin_panel_runtime_v16.py"
      - "admin_panel_runtime_v17.py"
      - "admin_panel_runtime_v18.py"
      - "admin_panel_runtime_v19.py"
      - "admin_panel_runtime_v20.py"
      - "admin_panel_runtime_v21.py"
      - "admin_panel_runtime_v22.py"
      - "admin_panel_v22_access.py"
      - "admin_panel_v22_callbacks.py"
      - "admin_panel_v22_views.py"
      - "notification_router_v2.py"
      - "source_registry.py"
      - "source_reputation.py"
      - "candidate_moderation.json"
      - "intelligence_state.json"
      - "requirements.txt"
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-telegram-admin-panel
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check BB V.G. control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: |
          python -m py_compile admin_bot.py admin_action.py admin_action_v2.py admin_runtime.py admin_panel_v2.py admin_panel_runtime_v2.py admin_panel_runtime_v3.py admin_panel_runtime_v4.py admin_panel_runtime_v5.py admin_panel_runtime_v6.py admin_panel_runtime_v7.py admin_panel_runtime_v8.py admin_panel_runtime_v9.py admin_panel_runtime_v10.py admin_panel_runtime_v11.py admin_panel_runtime_v12.py admin_panel_runtime_v13.py admin_panel_runtime_v14.py admin_panel_runtime_v15.py admin_panel_runtime_v16.py admin_panel_runtime_v17.py admin_panel_runtime_v18.py admin_panel_runtime_v19.py admin_panel_runtime_v20.py admin_panel_runtime_v21.py admin_panel_runtime_v22.py admin_panel_v22_access.py admin_panel_v22_callbacks.py admin_panel_v22_views.py notification_router_v2.py source_registry.py source_reputation.py
          python admin_action.py --self-test
          python admin_action_v2.py --self-test
          python notification_router_v2.py
          python source_reputation.py
          python admin_panel_runtime_v3.py --self-test
          python admin_panel_runtime_v4.py --self-test
          python admin_panel_runtime_v5.py --self-test
          python admin_panel_runtime_v6.py --self-test
          python admin_panel_runtime_v7.py --self-test
          python admin_panel_runtime_v8.py --self-test
          python admin_panel_runtime_v9.py --self-test
          python admin_panel_runtime_v10.py --self-test
          python admin_panel_runtime_v11.py --self-test
          python admin_panel_runtime_v12.py --self-test
          python admin_panel_runtime_v13.py --self-test
          python admin_panel_runtime_v15.py --self-test
          python admin_panel_runtime_v16.py --self-test
          python admin_panel_runtime_v17.py --self-test
          python admin_panel_runtime_v18.py --self-test
          python admin_panel_runtime_v19.py --self-test
          python admin_panel_runtime_v20.py --self-test
          python admin_panel_runtime_v21.py --self-test
          python admin_panel_runtime_v22.py --self-test
          python -m json.tool bot_access.json >/dev/null
          python -m json.tool candidate_moderation.json >/dev/null
          python -m json.tool miniapp_deployment.json >/dev/null
          python -m json.tool source_requests.json >/dev/null
          python -m json.tool source_registry.json >/dev/null
          python -m json.tool source_reputation.json >/dev/null

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 22,
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Run BB V.G. control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
        run: python admin_panel_runtime_v22.py

      - name: Start next control-center shift
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run admin-bot.yml --ref main
