name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "admin_bot.py"
      - "admin_action*.py"
      - "admin_action_queue.json"
      - "chapter1_stability.py"
      - "admin_runtime.py"
      - "admin_panel_v2.py"
      - "admin_panel_runtime_v*.py"
      - "bbvg/bot/**"
      - "telegram_ui.py"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "bot_notification_state.py"
      - "notification_integrity_v2.py"
      - "notification_router.py"
      - "notification_delivery_state.json"
      - "wheel_publications_v2.py"
      - "wheel_event_runtime.py"
      - "wheel_link_lifecycle.py"
      - "wheel_scenario_suite.py"
      - "rating_policy.py"
      - "chapter2_unified_logic.py"
      - "privacy_retention.py"
      - "security_audit.py"
      - "migrate_bot_private_state.py"
      - "candidate_moderation.json"
      - "intelligence_state.json"
      - "CHAPTER_2_RU.md"
      - "CHAPTER_4_RU.md"
      - "CHAPTER_5_RU.md"
      - "chapter4_acceptance.py"
      - "chapter5_acceptance.py"
      - "requirements.txt"
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-telegram-admin-panel
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate v41 control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: |
          set -euo pipefail
          python -m compileall -q bbvg
          python -m py_compile \
            admin_bot.py admin_action.py admin_action_v2.py admin_action_v3.py admin_action_queue.py chapter1_stability.py admin_runtime.py \
            admin_panel_v2.py admin_panel_runtime_v25.py admin_panel_runtime_v26.py \
            admin_panel_runtime_v28.py admin_panel_runtime_v29.py \
            admin_panel_runtime_v30.py admin_panel_runtime_v31.py admin_panel_runtime_v32.py \
            admin_panel_runtime_v36.py admin_panel_runtime_v37.py admin_panel_runtime_v38.py admin_panel_runtime_v41.py \
            telegram_ui.py chapter4_acceptance.py chapter5_acceptance.py wheel_lifecycle_v2.py wheel_link_lifecycle.py wheel_scenario_suite.py \
            bot_private_state.py bot_notification_state.py \
            notification_integrity_v2.py notification_router.py wheel_publications_v2.py \
            rating_policy.py chapter2_unified_logic.py privacy_retention.py security_audit.py \
            migrate_bot_private_state.py
          python bot_private_state.py
          python notification_integrity_v2.py --self-test
          python chapter2_unified_logic.py
          python bot_notification_state.py
          python privacy_retention.py
          python security_audit.py --current
          python migrate_bot_private_state.py --check
          python admin_action_v2.py --self-test
          python admin_action_v3.py --self-test
          python admin_action_queue.py
          python -m bbvg.bot.storage
          python -m bbvg.bot.users
          python wheel_link_lifecycle.py
          python wheel_scenario_suite.py
          python admin_panel_runtime_v32.py --self-test
          python admin_panel_runtime_v36.py --self-test
          python admin_panel_runtime_v37.py --self-test
          python admin_panel_runtime_v38.py --self-test
          python -m bbvg.bot.runtime --self-test
          python admin_panel_runtime_v41.py --self-test
          python chapter4_acceptance.py
          python chapter5_acceptance.py
          python chapter1_stability.py
          python - <<'PY'
          import inspect
          import notification_router
          import telegram_ui
          from admin_panel_runtime_v38 import TelegramPanelRuntimeV38
          from admin_panel_runtime_v41 import TelegramPanelRuntimeV41
          from bbvg.bot.runtime import TelegramPanelRuntime
          from bbvg.bot.storage import PrivateStateRuntime
          from bbvg.bot.users import UserSettingsMixin

          handler = inspect.getsource(UserSettingsMixin.handle_callback)
          persistence = inspect.getsource(PrivateStateRuntime._save_bot_bundle)
          detail = inspect.getsource(TelegramPanelRuntimeV38.show_user_detail)
          normalization = inspect.getsource(PrivateStateRuntime.normalize_access)
          safe_send = inspect.getsource(TelegramPanelRuntimeV38.safe_text_for_role)
          summary_handler = inspect.getsource(TelegramPanelRuntime.handle_callback)
          colorizer = inspect.getsource(TelegramPanelRuntime._color_active_payload)
          home = inspect.getsource(TelegramPanelRuntime.show_menu)
          assert TelegramPanelRuntimeV41.RUNTIME_VERSION == 41
          assert "usernotify:" in handler
          assert "usernotifyall:" in handler
          assert "_load_remote_bundle" in persistence
          assert "_merge_access" in persistence
          assert "Управлять уведомлениями" in detail
          assert "access_signature" in normalization
          assert "result.pop" in normalization
          assert "USER_ACTION_ERROR" in safe_send
          assert "dispatch_summary" not in summary_handler
          assert "show_period_report" in summary_handler
          assert "callback_data" not in colorizer
          assert "Находит колёса BetBoom" in home
          assert "Ваша роль" in home
          assert notification_router._bbvg_notification_integrity_v2_installed is True
          ranking = [
            button["text"]
            for row in TelegramPanelRuntimeV41.source_menu_rows(False)
            for button in row
            if button.get("callback_data") == "page:ranking"
          ]
          assert ranking == ["🏆 Рейтинг источников"]
          assert "summary:send" not in inspect.getsource(TelegramPanelRuntimeV38.show_analytics)
          assert "подтвержд.)" not in inspect.getsource(TelegramPanelRuntimeV38.show_ranking)
          assert telegram_ui.TELEGRAM_CALLBACK_LIMIT == 64
          print("BB V.G. v41 final staged bundle validated")
          PY

      - name: Preserve role fingerprint and migrate state
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          access = bot_private_state.load_file().get("access", {})
          roles = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          Path("/tmp/bbvg_roles_before.json").write_text(
              json.dumps(roles, ensure_ascii=False, sort_keys=True), encoding="utf-8"
          )
          PY
          python migrate_bot_private_state.py
          python notification_integrity_v2.py --prune
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          before = json.loads(Path("/tmp/bbvg_roles_before.json").read_text(encoding="utf-8"))
          access = bot_private_state.load_file().get("access", {})
          after = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          assert after == before, "State migration changed Telegram roles"
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(bot_private_state.enc.json notification_delivery_state.json)
          if ! git diff --quiet -- "${files[@]}"; then
            git add "${files[@]}"
            git commit -m "Migrate BB V.G. private and delivery state [skip ci]"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            done
          fi

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          try:
              encrypted = json.load(open("bot_private_state.enc.json", encoding="utf-8"))
          except Exception:
              encrypted = {}
          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "last_heartbeat_at": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 41,
              "heartbeat_version": 1,
              "runtime_owner": "telegram_control_center",
              "update_consumer": "single_getUpdates_owner",
              "storage": "encrypted_bot_state",
              "state_format": encrypted.get("format", "unknown"),
              "state_key_mode": encrypted.get("key_mode", "unknown"),
              "role_persistence": "aes_gcm_three_way_remote_merge",
              "notification_integrity": "persistent_hmac_delivery_ledger",
              "source_rating": "administrator_decisions_additive_finished_and_participating",
              "summary_delivery": "direct_in_process",
              "wheel_colors": "callback_payload_unchanged",
              "wheel_link_lifecycle": "timer_or_manual_deadline_else_two_hours",
              "scenario_suite": "10_scenarios_passed",
              "deferred_update": "none",
              "miniapp": "archived",
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Run BB V.G. control center v41
        id: run_panel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
        run: python admin_panel_runtime_v41.py

      - name: Start replacement control-center shift
        if: ${{ always() && steps.run_panel.outcome != 'skipped' && steps.run_panel.outcome != 'cancelled' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          gh workflow run admin-bot.yml --ref main

# v41: consolidated runtime, timer-aware duplicate lifecycle and idempotent source rating.
