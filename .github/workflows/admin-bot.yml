name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "admin_bot.py"
      - "admin_action*.py"
      - "admin_runtime.py"
      - "admin_panel_v2.py"
      - "admin_panel_runtime_v*.py"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "bot_notification_state.py"
      - "privacy_retention.py"
      - "security_audit.py"
      - "migrate_bot_private_state.py"
      - "candidate_moderation.json"
      - "intelligence_state.json"
      - "requirements.txt"
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-telegram-admin-panel
  cancel-in-progress: true

jobs:
  control-center:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate v34 control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: |
          set -euo pipefail
          python -m py_compile \
            admin_bot.py admin_action.py admin_action_v2.py admin_action_v3.py admin_runtime.py \
            admin_panel_v2.py admin_panel_runtime_v25.py admin_panel_runtime_v26.py \
            admin_panel_runtime_v27.py admin_panel_runtime_v28.py admin_panel_runtime_v29.py \
            admin_panel_runtime_v30.py admin_panel_runtime_v31.py admin_panel_runtime_v32.py \
            admin_panel_runtime_v33.py admin_panel_runtime_v34.py bot_private_state.py \
            bot_notification_state.py privacy_retention.py security_audit.py \
            migrate_bot_private_state.py rating_policy.py
          python bot_private_state.py
          python privacy_retention.py
          python security_audit.py --current
          python migrate_bot_private_state.py --check
          python admin_action_v2.py --self-test
          python admin_action_v3.py --self-test
          python admin_panel_runtime_v32.py --self-test
          python admin_panel_runtime_v33.py --self-test
          python admin_panel_runtime_v34.py --self-test
          python - <<'PY'
          import inspect
          from admin_panel_runtime_v34 import TelegramPanelRuntimeV34

          handler = inspect.getsource(TelegramPanelRuntimeV34.handle_callback)
          persistence = inspect.getsource(TelegramPanelRuntimeV34._save_bot_bundle)
          detail = inspect.getsource(TelegramPanelRuntimeV34.show_user_detail)
          assert "usernotify:" in handler
          assert "usernotifyall:" in handler
          assert "_load_remote_bundle" in persistence
          assert "_merge_access" in persistence
          assert "Управлять уведомлениями" in detail
          print("BB V.G. v34 role persistence and owner notification controls validated")
          PY

      - name: Preserve role fingerprint and migrate state
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          access = bot_private_state.load_file().get("access", {})
          roles = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          Path("/tmp/bbvg_roles_before.json").write_text(
              json.dumps(roles, ensure_ascii=False, sort_keys=True), encoding="utf-8"
          )
          print("Role fingerprint captured without printing personal values")
          PY
          python migrate_bot_private_state.py
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          before = json.loads(Path("/tmp/bbvg_roles_before.json").read_text(encoding="utf-8"))
          access = bot_private_state.load_file().get("access", {})
          after = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          assert after == before, "State migration changed Telegram roles"
          print("Role fingerprint preserved during migration")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- bot_private_state.enc.json; then
            echo "Encrypted Telegram bot state is already current."
          else
            git add bot_private_state.enc.json
            git commit -m "Migrate encrypted Telegram bot state without role changes [skip ci]"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            done
          fi

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          try:
              encrypted = json.load(open("bot_private_state.enc.json", encoding="utf-8"))
          except Exception:
              encrypted = {}
          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 34,
              "storage": "encrypted_bot_state",
              "state_format": encrypted.get("format", "unknown"),
              "state_key_mode": encrypted.get("key_mode", "unknown"),
              "role_persistence": "three_way_remote_merge",
              "miniapp": "archived",
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Run BB V.G. control center
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
        run: python admin_panel_runtime_v34.py

      - name: Start next control-center shift
        if: ${{ success() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run admin-bot.yml --ref main

# v34: conflict-safe role persistence and owner-managed per-user notifications.
