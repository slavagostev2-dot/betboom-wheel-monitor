name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "control_center_release.txt"
      - ".github/workflows/admin-bot.yml"
      - "notification_button_recovery.py"
      - "auto_participation_owner_sync.py"
      - "bot_notification_state.py"
  workflow_dispatch:
  schedule:
    - cron: "37 * * * *"

permissions:
  contents: read

jobs:
  validate-control-center:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        id: dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate candidate Control Center release
        id: candidate
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        shell: bash
        run: |
          set +e
          bash scripts/validate_control_center.sh 2>&1 | tee /tmp/bbvg-control-center-candidate.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Validate notification participation recovery
        id: button_recovery
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: python notification_button_recovery.py --self-test

      - name: Validate automatic participation owner sync
        id: owner_sync
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: |
          python auto_participation_owner_sync.py
          python - <<'PY'
          import admin_panel_runtime_v41  # noqa: F401
          from admin_panel_v2 import TelegramPanelV2
          assert getattr(
              TelegramPanelV2,
              "_bbvg_auto_participation_owner_sync_installed",
              False,
          ), "Automatic participation owner sync is not installed"
          print("Automatic participation owner sync installed")
          PY

      - name: Verify configured AI provider
        id: ai_provider
        env:
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "natural_language_admin"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          from bbvg.ai_core import AIConfig
          config = AIConfig.from_env()
          assert config.provider in {"gemini", "openai"}, "Unsupported BBVG_AI_PROVIDER"
          assert config.model, "BBVG_AI_MODEL is empty"
          assert config.provider_configured(), "Selected AI provider key is missing"
          print(f"AI provider configured: {config.provider}/{config.model}")
          PY

      - name: Preserve role fingerprint and migrate state
        id: state_migration
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          access = bot_private_state.load_file().get("access", {})
          roles = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          Path("/tmp/bbvg_roles_before.json").write_text(
              json.dumps(roles, ensure_ascii=False, sort_keys=True), encoding="utf-8"
          )
          PY
          python migrate_bot_private_state.py
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          before = json.loads(Path("/tmp/bbvg_roles_before.json").read_text(encoding="utf-8"))
          access = bot_private_state.load_file().get("access", {})
          after = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          assert after == before, "State migration changed Telegram roles"
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(bot_private_state.enc.json)
          if ! git diff --quiet -- "${files[@]}"; then
            git add "${files[@]}"
            git commit -m "Migrate BB V.G. private state [skip ci]"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            done
          fi

      - name: Record Control Center validation failure
        if: ${{ failure() }}
        env:
          DEPENDENCIES_OUTCOME: ${{ steps.dependencies.outcome }}
          CANDIDATE_OUTCOME: ${{ steps.candidate.outcome }}
          BUTTON_RECOVERY_OUTCOME: ${{ steps.button_recovery.outcome }}
          OWNER_SYNC_OUTCOME: ${{ steps.owner_sync.outcome }}
          AI_PROVIDER_OUTCOME: ${{ steps.ai_provider.outcome }}
          STATE_MIGRATION_OUTCOME: ${{ steps.state_migration.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_log=$(tail -c 3500 /tmp/bbvg-control-center-candidate.log 2>/dev/null || true)
          git fetch origin main
          git checkout -B main origin/main
          now=$(date -u +%FT%T.%NZ)
          stages="dependencies=${DEPENDENCIES_OUTCOME:-unknown}; candidate=${CANDIDATE_OUTCOME:-unknown}; button_recovery=${BUTTON_RECOVERY_OUTCOME:-unknown}; owner_sync=${OWNER_SYNC_OUTCOME:-unknown}; ai_provider=${AI_PROVIDER_OUTCOME:-unknown}; state_migration=${STATE_MIGRATION_OUTCOME:-unknown}"
          error="$stages"
          if [[ -n "$candidate_log" ]]; then
            error="$stages

$candidate_log"
          fi
          tmp=$(mktemp)
          jq \
            --arg now "$now" \
            --arg run_id "${GITHUB_RUN_ID:-}" \
            --arg head_sha "${GITHUB_SHA:-}" \
            --arg event "${GITHUB_EVENT_NAME:-}" \
            --arg error "$error" \
            '.status = "validation_failed"
             | .last_validation_at = $now
             | .validation_error = $error
             | .validation_run_id = $run_id
             | .validation_head_sha = $head_sha
             | .validation_event = $event' \
            admin_panel_status.json > "$tmp"
          mv "$tmp" admin_panel_status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Record BB V.G. Control Center validation failure [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

  control-center:
    needs: validate-control-center
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: bb-vg-telegram-admin-panel
      cancel-in-progress: ${{ github.event_name != 'schedule' }}

    steps:
      - name: Checkout validated repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime, timezone

          try:
              encrypted = json.load(open("bot_private_state.enc.json", encoding="utf-8"))
          except Exception:
              encrypted = {}
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          head_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          assert len(head_sha) == 40, "Unable to resolve panel production SHA"
          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "last_heartbeat_at": datetime.now(timezone.utc).isoformat(),
              "run_id": run_id,
              "workflow_run_id": run_id,
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "head_sha": head_sha,
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 41,
              "heartbeat_version": 1,
              "runtime_owner": "telegram_control_center",
              "update_consumer": "single_getUpdates_owner",
              "storage": "encrypted_bot_state",
              "state_format": encrypted.get("format", "unknown"),
              "state_key_mode": encrypted.get("key_mode", "unknown"),
              "role_persistence": "aes_gcm_three_way_remote_merge",
              "notification_integrity": "persistent_hmac_delivery_ledger",
              "notification_button_recovery": "active_wheel_token_fallback",
              "auto_participation_owner_sync": "control_center_personal_vote",
              "source_rating": "administrator_decisions_additive_finished_and_participating",
              "summary_delivery": "direct_in_process",
              "wheel_colors": "callback_payload_unchanged",
              "wheel_link_lifecycle": "timer_or_manual_deadline_else_two_hours",
              "scenario_suite": "10_scenarios_passed",
              "deferred_update": "none",
              "miniapp": "archived",
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Run BB V.G. control center v41
        id: run_panel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "16200"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "natural_language_admin"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python notification_button_recovery.py

      - name: Start replacement control-center shift
        if: ${{ always() && steps.run_panel.outcome != 'skipped' && steps.run_panel.outcome != 'cancelled' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          gh workflow run admin-bot.yml --ref main

# v41: owner auto-participation sync is validated before the live runtime is replaced.
