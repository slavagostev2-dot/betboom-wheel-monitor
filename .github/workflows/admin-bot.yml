name: BB V.G. Control Center
run-name: BB V.G. control center — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "control_center_release.txt"
      - ".github/workflows/admin-bot.yml"
      - "notification_button_recovery.py"
      - "auto_participation_owner_sync.py"
      - "bot_notification_state.py"
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: read

jobs:
  validate-control-center:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Synchronize authoritative auto participation docs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          agents_path = Path("AGENTS.md")
          agents = agents_path.read_text(encoding="utf-8")
          old = "- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку; `auto_participation_recovery.py` независимо пересканирует свежие публикации текущего `public_sources.txt`, сверяет ссылки с BetBoom API и восстанавливает потерянные active/event записи; `betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия. После нового подтверждённого recovery-успеха `auto_participation_bot_sync.py` ставит только публичный pending-маркер в `state.json`, а `auto_participation_owner_sync.py` внутри единственного живого Control Center выполняет личную отметку владельца через штатный `mark_personal_participation`, рейтинг и успешное Telegram-уведомление.\n"
          new = "- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку; `auto_participation_recovery.py` независимо пересканирует свежие публикации текущего `public_sources.txt`, сверяет ссылки с BetBoom API и восстанавливает потерянные active/event записи; `betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия. Recovery не отправляет пользователю финальный результат напрямую: `auto_participation_bot_sync.py` фиксирует публичные pending-исходы, а `auto_participation_owner_sync.py` внутри единственного живого Control Center сериализует успех/неуспех, личную отметку владельца, рейтинг и Telegram-уведомление.\n"
          if old in agents:
              agents = agents.replace(old, new, 1)
          elif "Recovery не отправляет пользователю финальный результат напрямую" not in agents:
              raise SystemExit("AGENTS architecture paragraph not found")
          anchor = "- Workflow автоучастия не записывает `bot_private_state.enc.json`: encrypted personal state остаётся ответственностью Control Center.\n"
          rule = "- Recovery никогда не отправляет финальное пользовательское сообщение «автоучастие не сработало» напрямую. Он только фиксирует event-scoped failure pending в `state.json`; единственный Control Center ждёт не менее 90 секунд, повторно сверяет точные `wheel_key + action_id + server_start_at` и только затем может отправить неуспех. Наличие подтверждённого участия, success-pending либо зашифрованной записи об уже отправленном успехе навсегда подавляет последующий failure для того же события.\n"
          if rule not in agents:
              if anchor not in agents:
                  raise SystemExit("AGENTS outcome anchor not found")
              agents = agents.replace(anchor, anchor + rule, 1)
          agents_path.write_text(agents, encoding="utf-8")

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          heading = "## 2026-07-21 — Финальный результат автоучастия сериализован через Control Center"
          if heading not in changelog:
              entry = heading + "\n\n" + (
                  "Свежая production-проверка выявила повторение противоречивых сообщений: несколько близких запусков auto-participation независимо пересканировали все свежие колёса, а `auto_participation_recovery.py` успевал отправить Telegram-failure до сохранения своего `state.json` в `main`. Поэтому пользователь мог сначала получить подтверждённый успех от Control Center, а затем ложное «не сработало» от recovery со старым snapshot.\n\n"
                  "Финальная пользовательская доставка полностью вынесена из recovery. Recovery теперь только фиксирует event-scoped `bot_failure_pending_at`; `auto_participation_bot_sync.py` синхронизирует public outcome, а единственный `auto_participation_owner_sync.py` внутри Control Center обрабатывает успех первым и задерживает failure минимум на 90 секунд. Перед failure повторно проверяются точные `wheel_key + action_id + server_start_at`, текущее `participating`, BetBoom-confirmed status, success-pending и зашифрованная история уже отправленных owner-success. Если успех по событию уже был отправлен, более поздний failure запрещён.\n\n"
                  "**Живая диагностика:** `kekw` (`action_id=955`), `dayneez` (`action_id=950`) и `zonertw17` (`action_id=655`) подтверждены BetBoom и отмечены `participating=true`. `CTOM11` (`action_id=958`) остался `unconfirmed`: элемент участия нажимается, но BetBoom не показывает подтверждение; исходный Telegram-пост отдельно указывает условие регистрации по промокоду CTOM.\n\n"
                  "**Pre-update backup:** `backup/2026-07-21-before-authoritative-auto-participation-alerts` → `1cf7860275111eab0c19e5260c1030512b817a63`.\n\n"
                  "**Production Control Center после изменения:** run `29846004846`, статус `running`.\n\n"
              )
              marker = "---\n\n"
              if marker not in changelog:
                  raise SystemExit("Changelog marker not found")
              changelog = changelog.replace(marker, marker + entry, 1)
              changelog_path.write_text(changelog, encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Зафиксировать единый контракт результата автоучастия"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Validate candidate Control Center release
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: bash scripts/validate_control_center.sh

      - name: Validate notification participation recovery
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: python notification_button_recovery.py --self-test

      - name: Validate automatic participation owner sync
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BBVG_TEST_MODE: "1"
        run: |
          python auto_participation_owner_sync.py
          python - <<'PY'
          import admin_panel_runtime_v41  # noqa: F401
          from admin_panel_v2 import TelegramPanelV2
          assert getattr(
              TelegramPanelV2,
              "_bbvg_auto_participation_owner_sync_installed",
              False,
          ), "Automatic participation owner sync is not installed"
          print("Automatic participation owner sync installed")
          PY

      - name: Verify configured AI provider
        env:
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "natural_language_admin"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          from bbvg.ai_core import AIConfig
          config = AIConfig.from_env()
          assert config.provider in {"gemini", "openai"}, "Unsupported BBVG_AI_PROVIDER"
          assert config.model, "BBVG_AI_MODEL is empty"
          assert config.provider_configured(), "Selected AI provider key is missing"
          print(f"AI provider configured: {config.provider}/{config.model}")
          PY

      - name: Preserve role fingerprint and migrate state
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          access = bot_private_state.load_file().get("access", {})
          roles = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          Path("/tmp/bbvg_roles_before.json").write_text(
              json.dumps(roles, ensure_ascii=False, sort_keys=True), encoding="utf-8"
          )
          PY
          python migrate_bot_private_state.py
          python - <<'PY'
          import json
          from pathlib import Path
          import bot_private_state

          before = json.loads(Path("/tmp/bbvg_roles_before.json").read_text(encoding="utf-8"))
          access = bot_private_state.load_file().get("access", {})
          after = {
              "owner_id": str(access.get("owner_id") or ""),
              "admins": sorted(str(value) for value in access.get("admins", [])),
              "blocked_users": sorted(str(value) for value in access.get("blocked_users", [])),
          }
          assert after == before, "State migration changed Telegram roles"
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(bot_private_state.enc.json)
          if ! git diff --quiet -- "${files[@]}"; then
            git add "${files[@]}"
            git commit -m "Migrate BB V.G. private state [skip ci]"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            done
          fi

  control-center:
    needs: validate-control-center
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: bb-vg-telegram-admin-panel
      cancel-in-progress: true

    steps:
      - name: Checkout validated repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Record panel status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime, timezone

          try:
              encrypted = json.load(open("bot_private_state.enc.json", encoding="utf-8"))
          except Exception:
              encrypted = {}
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          head_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          assert len(head_sha) == 40, "Unable to resolve panel production SHA"
          value = {
              "status": "running",
              "brand": "BB V.G.",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "last_heartbeat_at": datetime.now(timezone.utc).isoformat(),
              "run_id": run_id,
              "workflow_run_id": run_id,
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "head_sha": head_sha,
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "version": 41,
              "heartbeat_version": 1,
              "runtime_owner": "telegram_control_center",
              "update_consumer": "single_getUpdates_owner",
              "storage": "encrypted_bot_state",
              "state_format": encrypted.get("format", "unknown"),
              "state_key_mode": encrypted.get("key_mode", "unknown"),
              "role_persistence": "aes_gcm_three_way_remote_merge",
              "notification_integrity": "persistent_hmac_delivery_ledger",
              "notification_button_recovery": "active_wheel_token_fallback",
              "auto_participation_owner_sync": "control_center_personal_vote",
              "source_rating": "administrator_decisions_additive_finished_and_participating",
              "summary_delivery": "direct_in_process",
              "wheel_colors": "callback_payload_unchanged",
              "wheel_link_lifecycle": "timer_or_manual_deadline_else_two_hours",
              "scenario_suite": "10_scenarios_passed",
              "deferred_update": "none",
              "miniapp": "archived",
          }
          with open("admin_panel_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_status.json
          git commit -m "Update BB V.G. control center status [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Run BB V.G. control center v41
        id: run_panel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          DISPLAY_TIMEZONE: Asia/Barnaul
          RUN_SECONDS: "19800"
          REQUEST_TIMEOUT_SECONDS: "20"
          ADMIN_CACHE_SECONDS: "20"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "natural_language_admin"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python notification_button_recovery.py

      - name: Start replacement control-center shift
        if: ${{ always() && steps.run_panel.outcome != 'skipped' && steps.run_panel.outcome != 'cancelled' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          gh workflow run admin-bot.yml --ref main

# v41: owner auto-participation sync is validated before the live runtime is replaced.
