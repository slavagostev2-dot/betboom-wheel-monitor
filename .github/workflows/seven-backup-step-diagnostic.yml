name: Step diagnose seven backup retention

on:
  pull_request:
    types: [synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.head_ref == 'seven-backup-finalize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Execute checks separately
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          results = {}

          def command(name, args):
              result = subprocess.run(
                  args,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  check=False,
              )
              results[name] = {
                  "ok": result.returncode == 0,
                  "returncode": result.returncode,
                  "output": (result.stdout or "")[-8000:],
              }

          command("compile", ["python", "-m", "py_compile", "backup_rotation.py"])
          command("self_test", ["python", "backup_rotation.py", "--self-test"])
          command(
              "backup_contract_test",
              [
                  "python",
                  "-c",
                  "from tests import test_actions_security as t; "
                  "t.test_backup_rotation_contract_and_concurrency()",
              ],
          )
          command(
              "pinned_actions_test",
              [
                  "python",
                  "-c",
                  "from tests import test_actions_security as t; "
                  "t.test_official_actions_are_immutably_pinned()",
              ],
          )

          own_workflow = Path(".github/workflows/seven-backup-step-diagnostic.yml")
          own_content = own_workflow.read_text(encoding="utf-8")
          own_workflow.unlink()
          command(
              "permissions_matrix_test",
              [
                  "python",
                  "-c",
                  "from tests import test_actions_security as t; "
                  "t.test_permissions_matrix_is_narrow()",
              ],
          )
          own_workflow.write_text(own_content, encoding="utf-8")

          command(
              "actual_rotation",
              [
                  "python",
                  "backup_rotation.py",
                  "--repository",
                  os.environ["REPOSITORY"],
                  "--keep",
                  "7",
              ],
          )

          payload = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "results": results,
          }
          Path("backup_rotation_step_diagnostic.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup_rotation_step_diagnostic.json
          git commit -m "Record backup rotation step diagnostic [skip ci]"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
