name: Apply requested UI test contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/notification-ai-diagnostics-2026-07-22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Update source button expectations
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_button_matrix.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '''    assert source_callbacks[:2] == [
                  ["page:sources", "page:ranking"],
                  ["source_list:primary:0", "source:request"],
              ]
          ''': '''    assert source_callbacks[:2] == [
                  ["page:ranking"],
                  ["source_list:primary:0", "source:request"],
              ]
          ''',
              '''    assert admin_source_callbacks[:2] == [
                  ["page:sources", "page:ranking"],
                  ["source_list:primary:0", "page:discovery"],
              ]
          ''': '''    assert admin_source_callbacks[:2] == [
                  ["page:ranking"],
                  ["source_list:primary:0", "page:discovery"],
              ]
          ''',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one source matrix block, found {count}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/test_button_matrix.py
          git commit -m "Align source button matrix with removed refresh action"
          git push origin "HEAD:${HEAD_BRANCH}"
