name: Apply referral-only auto participation guard

on:
  push:
    branches: [fix/skip-referral-auto-participation]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.ref_name == 'fix/skip-referral-auto-participation' || github.head_ref == 'fix/skip-referral-auto-participation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Add pre-browser referral guard
        env:
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path

          primary = Path('betboom_auto_participation.py')
          text = primary.read_text(encoding='utf-8')
          import_marker = 'from typing import Any\n'
          import_new = import_marker + '\nimport wheel_publications_v2\n'
          if 'import wheel_publications_v2\n' not in text:
              if text.count(import_marker) != 1:
                  raise SystemExit('Primary import marker not found')
              text = text.replace(import_marker, import_new, 1)

          enabled_marker = '''def configured() -> bool:
    return enabled() and _storage_state() is not None


'''
          helper = '''def configured() -> bool:
    return enabled() and _storage_state() is not None


def referral_restricted(entry: Any) -> bool:
    """Return whether a wheel explicitly limits eligibility to referrals."""

    return wheel_publications_v2.entry_is_referral_restricted(entry)


'''
          if 'def referral_restricted(entry: Any)' not in text:
              if text.count(enabled_marker) != 1:
                  raise SystemExit('Primary configured marker not found')
              text = text.replace(enabled_marker, helper, 1)

          eligible_marker = '''    url = str(entry.get("url") or "").strip()
    if not url:
        return False
'''
          eligible_new = '''    if referral_restricted(entry):
        return False
    url = str(entry.get("url") or "").strip()
    if not url:
        return False
'''
          if '    if referral_restricted(entry):\n' not in text:
              if text.count(eligible_marker) != 1:
                  raise SystemExit('Primary eligibility marker not found')
              text = text.replace(eligible_marker, eligible_new, 1)
          primary.write_text(text, encoding='utf-8')

          recovery = Path('auto_participation_recovery.py')
          text = recovery.read_text(encoding='utf-8')
          candidate_marker = '''                record = {
                    "wheel_key": key,
                    "url": monitor.normalize_url(link),
                    "source": source,
                    "message_id": message.message_id,
                    "message_date": published.isoformat(),
                    "message_url": message.message_url,
                    "message_text": str(message.text or "")[:4000],
                }
'''
          candidate_new = '''                record = {
                    "wheel_key": key,
                    "url": monitor.normalize_url(link),
                    "source": source,
                    "message_id": message.message_id,
                    "message_date": published.isoformat(),
                    "message_url": message.message_url,
                    "message_text": str(message.text or "")[:4000],
                    "referral_restricted": auto.referral_restricted(
                        {"message_text": str(message.text or "")}
                    ),
                }
'''
          if '"referral_restricted": auto.referral_restricted(' not in text:
              if text.count(candidate_marker) != 1:
                  raise SystemExit('Recovery candidate marker not found')
              text = text.replace(candidate_marker, candidate_new, 1)

          attempts_marker = '''    attempts: list[dict[str, Any]] = []
    for item in active:
        if _confirmed_success_for_event(persisted, item):
'''
          attempts_new = '''    attempts: list[dict[str, Any]] = []
    referral_skipped: list[dict[str, Any]] = []
    for item in active:
        if auto.referral_restricted(item):
            item["referral_restricted"] = True
            referral_skipped.append(item)
            continue
        if _confirmed_success_for_event(persisted, item):
'''
          if 'referral_skipped: list[dict[str, Any]]' not in text:
              if text.count(attempts_marker) != 1:
                  raise SystemExit('Recovery attempts marker not found')
              text = text.replace(attempts_marker, attempts_new, 1)

          return_marker = '''        "active_candidates": len(active),
        "checked": checked,
        "attempts": attempts,
'''
          return_new = '''        "active_candidates": len(active),
        "referral_skipped": len(referral_skipped),
        "checked": checked,
        "attempts": attempts,
'''
          if '"referral_skipped": len(referral_skipped)' not in text:
              if text.count(return_marker) != 1:
                  raise SystemExit('Recovery return marker not found')
              text = text.replace(return_marker, return_new, 1)
          recovery.write_text(text, encoding='utf-8')

          secondary = Path('betboom_account_participation.py')
          text = secondary.read_text(encoding='utf-8')
          loop_marker = '''        if not key or not url:
            continue
        token = _account_event_token(item, key)
'''
          loop_new = '''        if not key or not url:
            continue
        if primary_auto.referral_restricted(item):
            skipped += 1
            continue
        token = _account_event_token(item, key)
'''
          if '        if primary_auto.referral_restricted(item):\n' not in text:
              if text.count(loop_marker) != 1:
                  raise SystemExit('Secondary account loop marker not found')
              text = text.replace(loop_marker, loop_new, 1)
          secondary.write_text(text, encoding='utf-8')

          tests = Path('tests/test_chapter5_lifecycle.py')
          text = tests.read_text(encoding='utf-8')
          import_marker = 'import admin_action_v3\n'
          import_new = import_marker + 'import betboom_auto_participation\n'
          if 'import betboom_auto_participation\n' not in text:
              if text.count(import_marker) != 1:
                  raise SystemExit('Chapter 5 import marker not found')
              text = text.replace(import_marker, import_new, 1)

          method_marker = '''    def test_event_identity_stays_stable_when_a_second_source_is_merged(self) -> None:
'''
          method = '''    def test_referral_wheel_is_blocked_before_browser_attempt(self) -> None:
        class FakeMonitor:
            WHEEL_VERIFICATION_FAILED = "failed"

            @staticmethod
            def parse_datetime(value):
                return None

        restricted = {
            "url": "https://betboom.ru/freestream/CTOM13",
            "message_text": "Колесо для рефов на BetBoom",
            "page_status": "active",
        }
        regular = {
            "url": "https://betboom.ru/freestream/regular",
            "message_text": "Обычное колесо BetBoom для всех",
            "page_status": "active",
        }
        current = datetime(2026, 7, 22, 13, 15, tzinfo=UTC)
        self.assertTrue(betboom_auto_participation.referral_restricted(restricted))
        self.assertFalse(
            betboom_auto_participation._eligible_for_event_attempt(
                restricted, FakeMonitor, current
            )
        )
        self.assertTrue(
            betboom_auto_participation._eligible_for_event_attempt(
                regular, FakeMonitor, current
            )
        )

    def test_event_identity_stays_stable_when_a_second_source_is_merged(self) -> None:
'''
          if 'def test_referral_wheel_is_blocked_before_browser_attempt' not in text:
              if text.count(method_marker) != 1:
                  raise SystemExit('Chapter 5 method marker not found')
              text = text.replace(method_marker, method, 1)
          tests.write_text(text, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          marker = '- Второй BetBoom-аккаунт Вячеслава использует отдельную сессию'
          index = text.find(marker)
          if index < 0:
              raise SystemExit('AGENTS second account marker not found')
          paragraph_end = text.find('\n', text.find('\n', index) + 1)
          addition = (
              '\n- Колёса с явным реферальным ограничением не передаются в '
              'Playwright: единый `betboom_auto_participation.referral_restricted` '
              'останавливает dispatch первой сессии, recovery и второй аккаунт до '
              'браузерного клика. Обычные колёса проходят прежний путь без изменений.\n'
          )
          if 'останавливает dispatch первой сессии' not in text:
              text = text[:paragraph_end] + addition + text[paragraph_end:]
          agents.write_text(text, encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          title = '## 2026-07-22 — Реферальные колёса исключены из автоучастия'
          if title not in text:
              marker = '---\n\n'
              if marker not in text:
                  raise SystemExit('Changelog marker not found')
              entry = (
                  title + '\n\n'
                  'После распознавания явного ограничения «только для рефералов» '
                  'событие больше не передаётся браузеру. Общая проверка выполняется '
                  'до dispatch, а recovery и второй аккаунт повторяют тот же guard '
                  'при ручном или восстановительном запуске.\n\n'
                  'Код клика, две браузерные сессии и обработка обычных колёс не '
                  'изменялись. Добавлен регрессионный тест: `CTOM13` блокируется до '
                  'Playwright, обычное колесо остаётся допустимым.\n\n'
                  '**Pre-update backup:** '
                  '`backup/2026-07-22-before-referral-auto-skip`.\n\n'
              )
              text = text.replace(marker, marker + entry, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

          python -m py_compile betboom_auto_participation.py auto_participation_recovery.py betboom_account_participation.py
          python -m pytest tests/test_chapter5_lifecycle.py -q

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add betboom_auto_participation.py auto_participation_recovery.py betboom_account_participation.py tests/test_chapter5_lifecycle.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Skip referral-only wheels before browser participation"
          git push origin "HEAD:${HEAD_BRANCH}"
