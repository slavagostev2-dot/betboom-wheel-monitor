name: Apply notification diagnostics changelog

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/notification-ai-diagnostics-2026-07-22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Add project changelog entry
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = path.read_text(encoding='utf-8')
          title = '## 2026-07-22 — Уведомления участия и AI-диагностика пересобраны'
          if title in text:
              raise SystemExit('Changelog entry already exists')
          marker = '---\n\n'
          if marker not in text:
              raise SystemExit('Changelog insertion marker not found')
          entry = '''## 2026-07-22 — Уведомления участия и AI-диагностика пересобраны

Пользовательский исход автоучастия теперь принадлежит только единственному живому Control Center. Прямой legacy-failure запрещён; `unconfirmed`, browser/network timeout и dispatch-сбои остаются бесшумным повторяемым состоянием. Успех и подтверждённая терминальная неудача показываются коротко, с идентификатором колеса и только кнопками «Активные колёса»/«Главное меню». Все уведомления о колёсах получили переход к активному списку.

AI-анализ публикаций допускает модель только при проверяемом сочетании колеса, BetBoom и действия, а итоговая уверенность ограничивается признаками исходного текста. Абстрактное упоминание стрима не считается сигналом. Переменный текст AI-инспектора исключён из Telegram-идентичности системного инцидента; push-запуски не рассылают временные ошибки развёртывания.

Из раздела «Источники» удалена кнопка «Обновить реестр», из аналитики скрыт недостоверный блок «Топ источников по находкам». Security-аудит валидирует HMAC-карту message checkpoint, исправлены immutable SHA `actions/setup-python` в backup workflow.

**Pre-update backup:** `backup/2026-07-22-before-notification-ai-diagnostics-rebuild`.

**Pre-merge validation:** `Validate current` run `29913715221`, `current checks` run `29913715118`, recovery smoke `29913715242`, bot-only `29913715161`, Telegram transport `29913715124` — успешно.

'''
          path.write_text(text.replace(marker, marker + entry, 1), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Document participation and diagnostics rebuild"
          git push origin "HEAD:${HEAD_BRANCH}"
