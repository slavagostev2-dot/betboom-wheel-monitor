name: Validate current BB V.G. commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bb-vg-current-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
      EXPECTED_EVENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout the workflow commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Apply one-time Chapter 2A documentation sync
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'cleanup/global-repository-audit-2026-07-20' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> bool:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if new in text:
                  return False
              if old not in text:
                  raise SystemExit(f"Expected Chapter 2A documentation anchor not found: {path}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")
              return True

          changed = False
          changed |= replace_once(
              "tests/production_acceptance.py",
              '    assert "admin_panel_runtime_v41.py" in workflow\n    assert "telegram_ui.py" in workflow\n    user_callbacks = {',
              '    assert "admin_panel_runtime_v41.py" in workflow\n    validator = text("scripts/validate_control_center.sh")\n    assert "run: bash scripts/validate_control_center.sh" in workflow\n    assert "telegram_ui.py" in validator\n    user_callbacks = {',
          )
          changed |= replace_once(
              "AGENTS.md",
              "Этап 1 глобальной ревизии завершён 20.07.2026. До следующего крупного refactor-блока используйте `docs/CODE_INVENTORY_RU.md` и `docs/RUNTIME_METHOD_INVENTORY_RU.md` как актуальную карту зависимостей. По решению пользователя следующий непосредственный результат после этапа 1 — новый самодостаточный PDF; крупный refactor до его подготовки не начинать.",
              "Этап 1 глобальной ревизии завершён 20.07.2026. Самодостаточный handoff-PDF после инвентаризации создан. Этап 2A завершён: baseline CI draft PR #108 диагностирован и стабилизирован, ownership inventory расширен до 29 JSON, а реальная ошибка natural-language admin исправлена. Следующий архитектурный блок по плану — этап 2B (Telegram Control Center); не начинать его без отдельной команды пользователя.",
          )
          changed |= replace_once(
              "docs/CODE_INVENTORY_RU.md",
              "> Статус: **этап 1 глобальной ревизии завершён**.",
              "> Статус: **этап 1 глобальной ревизии и этап 2A стабилизации baseline CI завершены**.",
          )
          changed |= replace_once(
              "docs/CODE_INVENTORY_RU.md",
              "`admin_panel_status.json`, `incident_state.json`, `monitor_recovery_status.json`, `monitor_status.json`, `source_tier_state.json`, `source_transport_state.json`, `system_check_state.json`.",
              "`ai_runtime_state.json`, `admin_panel_status.json`, `incident_state.json`, `monitor_recovery_status.json`, `monitor_status.json`, `source_tier_state.json`, `source_transport_state.json`, `system_check_state.json`.",
          )
          changed |= replace_once(
              "docs/REFACTOR_PLAN_RU.md",
              "> Статус: **этап 1 — полная инвентаризация — завершён**.",
              "> Статус: **этап 1 и этап 2A — завершены; следующий архитектурный блок — этап 2B**.",
          )
          changed |= replace_once(
              "docs/REFACTOR_PLAN_RU.md",
              "## Следующий непосредственный результат — PDF\n\nПо запросу пользователя после завершения этапа 1 дальнейший рефакторинг временно ставится на паузу. Следующий шаг — сформировать новый самодостаточный PDF, который позволит продолжить проект в другом чате без чтения старой переписки.\n\nPDF должен отразить:\n\n- текущее назначение проекта;\n- актуальную production-архитектуру;\n- все основные точки входа;\n- Telegram Control Center;\n- мониторинг и проверку колёс;\n- источники и discovery;\n- уведомления, участие и рейтинг;\n- auto-participation;\n- VK;\n- System Health и AI;\n- GitHub Actions по категориям;\n- backup/rotation;\n- runtime state ownership;\n- frozen Mini App archive;\n- результаты этапа 1;\n- подтверждённые кандидаты дальнейшей очистки;\n- порядок следующих этапов.\n\n## Этап 2 после PDF. Telegram Control Center",
              "## Handoff-PDF после этапа 1 — выполнено\n\nСамодостаточный PDF сформирован после инвентаризации и используется как карта дальнейших глав.\n\n## Этап 2A. Диагностика и стабилизация baseline CI — завершено\n\n- [x] Три исходных красных контура PR #108 разобраны по шагам GitHub Actions.\n- [x] Устаревший Chapter 4 acceptance приведён к фактической цепочке `admin-bot.yml → scripts/validate_control_center.sh → telegram_ui.py`.\n- [x] Исправлена реальная ошибка `natural_language_admin`: несовместимая длина записей `critical_patterns` больше не роняет обычные текстовые команды owner/admin.\n- [x] `ai_runtime_state.json` зарегистрирован в `monitor_data.JSON_STATE_CONTRACTS` как diagnostic state владельца `ai-core`; inventory теперь содержит 29 JSON.\n- [x] CI-контракты обновлены под фактическое сохранение `bot_private_state.enc.json` и существующую кнопку `page:profile` без перестановки прежних кнопок.\n- [x] Временная CI-диагностика и одноразовые patch-шаги удалены.\n- [x] На чистом head после исправлений все пять основных PR-проверок прошли: Validate current, current checks, bot-only recovery, recovery smoke и Telegram transport.\n\n## Этап 2B. Telegram Control Center",
          )
          changed |= replace_once(
              "docs/CHAT_CONTEXT_RU.md",
              "> Этап 1 глобальной ревизии репозитория завершён. Следующий непосредственный шаг по решению пользователя — подготовить новый самодостаточный PDF. Активный рефакторинг после инвентаризации до создания PDF не продолжать.",
              "> Этап 1 глобальной ревизии и этап 2A стабилизации baseline CI завершены. Handoff-PDF создан. Следующий архитектурный блок по плану — этап 2B (Telegram Control Center), но начинать его только по отдельной команде пользователя.",
          )
          changed |= replace_once(
              "docs/CHAT_CONTEXT_RU.md",
              "## 11. Что делать сейчас\n\nСледующая задача — создать PDF по текущему фактическому состоянию проекта и результатам этапа 1.\n\nPDF должен быть пригоден как стартовый контекст для нового чата: пользователь сможет загрузить PDF и попросить продолжить с нужной главы/этапа.\n\nДо завершения PDF не начинать следующий крупный refactor-блок.\n\n## 12. Что делать после PDF\n\nРекомендуемый порядок:\n\n1. перенести уникальную логику `admin_panel_runtime_v41.py` в stable `bbvg/bot/*`;\n2. консолидировать `system_checks → v2 → v3`;\n3. убрать CI/recovery-удержание старой panel runtime chain;\n4. разобрать legacy Mini App-era runtime;\n5. исправить broken auto-participation probe;\n6. убрать frozen assets из production preflight;\n7. переименовать stale workflows;\n8. консолидировать остальные versioned modules;\n9. отдельно спроектировать runtime-state storage.",
              "## 11. Этап 2A — завершён\n\nBaseline CI PR #108 диагностирован и стабилизирован. Выявлены и исправлены: устаревший interface acceptance, реальная ошибка natural-language admin, отсутствующий ownership-контракт `ai_runtime_state.json`, устаревший тест способа сохранения encrypted state и UI-ожидание без уже существующего профиля. Временные диагностические изменения CI удалены.\n\n## 12. Что делать дальше\n\nПо PDF следующий блок — этап 2B:\n\n1. перенести уникальную логику `admin_panel_runtime_v41.py` в stable `bbvg/bot/*`;\n2. сохранить точный состав и порядок существующих кнопок и `callback_data`;\n3. после каждого небольшого переноса запускать button matrix, current contracts, full pytest и acceptance;\n4. только после доказанной эквивалентности сделать `v41` thin compatibility entrypoint;\n5. дальнейшие главы (`system_checks`, legacy runtime, stale workflows, runtime-state architecture) не начинать без отдельной команды пользователя.",
          )

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog_text = changelog.read_text(encoding="utf-8")
          marker = "---\n\n"
          entry = """## 2026-07-21 — Этап 2A: baseline CI диагностирован и стабилизирован\n\nПосле завершения полной инвентаризации draft PR #108 имел красные проверки `Validate current`, `BB V.G. current checks` и `Validate bot-only recovery`. Диагностика по отдельным шагам и полному pytest-выводу показала, что проблемы не были следствием одной audit-документации.\n\nИсправлено:\n\n- Chapter 4 acceptance больше не требует случайного упоминания `telegram_ui.py` непосредственно в `admin-bot.yml`, а проверяет фактическую цепочку делегированной валидации через `scripts/validate_control_center.sh`;\n- исправлена production-ошибка `bbvg/bot/natural_language_admin.py`: две записи `critical_patterns` имели несовместимую длину и могли ронять разбор обычной текстовой команды owner/admin до определения intent;\n- `ai_runtime_state.json` добавлен в машинный ownership registry `monitor_data.JSON_STATE_CONTRACTS` как diagnostic state `ai-core`, число зарегистрированных JSON увеличено с 28 до 29;\n- concurrency/CI-тест обновлён под текущий способ миграции и `git add bot_private_state.enc.json`;\n- Chapter 4 UI-тест синхронизирован с уже внедрённой кнопкой `page:profile`; прежние кнопки не переставлялись;\n- временный pytest artifact и одноразовые диагностические/patch-механизмы удалены после локализации причин.\n\nНа чистом head после исправлений одновременно прошли пять основных PR-проверок: `Validate current BB V.G. commit`, `BB V.G. current checks`, `Validate bot-only recovery`, `Bot recovery smoke test` и `Telegram transport checks`.\n\nСхемы wheel lifecycle, callback_data, порядок прежних кнопок, source tiers, backup rotation и production runtime entrypoints этим этапом не менялись. Откат: вернуть коммиты этапа 2A в audit-ветке; исходная rollback-точка глобальной ревизии остаётся `backup/before-global-repository-cleanup-2026-07-20`.\n\n"""
          if entry not in changelog_text:
              if marker not in changelog_text:
                  raise SystemExit("PROJECT_CHANGELOG_RU.md marker not found")
              changelog.write_text(changelog_text.replace(marker, marker + entry, 1), encoding="utf-8")
              changed = True

          print(f"Chapter 2A documentation sync changed files: {changed}")
          PY
          files=(
            tests/production_acceptance.py
            AGENTS.md
            docs/CODE_INVENTORY_RU.md
            docs/REFACTOR_PLAN_RU.md
            docs/CHAT_CONTEXT_RU.md
            docs/PROJECT_CHANGELOG_RU.md
          )
          if git diff --quiet -- "${files[@]}"; then
            echo "Chapter 2A documentation sync is already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "docs: close Chapter 2A baseline CI stabilization"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Verify the exact event commit
        run: python ci_verify_current_commit.py --expected "$EXPECTED_EVENT_SHA"

      - name: Install production and test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile every active Python module
        run: |
          python -m compileall -q \
            -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' \
            .

      - name: Run repository preflight
        run: python preflight.py

      - name: Run chapter acceptance contracts
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
          python chapter4_acceptance.py
          python chapter5_acceptance.py

      - name: Run pytest and enforce critical-core coverage
        run: |
          python -m pytest \
            --cov=notification_router \
            --cov=notification_integrity_v2 \
            --cov=wheel_publications_v2 \
            --cov=rating_policy \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
