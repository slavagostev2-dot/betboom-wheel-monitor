name: Apply notification diagnostics changelog

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/notification-ai-diagnostics-2026-07-22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Add project changelog entry
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          ENTRY_B64: 
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          path = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = path.read_text(encoding='utf-8')
          entry = base64.b64decode(os.environ['ENTRY_B64']).decode('utf-8')
          title = entry.splitlines()[0]
          if title in text:
              raise SystemExit('Changelog entry already exists')
          marker = '---\n\n'
          if marker not in text:
              raise SystemExit('Changelog insertion marker not found')
          path.write_text(text.replace(marker, marker + entry, 1), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Document participation and diagnostics rebuild"
          git push origin "HEAD:${HEAD_BRANCH}"
