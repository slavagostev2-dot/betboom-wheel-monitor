name: Export monitor push replacement fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'fix/monitor-push-replacement-2026-07-22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - name: Make push replace the running monitor
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/monitor.yml')
          lines = path.read_text(encoding='utf-8').splitlines()
          indexes = [
              index
              for index, line in enumerate(lines)
              if line.startswith('  cancel-in-progress:')
          ]
          if indexes != [78]:
              raise SystemExit(f'Unexpected monitor concurrency lines: {indexes}')
          expression = chr(36) + '{{ '
          lines[indexes[0]] = (
              '  cancel-in-progress: '
              + expression
              + "github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.replace == true) }}"
          )
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Upload patched workflow
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: patched-monitor-workflow
          path: .github/workflows/monitor.yml
          if-no-files-found: error
          retention-days: 1
