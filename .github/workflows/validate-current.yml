name: Apply monitor push replacement fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/monitor-push-replacement-2026-07-22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Make push replace the running monitor
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/monitor.yml')
          text = path.read_text(encoding='utf-8')
          old = "  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' && inputs.replace == true }}"
          new = "  cancel-in-progress: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.replace == true) }}"
          if text.count(old) != 1:
              raise SystemExit('Expected one monitor concurrency contract')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/monitor.yml
          git commit -m "Replace live monitor on production pushes"
          git push origin "HEAD:${HEAD_BRANCH}"
