name: Validate current BB V.G. commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bb-vg-current-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
      EXPECTED_EVENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout the workflow commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Sync Chapter 2B documentation
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'cleanup/global-repository-audit-2026-07-20' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          changed = set()

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if new in text:
                  return
              if old in text:
                  target.write_text(text.replace(old, new, 1), encoding='utf-8')
                  changed.add(path)

          replace(
              'AGENTS.md',
              'Этап 1 глобальной ревизии завершён 20.07.2026. Самодостаточный handoff-PDF после инвентаризации создан. Этап 2A завершён: baseline CI draft PR #108 диагностирован и стабилизирован, ownership inventory расширен до 29 JSON, а реальная ошибка natural-language admin исправлена. Следующий архитектурный блок по плану — этап 2B (Telegram Control Center); не начинать его без отдельной команды пользователя.',
              'Этапы 1, 2A и 2B завершены. В 2B production-логика Telegram Control Center перенесена в стабильный `bbvg/bot/control_center.py`, а `admin_panel_runtime_v41.py` стал тонким compatibility entrypoint. Точный порядок пользовательского и административного меню закреплён regression-тестом. Историческая versioned panel chain не удалена: её остаточные статические ссылки разбираются отдельным безопасным блоком 2C. Следующую главу не начинать без отдельной команды пользователя.',
          )
          replace(
              'AGENTS.md',
              '- Стабильный владелец Telegram-панели: `bbvg/bot/runtime.py`.',
              '- Стабильный production-владелец верхнего слоя Telegram Control Center: `bbvg/bot/control_center.py`; базовый runtime: `bbvg/bot/runtime.py`.',
          )
          replace(
              'AGENTS.md',
              '- `admin_panel_runtime_v41.py` пока **не является полностью тонким переходником**: этап 1 подтвердил, что в нём остаются уникальные production-методы UI, аналитики, удаления/стирания пользователей и callback личного участия. До их переноса в стабильные `bbvg/bot/*` файл является одновременно production entrypoint и compatibility-слоем.',
              '- `admin_panel_runtime_v41.py` — тонкий compatibility entrypoint: production workflow сохраняет прежнюю команду запуска, но реализация импортируется из `bbvg/bot/control_center.py`.',
          )
          replace(
              'AGENTS.md',
              '- Bot-only chain `v25→v26→v28→v29→v30→v31→v32→v36→v37→v38` больше не входит в production MRO, но пока удерживается validation/recovery workflows; удалять её можно только после переноса оставшихся recovery-контрактов и удаления всех входящих ссылок.',
              '- Bot-only chain `v25→v26→v28→v29→v30→v31→v32→v36→v37→v38` больше не входит в production MRO. Основные current/recovery/private-state проверки больше не компилируют эту лестницу, но отдельные stale-ссылки ещё остаются в System Health/preflight и должны быть сняты до удаления файлов в этапе 2C.',
          )

          replace(
              'README.md',
              'Стабильная архитектура находится в `bbvg/bot/`: `runtime.py`, `foundation.py`, `interface.py`, `users.py`, `sources.py`, `source_requests.py`, `storage.py`, `wheels.py`, `profile.py`, `natural_language_admin.py`.',
              'Стабильная архитектура находится в `bbvg/bot/`: `control_center.py`, `runtime.py`, `foundation.py`, `interface.py`, `users.py`, `sources.py`, `source_requests.py`, `storage.py`, `wheels.py`, `profile.py`, `natural_language_admin.py`.',
          )
          replace(
              'README.md',
              'На этапе глобальной ревизии подтверждено, что `admin_panel_runtime_v41.py` пока содержит часть уникальной production-логики и ещё не является полностью тонким compatibility entrypoint.',
              'После этапа 2B `admin_panel_runtime_v41.py` является тонким compatibility entrypoint. Фактический production-слой Control Center находится в `bbvg/bot/control_center.py`; прежняя команда запуска сохранена для совместимости workflow.',
          )

          replace(
              'docs/RUNTIME_METHOD_INVENTORY_RU.md',
              '> Статус: этап 1 глобальной ревизии завершён.',
              '> Статус: этапы 1, 2A и 2B завершены; production Control Center перенесён в стабильный модуль.',
          )
          replace(
              'docs/RUNTIME_METHOD_INVENTORY_RU.md',
              '`.github/workflows/admin-bot.yml`\n→ `python admin_panel_runtime_v41.py`\n→ `TelegramPanelRuntimeV41(TelegramPanelRuntime)`\n→ `bbvg.bot.runtime.TelegramPanelRuntime`\n→ stable mixin/runtime слои `bbvg/bot/*`.',
              '`.github/workflows/admin-bot.yml`\n→ `python admin_panel_runtime_v41.py` (тонкий compatibility entrypoint)\n→ `bbvg.bot.control_center.TelegramPanelRuntimeV41`\n→ `bbvg.bot.runtime.TelegramPanelRuntime`\n→ stable mixin/runtime слои `bbvg/bot/*`.',
          )
          replace(
              'docs/RUNTIME_METHOD_INVENTORY_RU.md',
              '### Расхождение\n\n`admin_panel_runtime_v41.py` не является полностью тонким wrapper: он содержит уникальные production-методы UI, analytics, owner user deletion/erasure и participation callbacks.\n\nСледующий безопасный refactor должен переносить эти методы по владельцам:\n\n- UI/control navigation → `bbvg/bot/interface.py`/`runtime.py`;\n- user deletion/privacy operations → `bbvg/bot/users.py`/`storage.py`;\n- participation callbacks → `bbvg/bot/wheels.py`/`runtime.py`;\n- analytics presentation → стабильный panel runtime/interface owner.\n\nДо переноса workflow остаётся на `v41`.',
              '### Результат этапа 2B\n\nУникальный production-слой бывшего `v41` перенесён без изменения поведения в устойчивый модуль `bbvg/bot/control_center.py`. Корневой `admin_panel_runtime_v41.py` оставлен только как тонкий compatibility entrypoint для неизменной production-команды workflow.\n\nRegression-тест `tests/test_control_center_stable.py` фиксирует, что wrapper не владеет `show_*`/`handle_callback`, а также точный порядок callback-строк пользовательского и административного меню.',
          )
          replace(
              'docs/RUNTIME_METHOD_INVENTORY_RU.md',
              'Текущий stable runtime уже вынесен из этой MRO-chain, но файлы компилируются `v22-checks.yml`, `bot-recovery-smoke.yml` и `validate-private-state.yml`.\n\nСледовательно, удаление требует сначала убрать устаревший recovery/validation contract, а не только production import.',
              'Текущий stable runtime вынесен из этой MRO-chain. В этапе 2B `v22-checks.yml`, `bot-recovery-smoke.yml`, `validate-private-state.yml` и `scripts/validate_control_center.sh` переведены на стабильный Control Center и больше не компилируют всю старую лестницу. До физического удаления файлов в этапе 2C необходимо снять оставшиеся статические ссылки System Health/preflight и повторно проверить внутренние импорты versioned-файлов.',
          )

          replace(
              'docs/CODE_INVENTORY_RU.md',
              '> Статус: **этап 1 глобальной ревизии и этап 2A стабилизации baseline CI завершены**.',
              '> Статус: **этапы 1, 2A и 2B завершены; Telegram Control Center имеет стабильного production-владельца**.',
          )
          replace(
              'docs/CODE_INVENTORY_RU.md',
              '- `admin_panel_runtime_v41.py` — фактическая production-команда workflow.\n- `bbvg/bot/runtime.py` — стабильный `TelegramPanelRuntime`; production MRO не наследует `admin_panel_runtime_v*`.',
              '- `admin_panel_runtime_v41.py` — тонкий compatibility entrypoint и фактическая production-команда workflow.\n- `bbvg/bot/control_center.py` — стабильный владелец production-логики верхнего слоя Telegram Control Center.\n- `bbvg/bot/runtime.py` — стабильный базовый `TelegramPanelRuntime`; production MRO не наследует `admin_panel_runtime_v*`.',
          )
          replace(
              'docs/CODE_INVENTORY_RU.md',
              '### Подтверждённое расхождение\n\n`admin_panel_runtime_v41.py` ранее описывался как тонкий compatibility entrypoint, но фактически содержит собственную production-логику: меню, фильтрацию callback, аналитику, удаление/стирание пользователей и callback участия.\n\n**Статус:** PRODUCTION + COMPATIBILITY + CANDIDATE. Цель следующего cleanup-блока — перенести уникальную логику в тематические `bbvg/bot/*`, сохранив UI и callback-контракты.',
              '### Результат этапа 2B\n\nУникальная production-логика бывшего `v41` перенесена в `bbvg/bot/control_center.py` без изменения пользовательского поведения. Корневой `admin_panel_runtime_v41.py` больше не владеет методами интерфейса и callback и остаётся только совместимым entrypoint. Порядок меню и callback-строк закреплён отдельным regression-тестом.',
          )
          replace(
              'docs/CODE_INVENTORY_RU.md',
              'Текущие validation/recovery workflows явно компилируют:\n\n`v25`, `v26`, `v28`, `v29`, `v30`, `v31`, `v32`, `v36`, `v37`, `v38`, `v41`.\n\nПодтверждённая лестница наследования: `v25 → v26 → v28 → v29 → v30 → v31 → v32 → v36 → v37 → v38`.\n\nСтабильный `bbvg.bot.runtime.TelegramPanelRuntime` уже не использует эту MRO-лестницу, но CI/recovery продолжает удерживать файлы.\n\n**Статус `v25–v38`:** COMPATIBILITY / VALIDATION-RETAINED / CANDIDATE.',
              'Подтверждённая лестница наследования: `v25 → v26 → v28 → v29 → v30 → v31 → v32 → v36 → v37 → v38`.\n\nПосле этапа 2B основные current/recovery/private-state workflows и Control Center validator больше не компилируют всю эту лестницу. Файлы пока не удалены: остаются отдельные stale-ссылки System Health/preflight и внутренние versioned-импорты, которые должны быть проверены в самостоятельном этапе 2C.\n\n**Статус `v25–v38`:** LEGACY/COMPATIBILITY CANDIDATE; физическое удаление пока запрещено.',
          )

          replace(
              'docs/REFACTOR_PLAN_RU.md',
              '> Статус: **этап 1 и этап 2A — завершены; следующий архитектурный блок — этап 2B**.',
              '> Статус: **этапы 1, 2A и 2B завершены; следующий отдельный блок — этап 2C очистки исторической panel runtime chain**.',
          )
          replace(
              'docs/REFACTOR_PLAN_RU.md',
              '## Этап 2B. Telegram Control Center\n\n1. Составить метод-карту уникальной логики `TelegramPanelRuntimeV41`.\n2. Перенести её по стабильным владельцам `bbvg/bot/*`.\n3. Сохранить состав, порядок и `callback_data` кнопок.\n4. Запустить button matrix, current contracts, full pytest и acceptance.\n5. Сделать `v41` thin compatibility entrypoint.\n6. После этого убрать validation/recovery-зависимость от `v25–v38` и удалить подтверждённо ненужные слои отдельным блоком.',
              '## Этап 2B. Telegram Control Center — завершено\n\n- [x] Составлена карта 14 уникальных production-методов `TelegramPanelRuntimeV41`.\n- [x] Реализация перенесена в устойчивый `bbvg/bot/control_center.py` без изменения поведения.\n- [x] `admin_panel_runtime_v41.py` превращён в тонкий compatibility entrypoint с прежней production-командой запуска.\n- [x] Добавлен `tests/test_control_center_stable.py`, фиксирующий отсутствие production-методов в wrapper и точный порядок меню/callback.\n- [x] После переноса одновременно прошли Validate current, current checks, bot-only recovery, recovery smoke и Telegram transport.\n- [x] `scripts/validate_control_center.sh`, `v22-checks.yml`, `bot-recovery-smoke.yml` и `validate-private-state.yml` больше не компилируют всю старую `v25–v38`-лестницу.\n\n## Этап 2C. Очистка исторической panel runtime chain\n\n1. Снять оставшиеся stale-ссылки на versioned panel runtime из System Health/preflight.\n2. Повторно построить граф внутренних импортов `v25–v40`.\n3. Классифицировать каждый файл как обязательный compatibility или SAFE TO DELETE.\n4. Удалять только доказанно ненужные файлы небольшими группами с полным CI после каждой группы.\n5. Не менять UI, callback_data и production-команду запуска.',
          )

          replace(
              'docs/CHAT_CONTEXT_RU.md',
              '> Этап 1 глобальной ревизии и этап 2A стабилизации baseline CI завершены. Handoff-PDF создан. Следующий архитектурный блок по плану — этап 2B (Telegram Control Center), но начинать его только по отдельной команде пользователя.',
              '> Этапы 1, 2A и 2B завершены. Handoff-PDF создан; после 2B production Control Center находится в `bbvg/bot/control_center.py`, а `admin_panel_runtime_v41.py` — тонкий compatibility entrypoint. Следующий отдельный блок — 2C очистки исторической panel runtime chain, начинать его только по команде пользователя.',
          )
          replace(
              'docs/CHAT_CONTEXT_RU.md',
              '- Telegram production: `admin-bot.yml → admin_panel_runtime_v41.py → bbvg/bot/runtime.py`;',
              '- Telegram production: `admin-bot.yml → admin_panel_runtime_v41.py` (thin wrapper) `→ bbvg/bot/control_center.py → bbvg/bot/runtime.py`;',
          )
          replace(
              'docs/CHAT_CONTEXT_RU.md',
              '- старую runtime-chain удерживают validation/recovery workflows;\n- `admin_panel_runtime_v41.py` всё ещё содержит уникальную production-логику;',
              '- основные current/recovery/private-state проверки больше не компилируют всю старую runtime-chain, но отдельные stale-ссылки System Health/preflight ещё требуют этапа 2C;\n- `admin_panel_runtime_v41.py` стал тонким compatibility entrypoint, а production-логика верхнего слоя находится в `bbvg/bot/control_center.py`;',
          )
          replace(
              'docs/CHAT_CONTEXT_RU.md',
              '## 12. Что делать дальше\n\nПо PDF следующий блок — этап 2B:\n\n1. перенести уникальную логику `admin_panel_runtime_v41.py` в stable `bbvg/bot/*`;\n2. сохранить точный состав и порядок существующих кнопок и `callback_data`;\n3. после каждого небольшого переноса запускать button matrix, current contracts, full pytest и acceptance;\n4. только после доказанной эквивалентности сделать `v41` thin compatibility entrypoint;\n5. дальнейшие главы (`system_checks`, legacy runtime, stale workflows, runtime-state architecture) не начинать без отдельной команды пользователя.',
              '## 12. Что делать дальше\n\nСледующий отдельный блок — этап 2C:\n\n1. убрать оставшиеся stale-ссылки System Health/preflight на versioned panel runtime;\n2. повторно проверить внутренние импорты `v25–v40`;\n3. удалить только доказанно ненужные historical/compatibility файлы небольшими группами;\n4. после каждой группы запускать пять основных CI-проверок и regression порядка кнопок;\n5. System Health consolidation и остальные главы не начинать без отдельной команды пользователя.',
          )

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          heading = '## 2026-07-21 — Этап 2B: Telegram Control Center перенесён в стабильный production-модуль'
          if heading not in text:
              marker = '---\n\n'
              entry = '''## 2026-07-21 — Этап 2B: Telegram Control Center перенесён в стабильный production-модуль\n\nПеред этапом создана ordinary backup-ветка `backup/before-chapter-2b-2026-07-21` от текущего `main` и отдельная rollback-точка audit-ветки `safety/chapter-2b-start-2026-07-21` на SHA `a865cce5771e8275619152fefa4851a632d3bfdc`.\n\nУникальный 517-строчный production-слой `admin_panel_runtime_v41.py` механически перенесён в стабильный `bbvg/bot/control_center.py`; корневой `admin_panel_runtime_v41.py` оставлен тонким compatibility entrypoint для неизменной команды `python admin_panel_runtime_v41.py`. Поведение интерфейса на первом переносе сохранено побайтово.\n\nДобавлен regression-тест `tests/test_control_center_stable.py`: он проверяет, что wrapper не владеет `show_*` и `handle_callback`, и фиксирует точный порядок callback-строк пользовательского и административного меню. После переноса все пять основных PR-проверок одновременно прошли.\n\nОсновные current/recovery/private-state workflow и `scripts/validate_control_center.sh` больше не компилируют целиком историческую `v25–v38`-лестницу. Сами versioned-файлы в 2B не удалялись: для безопасного удаления выделен отдельный этап 2C, потому что остаются отдельные stale-ссылки System Health/preflight и внутренние versioned-импорты.\n\nWheel lifecycle, source tiers, backup rotation, callback_data и порядок существовавших кнопок этапом 2B не менялись.\n\n'''
              if marker in text:
                  changelog.write_text(text.replace(marker, marker + entry, 1), encoding='utf-8')
                  changed.add(str(changelog))

          print('Chapter 2B docs changed:', sorted(changed))
          PY
          files=(AGENTS.md README.md docs/RUNTIME_METHOD_INVENTORY_RU.md docs/CODE_INVENTORY_RU.md docs/REFACTOR_PLAN_RU.md docs/CHAT_CONTEXT_RU.md docs/PROJECT_CHANGELOG_RU.md)
          if git diff --quiet -- "${files[@]}"; then
            echo "Chapter 2B documentation already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "docs: close Chapter 2B stable Control Center migration"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Verify the exact event commit
        run: python ci_verify_current_commit.py --expected "$EXPECTED_EVENT_SHA"

      - name: Install production and test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile every active Python module
        run: |
          python -m compileall -q \
            -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' \
            .

      - name: Run repository preflight
        run: python preflight.py

      - name: Run chapter acceptance contracts
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
          python chapter4_acceptance.py
          python chapter5_acceptance.py

      - name: Run pytest and enforce critical-core coverage
        run: |
          python -m pytest \
            --cov=notification_router \
            --cov=notification_integrity_v2 \
            --cov=wheel_publications_v2 \
            --cov=rating_policy \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
