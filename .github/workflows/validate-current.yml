name: Validate current BB V.G. commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bb-vg-current-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
      EXPECTED_EVENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout the workflow commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Record source discovery synchronization changelog
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'fix/source-discovery-sync-2026-07-21' }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = path.read_text(encoding="utf-8")
          marker = "## 2026-07-21 — Синхронизировано состояние ночной проверки после изменения источников"
          if marker not in text:
              entry = """## 2026-07-21 — Синхронизировано состояние ночной проверки после изменения источников

После добавления `@whylollybet` основной inventory уже содержал 166 источников,
а ночной `discovery_state.json` сохранял предыдущий snapshot 165 primary + 2
nightly. System Health ошибочно объявил ожидающее обновление новым сбоем 167/168.

Панель теперь после любого изменения режима источника явно запускает
`nightly-discovery.yml` вместе с monitor, transport и source registry. Сам
workflow также реагирует на обычные пользовательские изменения двух tier-файлов.
Health подавляет расхождение только когда `source_registry.json` подтверждённо
новее discovery snapshot и прошло не больше шести часов; просроченная или
повторно подтверждённая неполнота остаётся настоящим инцидентом.

Backup перед изменением:
`backup/before-source-discovery-sync-fix-2026-07-21` →
`41a20a93d5bfc4deaba06028fe181d27c31a628b`.

Откат: вернуть commit исправления целиком; миграция данных не требуется.

"""
              anchor = "---\n\n"
              if anchor not in text:
                  raise SystemExit("Changelog anchor not found")
              path.write_text(text.replace(anchor, anchor + entry, 1), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_CHANGELOG_RU.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Document source discovery synchronization [skip ci]"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Verify the exact event commit
        run: python ci_verify_current_commit.py --expected "$EXPECTED_EVENT_SHA"

      - name: Install production and test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile every active Python module
        run: |
          python -m compileall -q \
            -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' \
            .

      - name: Run repository preflight
        run: python preflight.py

      - name: Run chapter acceptance contracts
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
          python chapter4_acceptance.py
          python chapter5_acceptance.py

      - name: Validate source discovery synchronization
        run: |
          python admin_runtime.py --self-test
          python system_checks_v3.py --self-test

      - name: Run pytest and enforce critical-core coverage
        run: |
          python -m pytest \
            --cov=notification_router \
            --cov=notification_integrity_v2 \
            --cov=wheel_publications_v2 \
            --cov=rating_policy \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
