name: Validate current BB V.G. commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bb-vg-current-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
      EXPECTED_EVENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout the workflow commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Apply one-time Chapter 2B stable Control Center migration
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'cleanup/global-repository-audit-2026-07-20' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source_path = Path("admin_panel_runtime_v41.py")
          target_path = Path("bbvg/bot/control_center.py")
          source = source_path.read_text(encoding="utf-8")
          thin_marker = "from bbvg.bot.control_center import TelegramControlCenterRuntime, self_test"

          if thin_marker in source and target_path.exists():
              print("Chapter 2B stable Control Center migration already applied")
              raise SystemExit(0)

          required = [
              "class TelegramPanelRuntimeV41(TelegramPanelRuntime):",
              "super(TelegramPanelRuntimeV41, self).show_settings()",
              "return TelegramPanelRuntimeV41().run()",
          ]
          missing = [value for value in required if value not in source]
          if missing:
              raise SystemExit(f"Unexpected v41 source; missing anchors: {missing}")
          if target_path.exists():
              raise SystemExit("bbvg/bot/control_center.py already exists but v41 is not thin")

          stable = source.replace(
              "class TelegramPanelRuntimeV41(TelegramPanelRuntime):",
              "class TelegramControlCenterRuntime(TelegramPanelRuntime):",
              1,
          )
          stable = stable.replace(
              '"""Production v41 entrypoint with compact single-message navigation."""',
              '"""Stable production Telegram Control Center behavior."""',
              1,
          )
          stable = stable.replace("TelegramPanelRuntimeV41", "TelegramControlCenterRuntime")
          target_path.write_text(stable, encoding="utf-8")

          wrapper = '''from __future__ import annotations

import argparse

from bbvg.bot.control_center import TelegramControlCenterRuntime, self_test


class TelegramPanelRuntimeV41(TelegramControlCenterRuntime):
    """Compatibility entrypoint for the stable Telegram Control Center runtime."""

    RUNTIME_VERSION = 41


def main() -> int:
    parser = argparse.ArgumentParser()
    parser.add_argument("--self-test", action="store_true")
    args = parser.parse_args()
    if args.self_test:
        self_test()
        return 0
    return TelegramPanelRuntimeV41().run()


if __name__ == "__main__":
    raise SystemExit(main())
'''
          source_path.write_text(wrapper, encoding="utf-8")
          PY

          if git diff --quiet -- admin_panel_runtime_v41.py bbvg/bot/control_center.py; then
            echo "Chapter 2B migration is already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_runtime_v41.py bbvg/bot/control_center.py
          git commit -m "refactor: move v41 Control Center into stable runtime"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Verify the exact event commit
        run: python ci_verify_current_commit.py --expected "$EXPECTED_EVENT_SHA"

      - name: Install production and test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile every active Python module
        run: |
          python -m compileall -q \
            -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' \
            .

      - name: Run repository preflight
        run: python preflight.py

      - name: Run chapter acceptance contracts
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
          python chapter4_acceptance.py
          python chapter5_acceptance.py

      - name: Run pytest and enforce critical-core coverage
        run: |
          python -m pytest \
            --cov=notification_router \
            --cov=notification_integrity_v2 \
            --cov=wheel_publications_v2 \
            --cov=rating_policy \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
