name: Wheel state diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact diagnostic commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install HTTP dependency
        run: python -m pip install requests

      - name: Query BetBoom action state
        shell: bash
        run: |
          python - <<'PY'
          import json
          import requests

          endpoint = "https://betboom.ru/api/streamer-wheel/action/get-info"
          names = ["stray", "dyrachyo", "neret", "zonertg8"]
          result = {}
          for name in names:
              try:
                  response = requests.post(
                      endpoint,
                      json={"streamer_link": f"https://betboom.ru/freestream/{name}"},
                      headers={
                          "Accept": "application/json, text/plain, */*",
                          "Content-Type": "application/json",
                          "Origin": "https://betboom.ru",
                          "Referer": f"https://betboom.ru/freestream/{name}",
                          "User-Agent": "Mozilla/5.0 BBVG-wheel-state-diagnostic/1.0",
                          "x-platform": "web",
                      },
                      timeout=20,
                  )
                  try:
                      payload = response.json()
                  except ValueError:
                      payload = None
                  info = payload.get("info") if isinstance(payload, dict) else None
                  allowed = {}
                  if isinstance(info, dict):
                      for key, value in info.items():
                          if value is None or isinstance(value, (str, int, float, bool)):
                              allowed[key] = value
                  result[name] = {
                      "http_status": response.status_code,
                      "content_type": response.headers.get("content-type"),
                      "top_level_code": payload.get("code") if isinstance(payload, dict) else None,
                      "top_level_status": payload.get("status") if isinstance(payload, dict) else None,
                      "top_level_error": payload.get("error") if isinstance(payload, dict) else None,
                      "info": allowed,
                      "body_prefix": "" if payload is not None else response.text[:200],
                  }
              except Exception as exc:
                  result[name] = {
                      "exception_type": type(exc).__name__,
                      "exception": str(exc),
                  }
          print(json.dumps(result, ensure_ascii=False, indent=2, sort_keys=True))
          with open("wheel-state-diagnostic.json", "w", encoding="utf-8") as stream:
              json.dump(result, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY

      - name: Upload diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-state-diagnostic-${{ github.run_id }}
          path: wheel-state-diagnostic.json
          retention-days: 1
          if-no-files-found: error
