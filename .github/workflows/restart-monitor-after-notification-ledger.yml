name: Restart monitor after notification ledger update

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  restart:
    if: ${{ github.head_ref == 'restart-monitor-after-notification-ledger' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/restart-monitor-after-notification-ledger.yml
          git commit -m "Удалить одноразовый перезапуск монитора"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done

      - name: Replace monitor with current main
        shell: bash
        run: |
          set -euo pipefail
          before=$(gh run list --repo "$REPOSITORY" --workflow monitor.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run monitor.yml --repo "$REPOSITORY" --ref main -f continuous=true -f replace=true
          for attempt in $(seq 1 30); do
            current=$(gh run list --repo "$REPOSITORY" --workflow monitor.yml --limit 1 --json databaseId,status --jq '.[0] | [.databaseId,.status] | @tsv')
            current_id=$(printf '%s' "$current" | cut -f1)
            current_status=$(printf '%s' "$current" | cut -f2)
            if [[ -n "$current_id" && "$current_id" != "$before" ]]; then
              echo "Replacement monitor run: $current_id ($current_status)"
              break
            fi
            sleep 2
          done
          [[ -n "${current_id:-}" && "$current_id" != "$before" ]]

          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Монитор с поддержкой HMAC message-id ledger запущен на текущем main."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/restart-monitor-after-notification-ledger"
