name: BB V.G. wheel monitor
run-name: BB V.G. monitor — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "monitor.py"
      - "monitor_entry.py"
      - "bbvg_monitor_runtime.py"
      - "bbvg_monitor_main.py"
      - "monitor_resilience.py"
      - "monitor_health.py"
      - "notification_router.py"
      - "bot_access.json"
      - "monitor_data.py"
      - "daily_report.py"
      - "telegram_monitor.py"
      - "nightly_discovery.py"
      - "public_sources.txt"
      - "source_catalog.txt"
      - "partners_catalog.json"
      - "identifier_sources.json"
      - "requirements.txt"
      - "self_test.py"
      - "preflight.py"
      - ".github/workflows/monitor.yml"
  workflow_dispatch:
    inputs:
      continuous:
        description: "Непрерывный режим"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.event_name == 'push' && format('bb-vg-monitor-validation-{0}', github.sha) || 'bb-vg-monitor-continuous' }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify repository layout
        run: python preflight.py

      - name: Check BB V.G. project files
        run: |
          python -m py_compile monitor.py monitor_entry.py bbvg_monitor_runtime.py bbvg_monitor_main.py monitor_resilience.py monitor_health.py notification_router.py monitor_data.py telegram_monitor.py nightly_discovery.py daily_report.py
          python notification_router.py
          python monitor_resilience.py
          python monitor_health.py --self-test
          python - <<'PY'
          import bbvg_monitor_main as runtime

          assert runtime.monitor.remember_pending.__module__ == "bbvg_monitor_runtime"
          assert runtime.monitor.wheel_reply_markup.__module__ == "bbvg_monitor_main"
          assert runtime.monitor.fetch_all_sources.__module__ == "monitor_resilience"
          state = {"inactive_wheels": {}, "pending_posts": {}, "active_wheels": {}}
          assert runtime.runtime._inactive_entry(state, "test") is None
          print("BB V.G. monitor runtime validation passed")
          PY
          python -m json.tool identifier_sources.json >/dev/null
          python -m json.tool partners_catalog.json >/dev/null
          python -m json.tool bot_access.json >/dev/null
          python self_test.py

      - name: Run BB V.G. monitor loop
        if: ${{ github.event_name != 'push' }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          MAX_WORKERS: "12"
          TRANSPORT_BATCH_ATTEMPTS: "3"
          UNKNOWN_DEDUP_HOURS: "24"
          DEADLINE_GRACE_MINUTES: "30"
          HEARTBEAT_HOURS: "6"
          HEALTH_ALERT_COOLDOWN_HOURS: "6"
          STATUS_REPORT_HOURS: "12"
          MAX_NEW_POST_AGE_MINUTES: "360"
          NEW_SOURCE_CATCHUP_MINUTES: "1440"
          FRESH_UNKNOWN_POST_MINUTES: "20"
          QUARANTINE_FAILURE_THRESHOLD: "3"
          QUARANTINE_EMPTY_THRESHOLD: "4"
          QUARANTINE_RECHECK_HOURS: "6"
          UNAVAILABLE_REPORT_DAYS: "2"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
          BOT_FEEDBACK_ENABLED: "false"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.continuous != true }}
          AUTO_RUN: ${{ github.event_name != 'workflow_dispatch' || inputs.continuous == true }}
          CONTINUOUS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.continuous == true) }}
        shell: bash
        run: |
          set -uo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          runtime_files=(
            state.json source_health.json source_stats.json
            unknown_timer_samples.json monitor_status.json
          )

          push_runtime() {
            if git diff --quiet -- "${runtime_files[@]}"; then
              return 0
            fi

            git add "${runtime_files[@]}"
            git commit -m "Update BB V.G. runtime data [skip ci]" || true

            for attempt in 1 2 3; do
              if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
                return 0
              fi
              echo "Runtime push attempt ${attempt} failed; rebasing before retry."
              if ! git pull --rebase origin "${GITHUB_REF_NAME:-main}"; then
                git rebase --abort || true
                echo "Runtime rebase failed; preserving local data for the next retry."
                return 1
              fi
            done
            return 1
          }

          python monitor_health.py start --run-id "${GITHUB_RUN_ID:-}"

          shift_end=$(( $(date +%s) + 19800 ))
          last_commit_at=0
          iteration=0

          while true; do
            iteration=$((iteration + 1))
            started_at=$(date +%s)
            echo "=== BB V.G. check $iteration at $(date -u +%FT%TZ) ==="

            timeout --signal=TERM --kill-after=30s 600s python bbvg_monitor_main.py 2>&1 | tee monitor-run.log
            iteration_exit=${PIPESTATUS[0]}
            duration=$(( $(date +%s) - started_at ))

            python monitor_health.py record \
              --run-id "${GITHUB_RUN_ID:-}" \
              --iteration "$iteration" \
              --exit-code "$iteration_exit" \
              --duration-seconds "$duration"

            if (( iteration_exit != 0 )); then
              echo "BB V.G. iteration failed with exit code ${iteration_exit}; status was saved and the loop will retry."
            fi

            now_ts=$(date +%s)
            if [[ "$CONTINUOUS" != "true" ]] || (( last_commit_at == 0 || now_ts - last_commit_at >= 900 || now_ts >= shift_end )); then
              push_runtime || echo "Runtime push is deferred; watchdog will continue checking repository freshness."
              last_commit_at=$now_ts
            fi

            if [[ "$CONTINUOUS" != "true" ]] || (( now_ts >= shift_end )); then
              break
            fi

            interval_seconds=$(python - <<'PY'
          import json
          try:
              data = json.load(open('bot_access.json', encoding='utf-8'))
              value = int(data.get('settings', {}).get('monitor_interval_minutes', 5))
          except Exception:
              value = 5
          value = value if value in {1, 3, 5, 10, 15, 30} else 5
          print(value * 60)
          PY
            )

            sleep_for=$(( interval_seconds - duration ))
            if (( sleep_for > 0 )); then
              echo "Previous check finished in ${duration}s. Next check in ${sleep_for}s."
              sleep "$sleep_for"
            else
              echo "Previous check took ${duration}s; configured interval already elapsed."
            fi
          done

          push_runtime || true

      - name: Start or continue continuous monitoring
        if: ${{ always() && (github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.continuous == true)) }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true
