name: BB V.G. wheel monitor
run-name: BB V.G. monitor — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "monitor.py"
      - "monitor_entry.py"
      - "bbvg_monitor_runtime.py"
      - "bbvg_monitor_main.py"
      - "monitor_resilience.py"
      - "notification_router.py"
      - "bot_access.json"
      - "monitor_data.py"
      - "daily_report.py"
      - "telegram_monitor.py"
      - "nightly_discovery.py"
      - "public_sources.txt"
      - "source_catalog.txt"
      - "partners_catalog.json"
      - "identifier_sources.json"
      - "requirements.txt"
      - "self_test.py"
      - "preflight.py"
      - ".github/workflows/monitor.yml"
      - ".github/workflows/nightly-discovery.yml"
      - ".github/workflows/daily-report.yml"
  workflow_dispatch:
    inputs:
      continuous:
        description: "Непрерывный режим"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "23 */4 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-monitor-continuous
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify repository layout
        run: python preflight.py

      - name: Check BB V.G. project files
        run: |
          python -m py_compile monitor.py monitor_entry.py bbvg_monitor_runtime.py bbvg_monitor_main.py monitor_resilience.py notification_router.py monitor_data.py telegram_monitor.py nightly_discovery.py daily_report.py
          python notification_router.py
          python monitor_resilience.py
          python - <<'PY'
          import bbvg_monitor_main as runtime

          assert runtime.monitor.remember_pending.__module__ == "bbvg_monitor_runtime"
          assert runtime.monitor.wheel_reply_markup.__module__ == "bbvg_monitor_main"
          assert runtime.monitor.fetch_all_sources.__module__ == "monitor_resilience"
          state = {"inactive_wheels": {}, "pending_posts": {}, "active_wheels": {}}
          assert runtime.runtime._inactive_entry(state, "test") is None
          print("BB V.G. monitor runtime validation passed")
          PY
          python -m json.tool identifier_sources.json >/dev/null
          python -m json.tool partners_catalog.json >/dev/null
          python -m json.tool bot_access.json >/dev/null
          python self_test.py

      - name: Run BB V.G. monitor loop
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          MAX_WORKERS: "12"
          TRANSPORT_BATCH_ATTEMPTS: "3"
          UNKNOWN_DEDUP_HOURS: "24"
          DEADLINE_GRACE_MINUTES: "30"
          HEARTBEAT_HOURS: "6"
          HEALTH_ALERT_COOLDOWN_HOURS: "6"
          STATUS_REPORT_HOURS: "12"
          MAX_NEW_POST_AGE_MINUTES: "360"
          NEW_SOURCE_CATCHUP_MINUTES: "1440"
          FRESH_UNKNOWN_POST_MINUTES: "20"
          QUARANTINE_FAILURE_THRESHOLD: "3"
          QUARANTINE_EMPTY_THRESHOLD: "4"
          QUARANTINE_RECHECK_HOURS: "6"
          UNAVAILABLE_REPORT_DAYS: "2"
          SOURCE_INACTIVITY_DAYS: "7"
          SOURCE_INACTIVITY_REPORT_DAYS: "7"
          BOT_FEEDBACK_ENABLED: "false"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.continuous != true }}
          AUTO_RUN: ${{ github.event_name != 'workflow_dispatch' || inputs.continuous == true }}
          CONTINUOUS: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.continuous == true) }}
        shell: bash
        run: |
          set -uo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          runtime_files=(
            state.json discovery_state.json source_health.json source_stats.json
            unknown_timer_samples.json public_sources.txt source_catalog.txt
            monitor_status.json
          )

          shift_end=$(( $(date +%s) + 19800 ))
          last_commit_at=0
          iteration=0

          while true; do
            iteration=$((iteration + 1))
            started_at=$(date +%s)
            echo "=== BB V.G. check $iteration at $(date -u +%FT%TZ) ==="

            iteration_ok=true
            timeout --signal=TERM --kill-after=30s 600s python bbvg_monitor_main.py 2>&1 | tee monitor-run.log || iteration_ok=false
            if [[ "$iteration_ok" != "true" ]]; then
              echo "BB V.G. monitor iteration failed or exceeded 10 minutes; the loop will save status and retry."
            fi

            ITERATION="$iteration" ITERATION_OK="$iteration_ok" GITHUB_RUN_ID_VALUE="${GITHUB_RUN_ID:-}" python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc)
          try:
              state = json.loads(Path("state.json").read_text(encoding="utf-8"))
          except Exception:
              state = {}
          try:
              stats = json.loads(Path("source_stats.json").read_text(encoding="utf-8"))
          except Exception:
              stats = {}

          summary = state.get("last_run_summary", {}) if isinstance(state, dict) else {}
          source_rows = stats.get("sources", {}) if isinstance(stats, dict) else {}
          checks_total = sum(
              int(entry.get("checks", 0) or 0)
              for entry in source_rows.values()
              if isinstance(entry, dict)
          ) if isinstance(source_rows, dict) else 0

          payload = {
              "version": 2,
              "brand": "BB V.G.",
              "status": "running" if os.environ.get("ITERATION_OK") == "true" else "iteration_error",
              "run_id": os.environ.get("GITHUB_RUN_ID_VALUE", ""),
              "iteration": int(os.environ.get("ITERATION", "0") or 0),
              "last_iteration_at": now.isoformat(),
              "checked_sources": int(summary.get("checked_sources", 0) or 0) if isinstance(summary, dict) else 0,
              "reachable_sources": int(summary.get("reachable_sources", 0) or 0) if isinstance(summary, dict) else 0,
              "source_errors": int(summary.get("source_errors", 0) or 0) if isinstance(summary, dict) else 0,
              "checks_total": checks_total,
              "pending_wheels": 0,
          }
          Path("monitor_status.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

            now_ts=$(date +%s)
            if [[ "$CONTINUOUS" != "true" ]] || (( last_commit_at == 0 || now_ts - last_commit_at >= 900 || now_ts >= shift_end )); then
              if ! git diff --quiet -- "${runtime_files[@]}"; then
                git add "${runtime_files[@]}"
                git commit -m "Update BB V.G. runtime data [skip ci]" || true
                git pull --rebase origin "${GITHUB_REF_NAME:-main}" || true
                git push origin "HEAD:${GITHUB_REF_NAME:-main}" || echo "Runtime push failed; will retry later."
              fi
              last_commit_at=$now_ts
            fi

            if [[ "$CONTINUOUS" != "true" ]] || (( now_ts >= shift_end )); then
              break
            fi

            interval_seconds=$(python - <<'PY'
          import json
          try:
              data = json.load(open('bot_access.json', encoding='utf-8'))
              value = int(data.get('settings', {}).get('monitor_interval_minutes', 5))
          except Exception:
              value = 5
          value = value if value in {1, 3, 5, 10, 15, 30} else 5
          print(value * 60)
          PY
            )

            elapsed=$(( $(date +%s) - started_at ))
            sleep_for=$(( interval_seconds - elapsed ))
            if (( sleep_for > 0 )); then
              echo "Previous check finished in ${elapsed}s. Next check in ${sleep_for}s."
              sleep "$sleep_for"
            else
              echo "Previous check took ${elapsed}s; configured interval already elapsed."
            fi
          done

      - name: Start next continuous shift
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.continuous == true)) }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true
