name: Migrate BB V.G. private state

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: bbvg-private-state-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

    steps:
      - name: Checkout complete history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate migration source
        run: |
          python -m py_compile migrate_private_state.py
          python migrate_private_state.py --check

      - name: Migrate records to D1
        run: python migrate_private_state.py

      - name: Restart state consumers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run cloudflare-pages.yml --ref main
          gh workflow run admin-bot.yml --ref main
          gh workflow run monitor.yml --ref main -f continuous=true
