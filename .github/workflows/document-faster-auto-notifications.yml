name: Document faster auto participation notifications

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/document-faster-auto-notifications.yml"

permissions:
  contents: write

jobs:
  document:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Update architecture notes and changelog
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          from pathlib import Path

          agents = Path("AGENTS.md")
          text = agents.read_text(encoding="utf-8")
          old = "Запуски `auto-participation.yml` сериализованы без отмены активного запуска; результат объединяется с последним `state.json` перед каждым push."
          new = "Запуски `auto-participation.yml` сериализованы без отмены активного запуска. Подтверждённый успех основной event-попытки сразу ставится в очередь Control Center; затем выполняется быстрый независимый retry только по уже найденным активным колёсам, проверяются второй аккаунт владельца и `xFLARXx`, а промежуточный результат публикуется в `state.json` до полного пересканирования источников. Полный source-recovery остаётся страховочным вторым проходом, и каждый push объединяется с последним `state.json`."
          if old not in text:
              raise SystemExit("AGENTS auto participation paragraph not found")
          text = text.replace(old, new, 1)
          marker = "- Непрерывность Control Center обеспечивается штатным `admin-bot.yml`:"
          replacement = "- Pending-исходы автоучастия проверяются Control Center каждые 5 секунд; snapshot состояния для этой проверки обновляется каждые 5 секунд. Защитная стабилизация отрицательного исхода сохраняется, чтобы временный browser/network-сбой не выдавался за окончательный отказ.\n" + marker
          if marker not in text:
              raise SystemExit("AGENTS control center marker not found")
          agents.write_text(text.replace(marker, replacement, 1), encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog.read_text(encoding="utf-8")
          marker = "---\n\n"
          entry = '''---

## 2026-07-23 — Ускорена доставка итогов автоучастия

Успешный исход основной event-попытки теперь сразу ставится в очередь единственного Control Center. До полного пересканирования Telegram-источников выполняется быстрый независимый повтор только по уже найденным активным колёсам; в этом же проходе проверяются второй BetBoom-аккаунт владельца и аккаунт `xFLARXx`. Промежуточный подтверждённый результат безопасно объединяется с актуальным `state.json` и публикуется до полного recovery.

Control Center проверяет pending-исходы и обновляет snapshot каждые 5 секунд. Защитная стабилизация отрицательного результата сохранена. Отдельный `xflarxx-auto-participation.yml` оставлен только ручным fallback, поэтому штатная доставка больше не ждёт его дополнительного запуска после общего workflow.

**Pre-update backup:** `backup/2026-07-23-before-faster-auto-notifications` (`c07a136bb356da5bb429bfdcbd618832afa17f80`).

'''
          if marker not in text:
              raise SystemExit("Changelog marker not found")
          changelog.write_text(text.replace(marker, entry, 1), encoding="utf-8")
          PY
          git rm .github/workflows/document-faster-auto-notifications.yml
          git add AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Документировать ускорение уведомлений автоучастия [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1
