name: Chapter 3 contract audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact proposed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Collect complete repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p chapter3-source
          rsync -a \
            --exclude '.git/' \
            --exclude '.venv/' \
            --exclude 'node_modules/' \
            --exclude 'chapter3-source/' \
            ./ chapter3-source/
          git rev-parse HEAD > chapter3-source/HEAD_SHA

      - name: Upload contract snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chapter3-contract-source-${{ github.run_id }}
          path: chapter3-source
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error
