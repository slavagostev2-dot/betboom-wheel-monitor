name: Chapter 3 final apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply and verify chapter 3
        id: apply
        shell: bash
        run: |
          set -o pipefail
          bash .github/ch3-apply-test.sh 2>&1 | tee chapter3-apply.log

      - name: Commit verified chapter 3
        if: steps.apply.outcome == 'success'
        id: commit
        shell: bash
        run: |
          set -o pipefail
          bash .github/ch3-commit-push.sh 2>&1 | tee chapter3-commit.log

      - name: Upload chapter logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chapter3-logs-${{ github.run_id }}
          path: |
            chapter3-apply.log
            chapter3-commit.log
          retention-days: 1
          if-no-files-found: warn
