name: Maintain dynamic source tiers

on:
  workflow_dispatch:
  schedule:
    - cron: "47 20 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: betboom-source-tier-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check maintenance script
        run: python -m py_compile source_tier_maintenance.py

      - name: Move seven-day inactive sources to nightly monitoring
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          SOURCE_AUTO_DEMOTION_DAYS: "7"
          SOURCE_AUTO_DEMOTION_MIN_COVERAGE_DAYS: "6"
          SOURCE_AUTO_DEMOTION_MIN_CHECKS: "100"
          SOURCE_AUTO_DEMOTION_MAX_CHECK_AGE_HOURS: "2"
        run: python source_tier_maintenance.py

      - name: Save source tier changes
        id: save
        shell: bash
        run: |
          set -euo pipefail
          files=(public_sources.txt source_catalog.txt source_tier_state.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "Source tiers did not change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Maintain dynamic BB V.G. source tiers [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Source tier push attempt ${attempt} failed; rebasing before retry."
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Restart primary monitor after tier changes
        if: steps.save.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true
