name: Maintain dynamic source tiers

on:
  push:
    branches: [main]
    paths:
      - "source_tier_maintenance.py"
      - "source_tier_maintenance_v2.py"
      - ".github/workflows/source-tier-maintenance.yml"
  workflow_dispatch:
  schedule:
    - cron: "47 20 * * *"

permissions:
  contents: read

concurrency:
  group: bb-vg-source-tier-audit
  cancel-in-progress: false

jobs:
  maintain:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check maintenance script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        run: |
          python -m py_compile source_tier_maintenance.py source_tier_maintenance_v2.py bot_private_state.py bot_notification_state.py privacy_retention.py
          python source_tier_maintenance_v2.py --self-test

      - name: Audit sources eligible for manual nightly review
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          SOURCE_AUTO_DEMOTION_DAYS: "7"
          SOURCE_AUTO_DEMOTION_MIN_COVERAGE_DAYS: "6"
          SOURCE_AUTO_DEMOTION_MIN_CHECKS: "100"
          SOURCE_AUTO_DEMOTION_MAX_CHECK_AGE_HOURS: "2"
        run: python source_tier_maintenance_v2.py

      - name: Save source tier audit
        id: save
        shell: bash
        run: |
          set -euo pipefail
          files=(source_tier_state.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "Source tiers did not change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Audit BB V.G. source tiers [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1
