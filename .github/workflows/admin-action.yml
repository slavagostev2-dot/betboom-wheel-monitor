name: Apply BB V.G. admin action
run-name: BB V.G. action — ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: "BB V.G. action name"
        required: true
        type: string
      value:
        description: "Action target"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-monitor-continuous
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate BB V.G. action code
        run: |
          python -m py_compile admin_action.py admin_action_v2.py monitor.py monitor_data.py source_reputation.py source_registry.py notification_router_v2.py
          python admin_action.py --self-test
          python admin_action_v2.py --self-test
          python source_reputation.py
          python notification_router_v2.py

      - name: Apply BB V.G. action
        env:
          ADMIN_ACTION: ${{ inputs.action }}
          ADMIN_VALUE: ${{ inputs.value }}
          DISPLAY_TIMEZONE: Asia/Barnaul
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        run: python admin_action_v2.py

      - name: Save changed runtime state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          files=(state.json source_health.json source_reputation.json source_registry.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "No state changes to commit."
          else
            git add "${files[@]}"
            git commit -m "Apply BB V.G. admin action [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Restart continuous BB V.G. monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true
