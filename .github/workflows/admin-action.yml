name: Apply BB V.G. admin action
run-name: BB V.G. action — ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: "BB V.G. action name"
        required: true
        type: string
      value:
        description: "Action target"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-monitor-continuous
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate BB V.G. action code
        run: |
          python -m py_compile admin_action.py monitor.py monitor_data.py
          python admin_action.py --self-test

      - name: Apply BB V.G. action
        env:
          ADMIN_ACTION: ${{ inputs.action }}
          ADMIN_VALUE: ${{ inputs.value }}
          DISPLAY_TIMEZONE: Asia/Barnaul
        run: python admin_action.py

      - name: Save changed runtime state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          files=(state.json source_health.json source_stats.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "No state changes to commit."
            exit 0
          fi

          git add "${files[@]}"
          git commit -m "Apply BB V.G. admin action [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Admin action push attempt ${attempt} failed; rebasing before retry."
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              echo "Unable to preserve the administrative state change."
              exit 1
            fi
          done
          exit 1

      - name: Restart continuous BB V.G. monitor
        if: ${{ always() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true
