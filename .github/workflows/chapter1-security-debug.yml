name: Chapter 1 security diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_STATE_KEY: "test-state-key"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Compile modules
        run: |
          python -m py_compile \
            bot_private_state.py privacy_retention.py security_audit.py \
            migrate_bot_private_state.py notification_preferences_v2.py \
            admin_panel_runtime_v25.py admin_panel_runtime_v26.py admin_panel_runtime_v28.py \
            admin_panel_runtime_v29.py admin_panel_runtime_v30.py admin_panel_runtime_v31.py \
            admin_panel_runtime_v32.py admin_panel_runtime_v33.py bbvg_monitor_main.py
      - name: Security state tests
        run: |
          python bot_private_state.py
          python privacy_retention.py
          python security_audit.py --self-test
          python security_audit.py --current
          python security_audit.py --history --history-output security_history_report.json
          python migrate_bot_private_state.py --check
          python notification_preferences_v2.py
      - name: Panel v25 test
        run: python admin_panel_runtime_v25.py --self-test
      - name: Panel v26 test
        run: python admin_panel_runtime_v26.py --self-test
      - name: Panel v28 test
        run: python admin_panel_runtime_v28.py --self-test
      - name: Panel v29 test
        run: python admin_panel_runtime_v29.py --self-test
      - name: Panel v30 test
        run: python admin_panel_runtime_v30.py --self-test
      - name: Panel v31 test
        run: python admin_panel_runtime_v31.py --self-test
      - name: Panel v32 test
        run: python admin_panel_runtime_v32.py --self-test
      - name: Panel v33 test
        run: python admin_panel_runtime_v33.py --self-test
      - name: Rating actions tests
        run: |
          python admin_action_v2.py --self-test
          python admin_action_v3.py --self-test
      - name: Wheel runtime tests
        run: |
          python recurring_wheel_events.py
          python wheel_metadata_quality.py
          python wheel_publications_v2.py
          python wheel_lifecycle_v2.py
          python personal_reminder_filter.py
      - name: Reports and sources tests
        run: |
          python source_intelligence_alerts.py
          python -c "import daily_report; daily_report.self_test()"
          python source_tier_maintenance_v2.py --self-test
          python system_checks_v2.py --self-test
      - name: Monitor integration test
        run: |
          python - <<'PY'
          import bbvg_monitor_main
          import notification_router
          assert notification_router._bbvg_notification_preferences_v2_installed is True
          assert notification_router.notification_kind("Время прокрутки колеса наступило") == "wheel_draw_alerts"
          assert notification_router.notification_kind("Напоминание о колесе BetBoom: последний шанс") == "wheel_final_reminders"
          print("monitor integration passed")
          PY
