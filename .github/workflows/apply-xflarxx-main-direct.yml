name: Apply xFLARXx cleanup to main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-xflarxx-main-direct.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEMP_WORKFLOW: .github/workflows/apply-xflarxx-main-direct.yml
      SCRIPT_BRANCH: feature/xflarxx-account-access-cleanup-final
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Apply, compile and publish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$SCRIPT_BRANCH"
          git show "origin/${SCRIPT_BRANCH}:scripts/apply_xflarxx_account_access_cleanup.py" > /tmp/apply_xflarxx.py
          git show "origin/${SCRIPT_BRANCH}:scripts/finalize_xflarxx_account_access_cleanup.py" > /tmp/finalize_xflarxx.py
          python /tmp/apply_xflarxx.py
          python /tmp/finalize_xflarxx.py
          rm -f "$TEMP_WORKFLOW"
          python -m py_compile \
            betboom_account_participation.py \
            auto_participation_notifications.py \
            notification_button_recovery.py \
            bbvg/bot/runtime.py
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              git push origin --delete fix/control-center-unified-notification-release || true
              exit 0
            fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1

      - name: Remove failed temporary workflow
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$TEMP_WORKFLOW" ]]; then
            git rm "$TEMP_WORKFLOW"
            git commit -m "Remove failed xFLARXx main workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
          fi
