name: Telegram source intelligence
run-name: Source intelligence — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "source_intelligence.py"
      - "source_intelligence_entry.py"
      - "source_intelligence_alerts.py"
      - "nightly_discovery.py"
      - "telegram_transport.py"
      - "notification_integrity_v2.py"
      - "notification_delivery_state.json"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "bot_notification_state.py"
      - "privacy_retention.py"
      - ".github/workflows/source-intelligence.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: write

concurrency:
  group: betboom-source-intelligence
  cancel-in-progress: false

jobs:
  intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check intelligence module
        env:
          BOT_TOKEN: "test-bot-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
        run: |
          python -m py_compile monitor.py monitor_data.py nightly_discovery.py source_intelligence.py source_intelligence_entry.py source_intelligence_alerts.py telegram_transport.py notification_router.py notification_integrity_v2.py bot_notification_state.py bot_private_state.py privacy_retention.py
          python telegram_transport.py
          python notification_integrity_v2.py --self-test
          python bot_notification_state.py
          python source_intelligence_alerts.py
          python -m json.tool notification_delivery_state.json >/dev/null
          python self_test.py

      - name: Scan Telegram source network
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          INTELLIGENCE_SOURCE_LIMIT: "100"
          INTELLIGENCE_CANDIDATE_LIMIT: "150"
          INTELLIGENCE_VERIFY_LIMIT: "60"
        run: python source_intelligence_entry.py

      - name: Save intelligence state
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- intelligence_state.json)" ]]; then
            echo "Intelligence data did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intelligence_state.json
          git commit -m "Update Telegram source intelligence [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Intelligence push attempt ${attempt} failed; rebasing before retry."
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1
