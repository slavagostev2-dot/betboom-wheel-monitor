name: Telegram source intelligence
run-name: Source intelligence — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "source_intelligence.py"
      - "source_intelligence_entry.py"
      - "source_intelligence_alerts.py"
      - "promote_betboom_candidates.py"
      - "nightly_discovery.py"
      - "telegram_transport.py"
      - "notification_integrity_v2.py"
      - "notification_delivery_state.json"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "bot_notification_state.py"
      - "privacy_retention.py"
      - ".github/workflows/source-intelligence.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

concurrency:
  group: betboom-source-intelligence
  cancel-in-progress: false

jobs:
  intelligence:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check intelligence module
        env:
          BOT_TOKEN: "test-bot-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
        run: |
          python -m py_compile monitor.py monitor_data.py nightly_discovery.py source_intelligence.py source_intelligence_entry.py source_intelligence_alerts.py promote_betboom_candidates.py telegram_transport.py notification_router.py notification_integrity_v2.py bot_notification_state.py bot_private_state.py privacy_retention.py
          python telegram_transport.py
          python notification_integrity_v2.py --self-test
          python bot_notification_state.py
          python source_intelligence_alerts.py
          python promote_betboom_candidates.py --help >/dev/null 2>&1 || true
          python - <<'PY'
          import promote_betboom_candidates
          promote_betboom_candidates.self_test()
          PY
          python -m json.tool notification_delivery_state.json >/dev/null
          python self_test.py

      - name: Scan Telegram source network
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          INTELLIGENCE_SOURCE_LIMIT: "250"
          INTELLIGENCE_CANDIDATE_LIMIT: "200"
          INTELLIGENCE_VERIFY_LIMIT: "150"
        run: python source_intelligence_entry.py

      - name: Promote verified BetBoom candidates
        run: python promote_betboom_candidates.py

      - name: Save intelligence state and promoted sources
        shell: bash
        run: |
          set -euo pipefail
          files=(intelligence_state.json public_sources.txt)
          if git diff --quiet -- "${files[@]}"; then
            echo "Intelligence data and primary source list did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Update Telegram source intelligence and BetBoom candidates [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Intelligence push attempt ${attempt} failed; rebasing before retry."
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1
