name: Validate bot-only recovery

on:
  pull_request:
    branches: [main]
    paths:
      - "admin_*.py"
      - "bot_*.py"
      - "bot_private_state.enc.json"
      - "migrate_bot_private_state.py"
      - "rating_policy.py"
      - "bbvg_monitor_main.py"
      - "daily_report_entry.py"
      - "nightly_discovery_entry.py"
      - "source_intelligence_entry.py"
      - "source_tier_maintenance_v2.py"
      - "system_checks_v2.py"
      - "sitecustomize.py"
      - "MINI_APP_ARCHIVED.md"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate bot runtime
        run: |
          set -euo pipefail
          python -m py_compile \
            bot_private_state.py bot_notification_state.py migrate_bot_private_state.py \
            admin_action.py admin_action_v2.py rating_policy.py \
            admin_panel_runtime_v24.py admin_panel_runtime_v25.py \
            bbvg_monitor_main.py daily_report_entry.py nightly_discovery_entry.py \
            source_intelligence_entry.py source_tier_maintenance_v2.py \
            system_checks_v2.py sitecustomize.py
          python bot_private_state.py
          python migrate_bot_private_state.py --check
          python admin_action_v2.py --self-test
          python admin_panel_runtime_v24.py --self-test
          python admin_panel_runtime_v25.py --self-test
          python source_tier_maintenance_v2.py --self-test
          python system_checks_v2.py --self-test

      - name: Validate recovery invariants
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          access = json.loads(Path("bot_access.json").read_text(encoding="utf-8"))
          assert access.get("users") == {}, "Public bot_access.json must stay empty"
          assert not access.get("owner_id"), "Public owner_id must stay empty"
          assert access.get("admins") == [], "Public admins must stay empty"
          assert access.get("notification_recipients") == [], "Public recipients must stay empty"

          panel = Path("admin_panel_runtime_v25.py").read_text(encoding="utf-8")
          workflow = Path(".github/workflows/admin-bot.yml").read_text(encoding="utf-8")
          sitecustomize = Path("sitecustomize.py").read_text(encoding="utf-8")
          pages = Path(".github/workflows/cloudflare-pages.yml").read_text(encoding="utf-8")
          worker = Path(".github/workflows/state-api.yml").read_text(encoding="utf-8")

          assert "register_user(registration_message)" in panel
          assert "page:app\" not in admin_callbacks" in panel
          assert "admin_panel_runtime_v25.py" in workflow
          assert "private_state" not in workflow
          assert "private_state" not in sitecustomize
          assert "archived and disabled" in pages
          assert "archived and disabled" in worker
          assert Path("MINI_APP_ARCHIVED.md").exists()
          print("Bot-only recovery invariants passed")
          PY

      - name: Protect frozen Mini App files
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          changed="$(git diff --name-only origin/main...HEAD)"
          forbidden="$(printf '%s\n' "$changed" | grep -E '^(docs/|state_api/)' || true)"
          if [[ -n "$forbidden" ]]; then
            echo "Frozen Mini App files were changed:" >&2
            echo "$forbidden" >&2
            exit 1
          fi
