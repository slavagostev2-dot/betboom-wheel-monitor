name: Validate bot-only recovery

on:
  pull_request:
    branches: [main]
    paths:
      - "admin_*.py"
      - "bot_*.py"
      - "bbvg/bot/**"
      - "bot_private_state.enc.json"
      - "notification_*.py"
      - "telegram_ui.py"
      - "notification_delivery_state.json"
      - "migrate_bot_private_state.py"
      - "privacy_retention.py"
      - "security_audit.py"
      - "test_bot_state_fixture.py"
      - "rating_policy.py"
      - "bbvg_monitor_main.py"
      - "wheel_*.py"
      - "personal_reminder_filter.py"
      - "daily_report.py"
      - "source_intelligence_alerts.py"
      - "source_tier_maintenance_v2.py"
      - "system_checks_v2.py"
      - "sitecustomize.py"
      - "SECURITY_RU.md"
      - "CHAPTER_2_RU.md"
      - "CHAPTER_4_RU.md"
      - "chapter4_acceptance.py"
      - "MINI_APP_ARCHIVED.md"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_STATE_KEY: "test-state-key"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate encrypted bot runtime
        run: |
          set -euo pipefail
          python -m compileall -q bbvg tests
          python -m py_compile \
            bot_private_state.py bot_notification_state.py notification_integrity_v2.py \
            migrate_bot_private_state.py privacy_retention.py security_audit.py \
            test_bot_state_fixture.py notification_preferences_v2.py \
            admin_panel_runtime_v25.py admin_panel_runtime_v26.py \
            admin_panel_runtime_v28.py admin_panel_runtime_v29.py \
            admin_panel_runtime_v30.py admin_panel_runtime_v31.py \
            admin_panel_runtime_v32.py admin_panel_runtime_v36.py \
            admin_panel_runtime_v37.py admin_panel_runtime_v38.py \
            admin_panel_runtime_v41.py telegram_ui.py chapter4_acceptance.py \
            bbvg_monitor_main.py recurring_wheel_events.py wheel_event_runtime.py \
            wheel_metadata_quality.py wheel_publications_v2.py wheel_lifecycle_v2.py \
            personal_reminder_filter.py daily_report.py source_intelligence_alerts.py \
            source_tier_maintenance_v2.py system_checks_v2.py sitecustomize.py
          python -m bbvg.bot.storage
          python -m bbvg.bot.users
          python -m bbvg.bot.runtime --self-test
          python bot_private_state.py
          python notification_integrity_v2.py --self-test
          python bot_notification_state.py
          python privacy_retention.py
          python security_audit.py --self-test
          python security_audit.py --current
          python security_audit.py --history --history-output security_history_report.json
          python migrate_bot_private_state.py --check
          python notification_preferences_v2.py
          python test_bot_state_fixture.py
          python admin_panel_runtime_v36.py --self-test
          python admin_panel_runtime_v37.py --self-test
          python admin_panel_runtime_v38.py --self-test
          python admin_panel_runtime_v41.py --self-test
          python chapter4_acceptance.py

      - name: Validate privacy, role and delivery invariants
        run: |
          set -euo pipefail
          python - <<'PY'
          import inspect
          import json
          from pathlib import Path
          from admin_panel_runtime_v38 import TelegramPanelRuntimeV38
          from bbvg.bot.storage import PrivateStateRuntime
          from bbvg.bot.users import UserSettingsMixin

          access = json.loads(Path('bot_access.json').read_text(encoding='utf-8'))
          assert access.get('users') == {}
          assert not access.get('owner_id')
          assert access.get('admins') == []
          assert access.get('notification_recipients') == []
          requests = json.loads(Path('source_requests.json').read_text(encoding='utf-8'))
          assert requests.get('requests') == {}

          encrypted = json.loads(Path('bot_private_state.enc.json').read_text(encoding='utf-8'))
          assert encrypted.get('format') == 'bbvg-bot-state-v2'
          assert encrypted.get('key_mode') == 'dedicated'
          assert encrypted.get('algorithm') == 'AES-256-GCM'
          assert not {'users', 'owner_id', 'chat_id', 'username'} & set(encrypted)

          ledger = json.loads(Path('notification_delivery_state.json').read_text(encoding='utf-8'))
          assert ledger.get('format') == 'bbvg-notification-delivery-v2'
          assert ledger.get('algorithm') == 'HMAC-SHA256'
          assert isinstance(ledger.get('entries'), dict)
          serialized_ledger = json.dumps(ledger, ensure_ascii=False)
          for forbidden in ('chat_id', 'user_id', 'username', 'message_text', 'https://telegram'):
              assert forbidden not in serialized_ledger

          storage_source = inspect.getsource(PrivateStateRuntime)
          users_source = inspect.getsource(UserSettingsMixin)
          workflow = Path('.github/workflows/admin-bot.yml').read_text(encoding='utf-8')
          monitor_workflow = Path('.github/workflows/monitor.yml').read_text(encoding='utf-8')
          assert '_load_remote_bundle' in storage_source
          assert '_merge_access' in storage_source
          assert 'access_signature' in storage_source
          assert 'result.pop' in storage_source
          assert 'usernotify:' in users_source
          assert 'usernotifyall:' in users_source
          assert 'privacy:delete:' in users_source
          assert 'Управлять уведомлениями' in inspect.getsource(
              TelegramPanelRuntimeV38.show_user_detail
          )
          assert 'run: python admin_panel_runtime_v41.py' in workflow
          assert 'notification_delivery_state.json' in monitor_workflow
          assert 'wheel_draw_alerts' in Path('admin_panel_runtime_v37.py').read_text(encoding='utf-8')

          user_callbacks = {
              button['callback_data']
              for row in TelegramPanelRuntimeV38.compact_menu_rows(False)
              for button in row
          }
          assert 'page:status' in user_callbacks
          assert 'page:reports' not in user_callbacks

          pages = Path('.github/workflows/cloudflare-pages.yml').read_text(encoding='utf-8')
          worker = Path('.github/workflows/state-api.yml').read_text(encoding='utf-8')
          assert 'archived and disabled' in pages
          assert 'archived and disabled' in worker
          assert Path('MINI_APP_ARCHIVED.md').exists()
          assert Path('CHAPTER_2_RU.md').exists()
          assert Path('CHAPTER_4_RU.md').exists()

          history = json.loads(Path('security_history_report.json').read_text(encoding='utf-8'))
          assert 'destructive_cleanup_required' in history
          print('Consolidated private state and role invariants passed')
          PY
