name: BB V.G. one-shot v37 import maintenance

on:
  push:
    branches:
      - refactor/consolidate-runtime-v42
    paths:
      - ".github/workflows/refactor-maintenance.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/consolidate-runtime-v42
          fetch-depth: 0
      - name: Point v37 at consolidated notification constants
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("admin_panel_runtime_v37.py")
          text = path.read_text(encoding="utf-8")
          old = "from admin_panel_runtime_v33 import WHEEL_NOTIFICATION_OPTIONS"
          new = "from bbvg.bot.users import WHEEL_NOTIFICATION_OPTIONS"
          if text.count(old) != 1:
              raise SystemExit(f"Expected one v37 import, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_panel_runtime_v37.py
          git commit -m "Use consolidated user notification constants in v37 [skip ci]"
          git pull --rebase origin refactor/consolidate-runtime-v42
          git push origin HEAD:refactor/consolidate-runtime-v42
