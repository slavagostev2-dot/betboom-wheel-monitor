name: BB V.G. one-shot refactor maintenance

on:
  push:
    branches:
      - refactor/consolidate-runtime-v42
    paths:
      - ".github/workflows/refactor-maintenance.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/consolidate-runtime-v42
          fetch-depth: 0
      - name: Correct user settings contract assertion
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("bbvg/bot/users.py")
          text = path.read_text(encoding="utf-8")
          old = 'assert settings.notification_preferences("2")["wheel_final_reminders"] is False'
          new = 'assert settings.notification_preferences("2")["wheel_final_reminders"] is True'
          if text.count(old) != 1:
              raise SystemExit(f"Expected one assertion to replace, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bbvg/bot/users.py
          git commit -m "Correct consolidated user settings self-test [skip ci]"
          git pull --rebase origin refactor/consolidate-runtime-v42
          git push origin HEAD:refactor/consolidate-runtime-v42
