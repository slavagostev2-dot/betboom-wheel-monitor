name: BB V.G. one-shot production validation maintenance

on:
  push:
    branches:
      - refactor/consolidate-runtime-v42
    paths:
      - ".github/workflows/refactor-maintenance.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/consolidate-runtime-v42
          fetch-depth: 0
      - name: Point production validation at consolidated modules
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/admin-bot.yml')
          original = path.read_text(encoding='utf-8')
          output = []
          inserted_modules = False
          for line in original.splitlines(keepends=True):
              stripped = line.strip()
              if stripped in {
                  'python admin_panel_runtime_v33.py --self-test',
                  'python admin_panel_runtime_v35.py --self-test',
              }:
                  continue
              for name in (
                  'admin_panel_runtime_v27.py ',
                  'admin_panel_runtime_v33.py ',
                  'admin_panel_runtime_v34.py ',
                  'admin_panel_runtime_v35.py ',
              ):
                  line = line.replace(name, '')
              line = line.replace(
                  'from admin_panel_runtime_v34 import TelegramPanelRuntimeV34',
                  'from bbvg.bot.users import UserSettingsMixin',
              )
              line = line.replace(
                  'handler = inspect.getsource(TelegramPanelRuntimeV34.handle_callback)',
                  'handler = inspect.getsource(UserSettingsMixin.handle_callback)',
              )
              output.append(line)
              if stripped == 'python admin_action_queue.py':
                  output.append('          python -m bbvg.bot.storage\n')
                  output.append('          python -m bbvg.bot.users\n')
                  inserted_modules = True
          updated = ''.join(output)
          if not inserted_modules:
              raise SystemExit('admin_action_queue self-test anchor not found')
          if updated == original:
              raise SystemExit('admin-bot.yml was not changed')
          path.write_text(updated, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/admin-bot.yml
          git commit -m "Validate production through consolidated user and storage modules [skip ci]"
          git pull --rebase origin refactor/consolidate-runtime-v42
          git push origin HEAD:refactor/consolidate-runtime-v42
