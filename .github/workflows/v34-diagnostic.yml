name: v35 diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - name: Compile v35
        run: python -m py_compile admin_panel_runtime_v34.py admin_panel_runtime_v35.py
      - name: Run complete v35 self-test
        run: python admin_panel_runtime_v35.py --self-test
      - name: Check owner notification mutation
        run: |
          python - <<'PY'
          import copy
          import bot_private_state
          from admin_panel_runtime_v17 import default_source_requests
          from admin_panel_runtime_v35 import TelegramPanelRuntimeV35
          panel = TelegramPanelRuntimeV35()
          access = panel.normalize_access({"owner_id":"1","admins":[],"users":{"1":{"id":"1","chat_id":"10"},"2":{"id":"2","chat_id":"20","notification_preferences":{"wheels":True}}}})
          panel._bot_bundle = bot_private_state.default_bundle(access, default_source_requests())
          panel._bundle_baseline = copy.deepcopy(panel._bot_bundle)
          panel.access = access
          panel.access_loaded = True
          panel.current_user_id = "1"
          panel.current_chat_id = "10"
          panel.current_role = "owner"
          saved = []
          dispatched = []
          panel._save_bot_bundle = lambda message: saved.append(message) or True
          panel.dispatch = lambda workflow, inputs=None: dispatched.append((workflow, inputs))
          panel.set_user_notification("2", "wheel_final_reminders", False)
          assert panel.access["users"]["2"]["notification_preferences"]["wheel_final_reminders"] is False
          assert saved
          assert dispatched and dispatched[-1][0] == "monitor.yml"
          PY
