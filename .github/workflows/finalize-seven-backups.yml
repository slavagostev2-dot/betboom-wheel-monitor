name: Finalize seven backup retention

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/finalize-seven-backups.yml"
  create:

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event_name == 'push' ||
      (github.event.ref_type == 'branch' &&
      github.event.ref == 'backup/2026-07-22-validate-seven-backups')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validate seven-backup contract
        run: |
          set -euo pipefail
          python -m py_compile backup_rotation.py
          python backup_rotation.py --self-test
          python - <<'PY'
          from tests import test_actions_security

          test_actions_security.test_backup_rotation_contract_and_concurrency()
          test_actions_security.test_official_actions_are_immutably_pinned()
          test_actions_security.test_permissions_matrix_is_narrow()
          print("Seven-backup workflow contract passed")
          PY

      - name: Record change and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog_path.read_text(encoding="utf-8")
          heading = "## 2026-07-22 — Ротация хранит семь backup-веток"
          if heading not in text:
              marker = "---\n\n"
              entry = '''## 2026-07-22 — Ротация хранит семь backup-веток

          Лимит обычных веток `backup/*` увеличен с трёх до семи. `backup_rotation.py` и `.github/workflows/bot-state-backup.yml` используют единый fail-closed контракт `KEEP_BACKUPS=7`: только что созданная ветка сохраняется всегда, а удаление начинается только при появлении восьмой проверенной backup-ветки.

          Self-test проверяет переход `8 → 7`, идемпотентный повтор, dry-run и запрет удаления при ошибке проверки ancestry. Security-test отдельно фиксирует значение 7 в Python-модуле и workflow.

          **Pre-update rollback:** `backup/2026-07-22-after-referral-wheel-label`.

          '''
              if marker not in text:
                  raise SystemExit("PROJECT_CHANGELOG_RU.md marker not found")
              changelog_path.write_text(
                  text.replace(marker, marker + entry, 1),
                  encoding="utf-8",
              )

          Path("chapter1_stability.py").write_text(
              '''from __future__ import annotations

          from tests.production_acceptance import stability_acceptance


          def self_test() -> None:
              stability_acceptance()


          if __name__ == "__main__":
              self_test()
          ''',
              encoding="utf-8",
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/finalize-seven-backups.yml
          git add chapter1_stability.py docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Задокументировать хранение семи backup-веток"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
