name: BB V.G. current checks
run-name: BB V.G. current checks — ${{ github.event_name }}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"

    steps:
      - name: Checkout proposed changes
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate Python and source registry
        run: |
          set -euo pipefail
          python -m py_compile \
            source_registry.py admin_action.py admin_action_v2.py rating_policy.py \
            bbvg_monitor_main.py admin_panel_runtime_v22.py admin_panel_runtime_v25.py \
            admin_panel_runtime_v26.py bot_private_state.py bot_notification_state.py \
            migrate_bot_private_state.py system_checks_v2.py source_tier_maintenance_v2.py
          python source_registry.py --self-test
          python source_registry.py
          python - <<'PY'
          import json
          value = json.load(open("source_registry.json", encoding="utf-8"))
          summary = value.get("summary", {})
          assert int(summary.get("total", 0)) == len(value.get("sources", [])), summary
          assert int(summary.get("total", 0)) >= 66, summary
          assert int(summary.get("checked", 0)) == int(summary.get("available", 0)) + int(summary.get("unavailable", 0)), summary
          assert int(summary.get("total", 0)) == int(summary.get("checked", 0)) + int(summary.get("pending", 0)), summary
          print("Registry summary:", summary)
          PY

      - name: Validate bot users and administrator buttons
        run: |
          set -euo pipefail
          python bot_private_state.py
          python migrate_bot_private_state.py --check
          python admin_panel_runtime_v25.py --self-test
          python admin_panel_runtime_v26.py --self-test

      - name: Validate additive administrator rating
        run: |
          set -euo pipefail
          python admin_action.py --self-test
          python admin_action_v2.py --self-test
          python - <<'PY'
          import admin_action_v2
          stats = {"version": 1, "sources": {}, "daily": {}}
          assert admin_action_v2._additive_recorder(
              stats, wheel_key="wheel-a", sources=["sourceA"], decision="confirmed"
          ) is True
          assert stats["sources"]["sourceA"]["quality_score"] == 40
          assert admin_action_v2._additive_recorder(
              stats, wheel_key="wheel-a", sources=["sourceA"], decision="inactive"
          ) is False
          assert stats["sources"]["sourceA"]["quality_score"] == 40
          assert admin_action_v2._additive_recorder(
              stats, wheel_key="wheel-b", sources=["sourceB"], decision="inactive"
          ) is True
          assert stats["sources"]["sourceB"]["quality_score"] == 0
          PY

      - name: Validate monitor and bot-only system installation
        run: |
          set -euo pipefail
          python system_checks_v2.py --self-test
          python source_tier_maintenance_v2.py --self-test
          python - <<'PY'
          import bbvg_monitor_main as runtime
          import bot_notification_state
          import notification_router
          assert runtime.monitor.data_store.load_stats.__module__ == "bbvg_monitor_main"
          assert runtime.monitor.data_store.record_admin_wheel_decision.__module__ == "bbvg_monitor_main"
          assert notification_router.load_config is bot_notification_state.load_config
          print("Bot-only monitor runtime installed")
          PY

      - name: Validate current production boundary
        run: |
          set -euo pipefail
          grep -q 'admin_panel_runtime_v26.py' .github/workflows/admin-bot.yml
          ! grep -q 'run: python admin_panel_runtime_v25.py' .github/workflows/admin-bot.yml
          ! grep -q 'admin_panel_runtime_v24.py' .github/workflows/admin-bot.yml
          grep -q 'archived and disabled' .github/workflows/cloudflare-pages.yml
          grep -q 'archived and disabled' .github/workflows/state-api.yml
          grep -q 'Mini App — архивировано' MINI_APP_ARCHIVED.md
          grep -q 'if page == "app"' admin_panel_runtime_v25.py
          grep -q '_apply_admin_action_direct' admin_panel_runtime_v26.py
