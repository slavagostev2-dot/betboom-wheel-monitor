name: BB V.G. current checks
run-name: BB V.G. current checks — ${{ github.event_name }}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_STATE_KEY: "test-state-key"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"

    steps:
      - name: Checkout proposed changes
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate current source and security modules
        run: |
          set -euo pipefail
          python -m py_compile \
            source_registry.py admin_action.py admin_action_v2.py admin_action_v3.py rating_policy.py \
            bbvg_monitor_main.py recurring_wheel_events.py wheel_metadata_quality.py \
            wheel_publications_v2.py wheel_lifecycle_v2.py personal_reminder_filter.py \
            notification_preferences_v2.py notification_navigation.py notification_integrity_v2.py \
            privacy_retention.py security_audit.py test_bot_state_fixture.py bot_private_state.py \
            bot_notification_state.py migrate_bot_private_state.py daily_report.py \
            source_intelligence_alerts.py system_checks_v2.py source_tier_maintenance_v2.py \
            admin_panel_runtime_v25.py admin_panel_runtime_v26.py admin_panel_runtime_v28.py \
            admin_panel_runtime_v29.py admin_panel_runtime_v30.py admin_panel_runtime_v31.py \
            admin_panel_runtime_v32.py admin_panel_runtime_v33.py admin_panel_runtime_v34.py \
            admin_panel_runtime_v35.py admin_panel_runtime_v36.py
          python source_registry.py --self-test
          python source_registry.py
          python bot_private_state.py
          python notification_integrity_v2.py --self-test
          python bot_notification_state.py
          python privacy_retention.py
          python security_audit.py --self-test
          python security_audit.py --current
          python security_audit.py --history --history-output security_history_report.json
          python migrate_bot_private_state.py --check
          python test_bot_state_fixture.py
          python recurring_wheel_events.py
          python wheel_metadata_quality.py
          python wheel_publications_v2.py
          python wheel_lifecycle_v2.py
          python personal_reminder_filter.py
          python notification_preferences_v2.py
          python notification_navigation.py
          python source_intelligence_alerts.py
          python -c "import daily_report; daily_report.self_test()"
          python system_checks_v2.py --self-test
          python source_tier_maintenance_v2.py --self-test

      - name: Validate roles, notifications and wheel actions
        run: |
          set -euo pipefail
          python admin_action_v2.py --self-test
          python admin_action_v3.py --self-test
          python admin_panel_runtime_v25.py --self-test
          python admin_panel_runtime_v28.py --self-test
          python admin_panel_runtime_v29.py --self-test
          python admin_panel_runtime_v30.py --self-test
          python admin_panel_runtime_v31.py --self-test
          python admin_panel_runtime_v32.py --self-test
          python admin_panel_runtime_v33.py --self-test
          python admin_panel_runtime_v35.py --self-test
          python admin_panel_runtime_v36.py --self-test
          python - <<'PY'
          import inspect
          import json
          import notification_router
          from pathlib import Path
          from admin_panel_runtime_v36 import TelegramPanelRuntimeV36

          def callbacks(rows):
              return [button.get("callback_data") for row in rows for button in row]

          admin_main = callbacks(TelegramPanelRuntimeV36.compact_menu_rows(True))
          user_main = callbacks(TelegramPanelRuntimeV36.compact_menu_rows(False))
          assert len(admin_main) == len(set(admin_main))
          assert len(user_main) == len(set(user_main))
          assert "page:control" in admin_main
          assert "page:status" not in user_main
          assert "usernotify:" in inspect.getsource(TelegramPanelRuntimeV36.handle_callback)
          assert "usernotifyall:" in inspect.getsource(TelegramPanelRuntimeV36.handle_callback)
          assert "_load_remote_bundle" in inspect.getsource(TelegramPanelRuntimeV36._save_bot_bundle)
          assert "_merge_access" in inspect.getsource(TelegramPanelRuntimeV36._save_bot_bundle)
          assert "access_signature" in inspect.getsource(TelegramPanelRuntimeV36.normalize_access)
          assert "USER_ACTION_ERROR" in inspect.getsource(TelegramPanelRuntimeV36.safe_text_for_role)
          assert notification_router._bbvg_notification_integrity_v2_installed is True
          ranking = [
              button["text"]
              for row in TelegramPanelRuntimeV36.source_menu_rows(False)
              for button in row
              if button.get("callback_data") == "page:ranking"
          ]
          assert ranking == ["🏆 Рейтинг источников"]
          ledger = json.loads(Path("notification_delivery_state.json").read_text(encoding="utf-8"))
          assert ledger.get("format") == "bbvg-notification-delivery-v2"
          workflow = Path(".github/workflows/admin-bot.yml").read_text(encoding="utf-8")
          assert "run: python admin_panel_runtime_v36.py" in workflow
          assert '"version": 36' in workflow
          print("v36 chapter 2 roles, notifications and source rating validated")
          PY

      - name: Validate production boundaries
        run: |
          set -euo pipefail
          grep -q 'admin_panel_runtime_v36.py' .github/workflows/admin-bot.yml
          grep -q 'run: python admin_panel_runtime_v36.py' .github/workflows/admin-bot.yml
          ! grep -q 'run: python admin_panel_runtime_v35.py' .github/workflows/admin-bot.yml
          grep -q 'persistent_hmac_delivery_ledger' .github/workflows/admin-bot.yml
          grep -q 'notification_delivery_state.json' .github/workflows/monitor.yml
          grep -q 'Role fingerprint preserved during migration' .github/workflows/admin-bot.yml
          grep -q 'AES-256-GCM' bot_private_state.py
          grep -q 'BOT_STATE_KEY' .github/workflows/admin-bot.yml
          grep -q 'archived and disabled' .github/workflows/cloudflare-pages.yml
          grep -q 'Mini App — архивировано' MINI_APP_ARCHIVED.md
