name: Prepare faster auto participation notifications

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/run-faster-auto-notifications-preparation.yml"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      WORK_BRANCH: feature/faster-auto-participation-notifications
      APPLY_SCRIPT: scripts/apply_faster_auto_notifications.py
      BRANCH_WORKFLOW: .github/workflows/apply-faster-auto-notifications.yml
      MAIN_WORKFLOW: .github/workflows/run-faster-auto-notifications-preparation.yml
    steps:
      - name: Checkout working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/faster-auto-participation-notifications
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Rebase, apply and validate
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          python "$APPLY_SCRIPT"
          python -m pip install -r requirements.txt
          python -m py_compile \
            auto_participation_owner_sync.py \
            auto_participation_recovery.py \
            auto_participation_notifications.py \
            xflarxx_account_participation.py \
            notification_button_recovery.py
          python auto_participation_owner_sync.py
          python auto_participation_recovery.py --self-test
          python auto_participation_notifications.py
          python xflarxx_account_participation.py --self-test
          python notification_button_recovery.py --self-test
          pytest -q
          rm -f "$APPLY_SCRIPT" "$BRANCH_WORKFLOW"
          git add -A
          git commit -m "Ускорить уведомления автоучастия"
          git push --force-with-lease origin "HEAD:${WORK_BRANCH}"

      - name: Remove temporary main workflow
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git rebase --abort || true
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$MAIN_WORKFLOW" ]]; then
            git rm "$MAIN_WORKFLOW"
            git commit -m "Remove completed faster notification preparation [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                exit 0
              fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
