name: Cleanup xFLARXx release scaffolding

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cleanup-xflarxx-release.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Delete obsolete branches and temporary workflows
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin --delete fix/control-center-unified-notification-release || true
          git push origin --delete feature/xflarxx-account-access-cleanup-final || true
          rm -f \
            .github/workflows/apply-xflarxx-main-final.yml \
            .github/workflows/cleanup-xflarxx-release.yml
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove completed xFLARXx release scaffolding [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1
