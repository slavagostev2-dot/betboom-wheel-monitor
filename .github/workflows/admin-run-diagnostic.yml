name: Temporary admin run diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/admin-run-diagnostic.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Show failed production control-center log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29331430769 \
            --repo "${{ github.repository }}" \
            --log-failed
