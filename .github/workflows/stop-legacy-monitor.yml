name: Inspect BB V.G. continuous handoff
run-name: Inspect BB V.G. continuous handoff

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stop-legacy-monitor.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: inspect-bb-vg-continuous-handoff
  cancel-in-progress: true

jobs:
  inspect-handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read continuous run status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(python - <<'PY'
          import json
          print(json.load(open('continuous_handoff.json', encoding='utf-8'))['continuous_run_id'])
          PY
          )
          sleep 10
          gh run view "$run_id" --repo "${GITHUB_REPOSITORY}" --json databaseId,workflowName,event,status,conclusion,createdAt,updatedAt > handoff_run.json
          python - <<'PY'
          import json
          from pathlib import Path
          run = json.loads(Path('handoff_run.json').read_text(encoding='utf-8'))
          payload = {
              'brand': 'BB V.G.',
              'continuous_run_id': str(run.get('databaseId') or ''),
              'workflow': run.get('workflowName'),
              'event': run.get('event'),
              'status': run.get('status'),
              'conclusion': run.get('conclusion'),
              'created_at': run.get('createdAt'),
              'updated_at': run.get('updatedAt'),
          }
          Path('continuous_handoff.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Save inspected status
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add continuous_handoff.json
          git commit -m "Inspect continuous BB V.G. handoff [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main
