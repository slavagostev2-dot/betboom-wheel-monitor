name: Inspect BB V.G. monitor runs
run-name: Inspect BB V.G. monitor runs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stop-legacy-monitor.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: inspect-bb-vg-continuous-handoff
  cancel-in-progress: true

jobs:
  inspect-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: List BB V.G. monitor runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sleep 5
          gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow monitor.yml \
            --limit 15 \
            --json databaseId,workflowName,displayTitle,event,status,conclusion,createdAt,updatedAt,headSha \
            > continuous_runs.json

      - name: Save run list
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add continuous_runs.json
          git commit -m "List BB V.G. monitor runs [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main
