name: Remove obsolete xFLARXx placeholder

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/remove-obsolete-xflarxx-placeholder.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Remove obsolete files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f \
            .github/workflows/cherry-pick-xflarxx-clean.yml \
            .github/workflows/remove-obsolete-xflarxx-placeholder.yml
          git commit -m "Remove obsolete xFLARXx placeholder [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1
