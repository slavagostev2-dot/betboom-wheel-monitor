name: BB V.G. refactor audit and validation

on:
  push:
    branches:
      - refactor/consolidate-runtime-v42
    paths:
      - ".github/workflows/**"
      - "tools/cleanup_audit.py"
      - "bbvg/**"
      - "admin_panel_runtime_v*.py"
      - "chapter*.py"
      - "*.py"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      UNKNOWN_DEDUP_HOURS: "2"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/consolidate-runtime-v42
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile repository
        id: compile
        run: python -m compileall -q .

      - name: Validate consolidated modules
        id: modules
        shell: bash
        run: |
          set +e
          {
            python -m bbvg.bot.foundation
            python -m bbvg.bot.interface
            python -m bbvg.bot.source_requests
            python -m bbvg.bot.wheels
            python -m bbvg.bot.users
            python -m bbvg.bot.sources
            python -m bbvg.bot.storage
            python -m bbvg.bot.runtime --self-test
            python rating_policy.py --self-test
          } 2>&1 | tee /tmp/modules.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Run full pytest suite
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q 2>&1 | tee /tmp/pytest.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Run compatibility acceptance
        id: legacy
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
          python chapter4_acceptance.py
          python chapter5_acceptance.py

      - name: Run consolidated acceptance
        id: acceptance
        run: python tests/production_acceptance.py --section all

      - name: Build dependency audit
        id: dependency
        if: ${{ steps.compile.outcome == 'success' && steps.modules.outcome == 'success' && steps.pytest.outcome == 'success' && steps.legacy.outcome == 'success' && steps.acceptance.outcome == 'success' }}
        run: python tools/cleanup_audit.py

      - name: Build runtime inventory
        id: inventory
        if: ${{ steps.dependency.outcome == 'success' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from bbvg.bot.runtime import TelegramPanelRuntime

          report = json.loads(Path("cleanup_audit.json").read_text(encoding="utf-8"))
          mro = [cls for cls in TelegramPanelRuntime.__mro__ if cls is not object]
          lines = [
              "# BB V.G. — карта методов исторического runtime панели",
              "",
              "Файл генерируется автоматически из AST и фактической MRO текущего runtime.",
              f"Исходный коммит аудита: `{os.environ.get('GITHUB_SHA', 'unknown')}`.",
              "",
              f"- Runtime-файлов: **{report['runtime_file_count']}**",
              f"- В текущей цепочке: **{report['runtime_chain_count']}**",
              f"- Суммарно строк: **{report['runtime_total_lines']}**",
              f"- Уникальных имён методов: **{report['runtime_unique_method_count']}**",
              "",
              "## Фактическая MRO текущей панели",
              "",
          ]
          lines.extend(
              f"{index}. `{cls.__module__}.{cls.__name__}`"
              for index, cls in enumerate(mro, 1)
          )
          lines.extend(["", "## Владельцы фактически действующих методов", ""])
          for cls in mro:
              methods = sorted(
                  name
                  for name, value in cls.__dict__.items()
                  if not name.startswith("__") and callable(value)
              )
              if methods:
                  lines.extend(
                      [
                          f"### `{cls.__module__}.{cls.__name__}` — {len(methods)} методов",
                          "",
                          ", ".join(f"`{name}()`" for name in methods),
                          "",
                      ]
                  )
          Path("docs/RUNTIME_METHOD_INVENTORY_RU.md").write_text(
              "\n".join(lines), encoding="utf-8"
          )
          PY

      - name: Record validation result
        if: ${{ always() }}
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          MODULES_OUTCOME: ${{ steps.modules.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          LEGACY_OUTCOME: ${{ steps.legacy.outcome }}
          ACCEPTANCE_OUTCOME: ${{ steps.acceptance.outcome }}
          DEPENDENCY_OUTCOME: ${{ steps.dependency.outcome }}
          INVENTORY_OUTCOME: ${{ steps.inventory.outcome }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          parts = {
              "compile": os.environ.get("COMPILE_OUTCOME", "unknown"),
              "modules": os.environ.get("MODULES_OUTCOME", "unknown"),
              "pytest": os.environ.get("PYTEST_OUTCOME", "unknown"),
              "legacy": os.environ.get("LEGACY_OUTCOME", "unknown"),
              "acceptance": os.environ.get("ACCEPTANCE_OUTCOME", "unknown"),
              "dependency": os.environ.get("DEPENDENCY_OUTCOME", "unknown"),
              "inventory": os.environ.get("INVENTORY_OUTCOME", "unknown"),
          }
          result = {
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "source_sha": os.environ.get("GITHUB_SHA", ""),
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "result": "success" if all(value == "success" for value in parts.values()) else "failure",
              "parts": parts,
              "stage": "full_refactor_validation_and_audit",
          }
          for key, filename in (("modules_tail", "/tmp/modules.log"), ("pytest_tail", "/tmp/pytest.log")):
              part = key.split("_", 1)[0]
              path = Path(filename)
              if parts.get(part) != "success" and path.exists():
                  result[key] = "\n".join(
                      path.read_text(encoding="utf-8", errors="replace").splitlines()[-100:]
                  )
          Path("refactor_validation_status.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add refactor_validation_status.json
          if [ -f cleanup_audit.json ]; then
            git add cleanup_audit.json docs/RUNTIME_METHOD_INVENTORY_RU.md
          fi
          git commit -m "Update refactor validation and audit reports [skip ci]" || exit 0
          git pull --rebase origin refactor/consolidate-runtime-v42 || { git rebase --abort || true; exit 1; }
          git push origin HEAD:refactor/consolidate-runtime-v42
