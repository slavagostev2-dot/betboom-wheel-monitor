name: BB V.G. system health
run-name: BB V.G. system health — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "system_checks.py"
      - "system_checks_v2.py"
      - "system_checks_v3.py"
      - "incident_manager.py"
      - "monitor_health.py"
      - "monitor_status.json"
      - "bbvg/ai_core.py"
      - "bbvg/health_inspector.py"
      - "ai_runtime_state.json"
      - "telegram_transport.py"
      - "notification_router.py"
      - "notification_integrity_v2.py"
      - "chapter2_unified_logic.py"
      - "rating_policy.py"
      - "wheel_publications_v2.py"
      - "wheel_event_runtime.py"
      - "notification_delivery_state.json"
      - "admin_action_queue.py"
      - "admin_panel_status.json"
      - "chapter1_stability.py"
      - "bot_notification_state.py"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "privacy_retention.py"
      - "monitor_data.py"
      - "source_intelligence.py"
      - "nightly_discovery.py"
      - "source_transport_state.json"
      - "admin_panel_runtime_v41.py"
      - "bbvg/bot/**"
      - "telegram_ui.py"
      - "chapter4_acceptance.py"
      - "public_sources.txt"
      - "source_catalog.txt"
      - "partners_catalog.json"
      - ".github/workflows/system-health.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "BB V.G. wheel monitor"
      - "BB V.G. Control Center"
      - "Telegram candidate discovery"
      - "Telegram source intelligence"
      - "Telegram transport checks"
      - "Verify configured Telegram source transport"
    types: [completed]
    branches: [main]
  schedule:
    - cron: "7,22,37,52 * * * *"
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: bb-vg-system-health-${{ github.event_name == 'schedule' && github.event.schedule || github.event_name }}
  cancel-in-progress: true

jobs:
  monitor-watchdog:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *' }}
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Check monitor heartbeat freshness
        id: heartbeat
        shell: bash
        run: |
          set -euo pipefail
          max_age_seconds=1200
          heartbeat=$(jq -r '.last_process_heartbeat_at // .last_iteration_at // empty' monitor_status.json)
          run_id=$(jq -r '.workflow_run_id // .run_id // empty' monitor_status.json)
          stale=false
          age_seconds=999999

          if [[ -n "$heartbeat" ]]; then
            heartbeat_epoch=$(date -u -d "$heartbeat" +%s 2>/dev/null || echo 0)
            now_epoch=$(date -u +%s)
            if (( heartbeat_epoch > 0 )); then
              age_seconds=$(( now_epoch - heartbeat_epoch ))
              if (( age_seconds < 0 )); then
                age_seconds=0
              fi
            fi
          fi

          if [[ -z "$heartbeat" ]] || (( age_seconds > max_age_seconds )); then
            stale=true
          fi

          echo "stale=$stale" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "age_seconds=$age_seconds" >> "$GITHUB_OUTPUT"
          echo "Monitor heartbeat age: $(( age_seconds / 60 )) minute(s); stale=$stale; run_id=${run_id:-unknown}"

      - name: Replace stale monitor
        if: ${{ steps.heartbeat.outputs.stale == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          STALE_RUN_ID: ${{ steps.heartbeat.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          newer_active=0
          if [[ "$STALE_RUN_ID" =~ ^[0-9]+$ ]]; then
            newer_active=$(gh run list \
              --workflow monitor.yml \
              --limit 20 \
              --json databaseId,status \
              | jq --argjson stale "$STALE_RUN_ID" \
                '[.[] | select((.status == "queued" or .status == "in_progress") and .databaseId > $stale)] | length')
          fi

          if (( newer_active > 0 )); then
            echo "A newer monitor replacement is already queued or running; watchdog will not duplicate it."
            exit 0
          fi

          echo "Monitor heartbeat is stale; requesting an authoritative replacement."
          gh workflow run monitor.yml --ref main -f continuous=true -f replace=true

  health:
    if: ${{ github.event_name != 'schedule' || github.event.schedule != '*/5 * * * *' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate bot-only health modules
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: |
          set -euo pipefail
          for version in $(seq 25 40); do
            test ! -e "admin_panel_runtime_v${version}.py" || {
              echo "Historical panel runtime remains: admin_panel_runtime_v${version}.py" >&2
              exit 1
            }
          done
          python -m compileall -q bbvg
          python -m py_compile system_checks.py system_checks_v2.py system_checks_v3.py incident_manager.py monitor_health.py telegram_transport.py notification_router.py notification_integrity_v2.py wheel_publications_v2.py rating_policy.py chapter2_unified_logic.py admin_action_queue.py chapter1_stability.py bot_notification_state.py bot_private_state.py privacy_retention.py monitor.py monitor_data.py admin_panel_runtime_v41.py telegram_ui.py chapter4_acceptance.py
          python monitor_health.py --self-test
          python -m bbvg.bot.storage
          python -m bbvg.bot.users
          python notification_integrity_v2.py --self-test
          python chapter2_unified_logic.py
          python bot_notification_state.py
          python telegram_transport.py
          python incident_manager.py
          python system_checks_v3.py --self-test
          python chapter1_stability.py
          python - <<'PY'
          import bot_notification_state
          import notification_router
          notification_router.load_config = bot_notification_state.load_config
          assert notification_router.load_config is bot_notification_state.load_config
          assert notification_router._bbvg_notification_integrity_v2_installed is True
          print("Persistent notification integrity is active in system health")
          PY

      - name: Verify configured AI provider
        env:
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "health_inspector"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          from bbvg.ai_core import AIConfig
          config = AIConfig.from_env()
          assert config.provider in {"gemini", "openai"}, "Unsupported BBVG_AI_PROVIDER"
          assert config.model, "BBVG_AI_MODEL is empty"
          assert config.provider_configured(), "Selected AI provider key is missing"
          print(f"AI provider configured: {config.provider}/{config.model}")
          PY

      - name: Run centralized bot checks
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
          MONITOR_MAX_AGE_MINUTES: "20"
          ADMIN_PANEL_MAX_AGE_MINUTES: "20"
          REQUEST_TIMEOUT_SECONDS: "15"
          DISPLAY_TIMEZONE: Asia/Barnaul
          BBVG_AI_ENABLED: "true"
          BBVG_AI_FEATURES: "health_inspector"
          BBVG_AI_PROVIDER: ${{ vars.BBVG_AI_PROVIDER }}
          BBVG_AI_MODEL: ${{ vars.BBVG_AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python system_checks_v3.py

      - name: Save incident state
        shell: bash
        run: |
          set -euo pipefail
          files=(incident_state.json system_check_state.json ai_runtime_state.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "System health state did not change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Update BB V.G. incident state [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1
