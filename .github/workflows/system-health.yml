name: BB V.G. system health
run-name: BB V.G. system health — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "system_checks.py"
      - "system_checks_v2.py"
      - "incident_manager.py"
      - "telegram_transport.py"
      - "notification_router.py"
      - "notification_integrity_v2.py"
      - "chapter2_unified_logic.py"
      - "rating_policy.py"
      - "wheel_publications_v2.py"
      - "wheel_event_runtime.py"
      - "notification_delivery_state.json"
      - "admin_action_queue.py"
      - "admin_panel_status.json"
      - "chapter1_stability.py"
      - "bot_notification_state.py"
      - "bot_private_state.py"
      - "bot_private_state.enc.json"
      - "privacy_retention.py"
      - "monitor_data.py"
      - "source_intelligence.py"
      - "nightly_discovery.py"
      - "source_transport_state.json"
      - "admin_panel_runtime_v25.py"
      - "admin_panel_runtime_v36.py"
      - "admin_panel_runtime_v37.py"
      - "admin_panel_runtime_v38.py"
      - "bbvg/bot/**"
      - "telegram_ui.py"
      - "chapter4_acceptance.py"
      - "public_sources.txt"
      - "source_catalog.txt"
      - "partners_catalog.json"
      - ".github/workflows/system-health.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "BB V.G. wheel monitor"
      - "BB V.G. Control Center"
      - "Telegram candidate discovery"
      - "Telegram source intelligence"
      - "Telegram transport checks"
      - "Verify configured Telegram source transport"
    types: [completed]
    branches: [main]
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: read

concurrency:
  group: bb-vg-system-health
  cancel-in-progress: true

jobs:
  health:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate bot-only health modules
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: |
          python -m compileall -q bbvg
          python -m py_compile system_checks.py system_checks_v2.py incident_manager.py telegram_transport.py notification_router.py notification_integrity_v2.py wheel_publications_v2.py rating_policy.py chapter2_unified_logic.py admin_action_queue.py chapter1_stability.py bot_notification_state.py bot_private_state.py privacy_retention.py monitor.py monitor_data.py admin_panel_runtime_v36.py admin_panel_runtime_v37.py admin_panel_runtime_v38.py telegram_ui.py chapter4_acceptance.py
          python -m bbvg.bot.storage
          python -m bbvg.bot.users
          python notification_integrity_v2.py --self-test
          python chapter2_unified_logic.py
          python bot_notification_state.py
          python telegram_transport.py
          python incident_manager.py
          python system_checks_v2.py --self-test
          python chapter1_stability.py
          python - <<'PY'
          import bot_notification_state
          import notification_router
          notification_router.load_config = bot_notification_state.load_config
          assert notification_router.load_config is bot_notification_state.load_config
          assert notification_router._bbvg_notification_integrity_v2_installed is True
          print("Persistent notification integrity is active in system health")
          PY

      - name: Run centralized bot checks
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
          MONITOR_MAX_AGE_MINUTES: "20"
          ADMIN_PANEL_MAX_AGE_MINUTES: "20"
          REQUEST_TIMEOUT_SECONDS: "15"
          DISPLAY_TIMEZONE: Asia/Barnaul
        run: python system_checks_v2.py

      - name: Save incident state
        shell: bash
        run: |
          set -euo pipefail
          files=(incident_state.json system_check_state.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "System health state did not change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Update BB V.G. incident state [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1
