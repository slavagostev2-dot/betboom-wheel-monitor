name: BB V.G. auto participation

on:
  workflow_dispatch:
    inputs:
      probe:
        description: "Run isolated zonertg11 button probe instead of normal auto participation"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: bb-vg-auto-participation
  cancel-in-progress: false

jobs:
  participate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Refresh latest monitor state
        run: |
          sleep 2
          git fetch origin main
          git reset --hard origin/main

      - name: Detect isolated probe request
        id: mode
        shell: bash
        run: |
          if [[ "${{ inputs.probe }}" == "true" || -f auto_participation_probe.trigger ]]; then
            echo "probe=true" >> "$GITHUB_OUTPUT"
          else
            echo "probe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run isolated participation probe
        if: ${{ steps.mode.outputs.probe == 'true' }}
        env:
          BETBOOM_PROBE_URL: "https://betboom.ru/freestream/zonertg11"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
          BETBOOM_BROWSER_CHANNEL: chrome
        run: python auto_participation_probe.py

      - name: Persist isolated probe result
        if: ${{ always() && steps.mode.outputs.probe == 'true' }}
        run: |
          test -f auto_participation_probe_result.json || echo '{"status":"result_missing"}' > auto_participation_probe_result.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auto_participation_probe_result.json
          git rm -f auto_participation_probe.trigger || true
          git commit -m "Record isolated auto participation probe [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Validate auto participation
        if: ${{ steps.mode.outputs.probe != 'true' }}
        env:
          BETBOOM_AUTO_PARTICIPATE: "true"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
          BETBOOM_ACCOUNT2_TELEGRAM_USER: "Вячеслав"
        run: |
          python - <<'PY'
          import betboom_auto_participation as auto
          import auto_participation_recovery
          import auto_participation_bot_sync
          import auto_participation_owner_sync
          import betboom_account_participation
          import betboom_participation_browser
          required = ("_event_token", "_eligible_for_event_attempt", "process_new_wheel_events")
          missing = [name for name in required if not hasattr(auto, name)]
          if missing:
              raise SystemExit("Missing auto participation functions: " + ", ".join(missing))
          if not auto.configured():
              raise SystemExit("Primary BetBoom auto participation session is not configured")
          if not betboom_account_participation.configured():
              raise SystemExit("Vyacheslav second BetBoom session PART3/PART4 is not configured")
          assert callable(auto_participation_recovery.run_recovery)
          assert callable(auto_participation_bot_sync.queue_confirmed_participation)
          assert callable(auto_participation_bot_sync.merge_auto_participation_state)
          assert callable(auto_participation_owner_sync.sync_once)
          assert callable(betboom_participation_browser.participate)
          auto_participation_recovery.self_test()
          auto_participation_bot_sync.self_test()
          auto_participation_owner_sync.self_test()
          betboom_account_participation.self_test()
          print("Auto participation preflight OK for both BetBoom accounts")
          PY

      - name: Run event-based auto participation
        if: ${{ steps.mode.outputs.probe != 'true' }}
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          BETBOOM_AUTO_PARTICIPATE: "true"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
          BETBOOM_BROWSER_CHANNEL: chrome
          BETBOOM_PARTICIPATION_TIMEOUT_MS: "20000"
        run: python auto_participation_worker.py

      - name: Recover fresh active wheels independently of monitor state
        if: ${{ steps.mode.outputs.probe != 'true' }}
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          BETBOOM_AUTO_PARTICIPATE: "true"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
          BETBOOM_BROWSER_CHANNEL: chrome
          BETBOOM_PARTICIPATION_TIMEOUT_MS: "30000"
          TELEGRAM_WEB_DOMAIN: telegram.me
          REQUEST_TIMEOUT_SECONDS: "10"
          MAX_WORKERS: "24"
        shell: bash
        run: |
          set -o pipefail
          python auto_participation_recovery.py | tee /tmp/bbvg-auto-participation-recovery.json

      - name: Run second BetBoom account for Vyacheslav
        if: ${{ steps.mode.outputs.probe != 'true' }}
        continue-on-error: true
        env:
          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
          BETBOOM_ACCOUNT2_TELEGRAM_USER: "Вячеслав"
          BETBOOM_BROWSER_CHANNEL: chrome
          BETBOOM_PARTICIPATION_TIMEOUT_MS: "30000"
        run: |
          test -s /tmp/bbvg-auto-participation-recovery.json || echo '{}' > /tmp/bbvg-auto-participation-recovery.json
          python betboom_account_participation.py \
            --recovery-result /tmp/bbvg-auto-participation-recovery.json

      - name: Queue confirmed participation for Control Center
        if: ${{ always() && steps.mode.outputs.probe != 'true' }}
        shell: bash
        run: |
          test -s /tmp/bbvg-auto-participation-recovery.json || echo '{}' > /tmp/bbvg-auto-participation-recovery.json
          python auto_participation_bot_sync.py --recovery-result /tmp/bbvg-auto-participation-recovery.json

      - name: Persist participation state without losing concurrent monitor updates
        if: ${{ always() && steps.mode.outputs.probe != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cp state.json /tmp/bbvg-auto-participation-local-state.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            git show origin/main:state.json > /tmp/bbvg-auto-participation-remote-state.json
            python auto_participation_bot_sync.py \
              --merge-local /tmp/bbvg-auto-participation-local-state.json \
              --merge-remote /tmp/bbvg-auto-participation-remote-state.json \
              --merge-output state.json

            if git diff --quiet -- state.json; then
              echo "Auto participation state already present in main"
              exit 0
            fi

            git add state.json
            git commit -m "Update auto participation state [skip ci]"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "State push raced with another writer; retrying merge (${attempt}/5)"
            sleep $((attempt * 2))
          done
          echo "Unable to persist auto participation state after five merge attempts" >&2
          exit 1
