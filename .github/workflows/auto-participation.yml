name: BB V.G. auto participation

on:
  workflow_dispatch:
    inputs:
      probe:
        description: "Run isolated zonertg11 button probe instead of normal auto participation"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: bb-vg-auto-participation
  cancel-in-progress: true

jobs:
  participate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for monitor state persistence
        run: |
          sleep 20
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run isolated participation probe
        if: ${{ inputs.probe == true }}
        env:
          BETBOOM_PROBE_URL: "https://betboom.ru/freestream/zonertg11"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
          BETBOOM_BROWSER_CHANNEL: chrome
        run: python auto_participation_probe.py

      - name: Persist isolated probe result
        if: ${{ always() && inputs.probe == true }}
        run: |
          test -f auto_participation_probe_result.json || echo '{"status":"result_missing"}' > auto_participation_probe_result.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auto_participation_probe_result.json
          git rm -f auto_participation_probe.trigger || true
          git commit -m "Record isolated auto participation probe [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Validate auto participation
        if: ${{ inputs.probe != true }}
        env:
          BETBOOM_AUTO_PARTICIPATE: "true"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
        run: |
          python - <<'PY'
          import betboom_auto_participation as auto

          required = (
              "_event_token",
              "_eligible_for_event_attempt",
              "process_new_wheel_events",
          )
          missing = [name for name in required if not hasattr(auto, name)]
          if missing:
              raise SystemExit(
                  "Missing auto participation functions: " + ", ".join(missing)
              )
          if not auto.configured():
              raise SystemExit("BetBoom auto participation session is not configured")
          print("Auto participation preflight OK")
          PY

      - name: Run auto participation
        if: ${{ inputs.probe != true }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          BETBOOM_AUTO_PARTICIPATE: "true"
          BETBOOM_STORAGE_STATE_JSON_PART1: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART1 }}
          BETBOOM_STORAGE_STATE_JSON_PART2: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART2 }}
          BETBOOM_BROWSER_CHANNEL: chrome
          BETBOOM_PARTICIPATION_TIMEOUT_MS: "20000"
        run: python auto_participation_worker.py

      - name: Persist participation state
        if: ${{ inputs.probe != true }}
        run: |
          if git diff --quiet -- state.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update auto participation state [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
