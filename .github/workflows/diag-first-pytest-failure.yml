name: Diagnose next pytest failure

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/nla-critical-pattern-tuples
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture first pytest failure
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          FINAL_REMINDER_BEFORE_MINUTES: "5"
          ACTIVE_REMOVE_GRACE_MINUTES: "0"
        shell: bash
        run: |
          set +e
          python -m pytest -q --maxfail=1 > pytest-first.log 2>&1
          status=$?
          tail -n 180 pytest-first.log > pytest-first-tail.log
          echo "$status" > pytest-status.txt
          exit 0
      - name: Publish diagnostic result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '## First remaining pytest failure after NLA and AI-state repairs'
            echo
            echo '```text'
            cat pytest-first-tail.log
            echo '```'
            echo
            echo "Exit status: $(cat pytest-status.txt)"
          } > issue-body.md
          gh issue edit 111 --repo slavagostev2-dot/betboom-wheel-monitor \
            --title "Next remaining pytest failure" \
            --body-file issue-body.md
