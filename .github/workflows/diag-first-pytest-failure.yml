name: Patch AI runtime state ownership

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/nla-critical-pattern-tuples
          fetch-depth: 0

      - name: Register AI state on all affected branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          report="$(mktemp)"

          for branch in fix/ai-runtime-state-contract fix/nla-critical-pattern-tuples fix/vk-detect-all-new-wheels; do
            git fetch origin "$branch"
            git checkout -B work "origin/$branch"
            python3 - <<'PY'
          from pathlib import Path

          contracts = Path("monitor_data.py")
          text = contracts.read_text(encoding="utf-8")
          anchor = 'JSON_STATE_CONTRACTS: dict[str, dict[str, Any]] = {\n'
          entry = (
              '    "ai_runtime_state.json": {\n'
              '        "category": "authoritative",\n'
              '        "owner": "ai-core",\n'
              '        "schema": ("version", (1,)),\n'
              '    },\n'
          )
          if '"ai_runtime_state.json"' not in text:
              if anchor not in text:
                  raise SystemExit("JSON state contract anchor not found")
              contracts.write_text(text.replace(anchor, anchor + entry, 1), encoding="utf-8")

          tests = Path("tests/test_concurrency_and_ci.py")
          text = tests.read_text(encoding="utf-8")
          old = "self.assertEqual(len(monitor_data.JSON_STATE_CONTRACTS), 28)"
          new = "self.assertEqual(len(monitor_data.JSON_STATE_CONTRACTS), 29)"
          if old in text:
              tests.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("JSON state contract count assertion not found")
          PY

            if git diff --quiet -- monitor_data.py tests/test_concurrency_and_ci.py; then
              echo "$branch: already fixed" >> "$report"
            else
              git add monitor_data.py tests/test_concurrency_and_ci.py
              git commit -m "Register AI runtime state ownership"
              git push origin HEAD:"$branch"
              echo "$branch: fixed and pushed" >> "$report"
            fi
          done

          gh issue edit 111 --repo slavagostev2-dot/betboom-wheel-monitor \
            --title "AI runtime state contract repair" \
            --body "$(cat "$report")"
