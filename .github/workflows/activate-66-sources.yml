name: Verify configured Telegram source transport

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/activate-66-sources.yml"
      - "source_transport_smoke.py"
      - "public_sources.txt"
      - "source_catalog.txt"
  workflow_dispatch:
  workflow_run:
    workflows: ["Telegram candidate discovery"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bb-vg-source-transport-smoke
  cancel-in-progress: true

jobs:
  activate:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate approved source pool
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: |
          python preflight.py
          python -m py_compile source_transport_smoke.py telegram_transport.py bbvg_monitor_main.py monitor_health.py

      - name: Check all configured sources through telegram.me
        id: smoke
        continue-on-error: true
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
          REQUEST_TIMEOUT_SECONDS: "15"
          MAX_WORKERS: "16"
          TRANSPORT_BATCH_ATTEMPTS: "3"
          BOT_FEEDBACK_ENABLED: "false"
          AUTO_RUN: "false"
          MANUAL_RUN: "false"
        run: python source_transport_smoke.py

      - name: Save transport verification
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          files=(source_transport_state.json)
          test -f source_transport_state.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Record verified source transport [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Fail if transport verification failed
        if: steps.smoke.outcome != 'success'
        run: exit 1
