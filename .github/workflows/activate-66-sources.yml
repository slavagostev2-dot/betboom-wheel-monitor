name: Activate all 66 telegram.me sources

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/activate-66-sources.yml"
      - "source_transport_smoke.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-activate-66-sources
  cancel-in-progress: true

jobs:
  activate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate approved source pool
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
          EXPECTED_SOURCE_COUNT: "66"
        run: |
          python preflight.py
          python -m py_compile source_transport_smoke.py telegram_transport.py bbvg_monitor_main.py monitor_health.py

      - name: Check all 66 sources through telegram.me
        id: smoke
        continue-on-error: true
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
          REQUEST_TIMEOUT_SECONDS: "15"
          MAX_WORKERS: "16"
          TRANSPORT_BATCH_ATTEMPTS: "3"
          BOT_FEEDBACK_ENABLED: "false"
          AUTO_RUN: "false"
          MANUAL_RUN: "false"
        run: python source_transport_smoke.py

      - name: Run one full production monitor iteration
        id: runtime
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
          EXPECTED_SOURCE_COUNT: "66"
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          MAX_WORKERS: "16"
          TRANSPORT_BATCH_ATTEMPTS: "3"
          BOT_FEEDBACK_ENABLED: "false"
          AUTO_RUN: "false"
          MANUAL_RUN: "false"
          CONTINUOUS: "false"
        shell: bash
        run: |
          set -uo pipefail
          python monitor_health.py start --run-id "${GITHUB_RUN_ID:-}"
          started_at=$(date +%s)
          timeout --signal=TERM --kill-after=30s 600s python bbvg_monitor_main.py 2>&1 | tee activation-monitor.log
          runtime_exit=${PIPESTATUS[0]}
          duration=$(( $(date +%s) - started_at ))
          python monitor_health.py record \
            --run-id "${GITHUB_RUN_ID:-}" \
            --iteration 1 \
            --exit-code "$runtime_exit" \
            --duration-seconds "$duration"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          status = json.load(open("monitor_status.json", encoding="utf-8"))
          primary = [
              line.split("#", 1)[0].strip().lstrip("@")
              for line in open("public_sources.txt", encoding="utf-8")
              if line.split("#", 1)[0].strip()
          ]
          value = {
              "checked_at": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "status": "success" if status.get("status") == "running" and status.get("checked_sources") == len(primary) else "failure",
              "monitor_status": status,
          }
          with open("activation_runtime_state.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          print(json.dumps(value, ensure_ascii=False))
          if value["status"] != "success":
              raise SystemExit(1)
          PY

      - name: Save activation results and runtime state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          files=(
            source_transport_state.json activation_runtime_state.json
            state.json source_health.json source_stats.json
            unknown_timer_samples.json monitor_status.json
          )
          test -f source_transport_state.json
          test -f activation_runtime_state.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Record verified 66-source production iteration [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Start dedicated continuous 66-source monitor
        if: steps.smoke.outcome == 'success' && steps.runtime.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor-66-live.yml --ref main

      - name: Fail if activation verification failed
        if: steps.smoke.outcome != 'success' || steps.runtime.outcome != 'success'
        run: exit 1
