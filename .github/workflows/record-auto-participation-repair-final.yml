name: Record final auto participation repair

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  record:
    if: ${{ github.head_ref == 'record-auto-participation-repair-final' }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Record production proof and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = path.read_text(encoding="utf-8")
          post = (
              "**Post-update backup:** "
              "`backup/2026-07-22-after-auto-participation-delivery-repair-final` → "
              "`9ab0fbe08e162e7b32b04261112a684f4df20c9e`."
          )
          proof = (
              "**Production-проверка:** `zonertg13`, `action_id=698`, подтверждено "
              "BetBoom; личное участие владельца сохранено, стандартный "
              "`record_personal_vote` поставлен с `role=owner`, `weight=5`, "
              "источником `mechanogun`, а отправка отдельного Telegram-подтверждения "
              "зафиксирована owner-completion. Исправленный monitor run `29908357831` "
              "работает на актуальном коде с `168/168` доступными источниками и "
              "нулём ошибок."
          )
          heading = "## 2026-07-22 — Результат автоучастия больше не теряется между workflow и Control Center"
          start = text.find(heading)
          if start < 0:
              raise SystemExit("Auto participation repair changelog entry not found")
          end = text.find("\n## ", start + len(heading))
          if end < 0:
              end = len(text)
          section = text[start:end]
          additions = []
          if proof not in section:
              additions.append(proof)
          if post not in section:
              additions.append(post)
          if additions:
              text = text[:end].rstrip() + "\n\n" + "\n\n".join(additions) + "\n\n" + text[end:].lstrip("\n")
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/record-auto-participation-repair-final.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_CHANGELOG_RU.md .github/workflows/record-auto-participation-repair-final.yml
          git commit -m "Зафиксировать финальную проверку ремонта автоучастия"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done
          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Production-проверка и финальная backup-точка записаны; техническая ветка удаляется."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/record-auto-participation-repair-final"
