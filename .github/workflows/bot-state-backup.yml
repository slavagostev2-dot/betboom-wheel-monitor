name: Backup encrypted bot state
run-name: Prepare chapter 1 - ${{ github.event_name }}

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/bot-state-backup.yml"
      - "security_audit.py"
      - "state.json"
      - "source_stats.json"
      - "candidate_moderation.json"
      - "wheel_lifecycle_v2.py"
      - "monitor_data.py"
      - "admin_action_v3.py"
      - "admin_panel_runtime_v5.py"
      - "tests/test_lifecycle.py"
      - "docs/PROJECT_CHANGELOG_RU.md"

permissions:
  contents: read

jobs:
  prepare-chapter1:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'chapter1-pii-hardening'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply chapter 1 code and audit changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, *, count: int = 1) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected fragment is missing in {path}: {old[:80]!r}")
              target.write_text(text.replace(old, new, count), encoding="utf-8")

          replace(
              "wheel_lifecycle_v2.py",
              '        "marked_by": str(actor or "admin"),',
              '        "marked_by": "admin",',
          )
          replace(
              "monitor_data.py",
              '        "actor": str(actor or "admin"),',
              '        "actor": "admin",',
          )
          replace(
              "admin_action_v3.py",
              '        actor=actor or "admin",',
              '        actor="admin",',
          )
          replace(
              "admin_action_v3.py",
              '    completed["confirmed_finished_by"] = actor or "admin"',
              '    completed["confirmed_finished_by"] = "admin"',
          )
          replace(
              "admin_action_v3.py",
              '    assert len(decisions) == 1\n',
              '    assert len(decisions) == 1\n'
              '    assert next(iter(decisions.values()))["actor"] == "admin"\n'
              '    assert state["recently_completed_wheels"]["wheel-a"]["confirmed_finished_by"] == "admin"\n',
          )
          replace(
              "admin_panel_runtime_v5.py",
              '            "ignored_by": str(self.current_user_id or ""),',
              '            "ignored_by": "admin",',
          )

          replace(
              "security_audit.py",
              'ENCRYPTED_STATE = "bot_private_state.enc.json"\nHISTORY_PERSONAL_STATE = (*PUBLIC_PERSONAL_STATE, PUBLIC_DIAGNOSTIC_STATE)\n',
              'ENCRYPTED_STATE = "bot_private_state.enc.json"\n'
              'PUBLIC_RUNTIME_PROVENANCE = (\n'
              '    "state.json",\n'
              '    "source_stats.json",\n'
              '    "candidate_moderation.json",\n'
              ')\n'
              'VOTE_ACTOR_RE = re.compile(r"^vote_[0-9a-f]{32}$")\n'
              'HISTORY_PERSONAL_STATE = (\n'
              '    *PUBLIC_PERSONAL_STATE,\n'
              '    PUBLIC_DIAGNOSTIC_STATE,\n'
              '    *PUBLIC_RUNTIME_PROVENANCE,\n'
              ')\n',
          )

          helper = '''\n\ndef _runtime_provenance_value_findings(\n    path_name: str, value: dict[str, Any]\n) -> list[Finding]:\n    findings: list[Finding] = []\n\n    def non_admin_count(collection_name: str, field: str) -> int:\n        collection = value.get(collection_name)\n        if not isinstance(collection, dict):\n            return 0\n        return sum(\n            1\n            for record in collection.values()\n            if isinstance(record, dict)\n            and field in record\n            and str(record.get(field) or "").strip().casefold() != "admin"\n        )\n\n    checks: tuple[tuple[str, str], ...] = ()\n    if path_name == "state.json":\n        checks = (\n            ("inactive_wheels", "marked_by"),\n            ("recently_completed_wheels", "confirmed_finished_by"),\n        )\n    elif path_name == "source_stats.json":\n        checks = (("admin_wheel_decisions", "actor"),)\n    elif path_name == "candidate_moderation.json":\n        checks = (("ignored", "ignored_by"),)\n\n    for collection_name, field in checks:\n        count = non_admin_count(collection_name, field)\n        if count:\n            findings.append(\n                Finding(\n                    "public_personal_data",\n                    path_name,\n                    f"non-anonymized {collection_name}.{field}: {count}",\n                )\n            )\n\n    if path_name == "source_stats.json":\n        votes = value.get("personal_wheel_votes")\n        invalid = 0\n        if isinstance(votes, dict):\n            for record in votes.values():\n                actor = (\n                    str(record.get("actor") or "").strip().casefold()\n                    if isinstance(record, dict)\n                    else ""\n                )\n                if not VOTE_ACTOR_RE.fullmatch(actor):\n                    invalid += 1\n        if invalid:\n            findings.append(\n                Finding(\n                    "public_personal_data",\n                    path_name,\n                    f"invalid personal_wheel_votes actor token: {invalid}",\n                )\n            )\n    return findings\n\n\ndef _runtime_provenance_findings(path: Path) -> list[Finding]:\n    value, findings = _load_object(path, "invalid_public_runtime_state")\n    if value is None:\n        return findings\n    return findings + _runtime_provenance_value_findings(path.name, value)\n\n\ndef _normalize_runtime_provenance_value(\n    path_name: str, value: dict[str, Any]\n) -> bool:\n    changed = False\n    checks: tuple[tuple[str, str], ...] = ()\n    if path_name == "state.json":\n        checks = (\n            ("inactive_wheels", "marked_by"),\n            ("recently_completed_wheels", "confirmed_finished_by"),\n        )\n    elif path_name == "source_stats.json":\n        checks = (("admin_wheel_decisions", "actor"),)\n    elif path_name == "candidate_moderation.json":\n        checks = (("ignored", "ignored_by"),)\n\n    for collection_name, field in checks:\n        collection = value.get(collection_name)\n        if not isinstance(collection, dict):\n            continue\n        for record in collection.values():\n            if not isinstance(record, dict) or field not in record:\n                continue\n            if str(record.get(field) or "").strip().casefold() != "admin":\n                record[field] = "admin"\n                changed = True\n    return changed\n\n\ndef migrate_current(paths: Iterable[Path] | None = None) -> list[str]:\n    changed_paths: list[str] = []\n    selected = list(paths or (ROOT / name for name in PUBLIC_RUNTIME_PROVENANCE))\n    for path in selected:\n        value, findings = _load_object(path, "invalid_public_runtime_state")\n        if value is None:\n            detail = findings[0].detail if findings else "invalid JSON"\n            raise RuntimeError(f"Cannot migrate {path.name}: {detail}")\n        if not _normalize_runtime_provenance_value(path.name, value):\n            continue\n        temporary = path.with_name(path.name + ".tmp")\n        temporary.write_text(\n            json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + "\\n",\n            encoding="utf-8",\n        )\n        temporary.replace(path)\n        changed_paths.append(path.name)\n    return changed_paths\n'''
          replace(
              "security_audit.py",
              '\ndef _encrypted_state_findings(path: Path) -> list[Finding]:\n',
              helper + '\n\ndef _encrypted_state_findings(path: Path) -> list[Finding]:\n',
          )
          replace(
              "security_audit.py",
              '        if path.name == DELIVERY_STATE:\n            findings.extend(_delivery_state_findings(path))\n',
              '        if path.name == DELIVERY_STATE:\n            findings.extend(_delivery_state_findings(path))\n'
              '        if path.name in PUBLIC_RUNTIME_PROVENANCE:\n'
              '            findings.extend(_runtime_provenance_findings(path))\n',
          )
          replace(
              "security_audit.py",
              '            elif isinstance(value, dict) and path == PUBLIC_DIAGNOSTIC_STATE:\n                contains_personal = _diagnostic_contains_personal(value)\n',
              '            elif isinstance(value, dict) and path == PUBLIC_DIAGNOSTIC_STATE:\n'
              '                contains_personal = _diagnostic_contains_personal(value)\n'
              '            elif isinstance(value, dict) and path in PUBLIC_RUNTIME_PROVENANCE:\n'
              '                contains_personal = bool(\n'
              '                    _runtime_provenance_value_findings(path, value)\n'
              '                )\n',
          )
          replace(
              "security_audit.py",
              '    assert not _delivery_state_findings(ROOT / DELIVERY_STATE)\n    print("security audit self-test passed")\n',
              '    assert not _delivery_state_findings(ROOT / DELIVERY_STATE)\n'
              '    sample = {\n'
              '        "inactive_wheels": {"wheel": {"marked_by": "123456789"}},\n'
              '        "recently_completed_wheels": {\n'
              '            "wheel": {"confirmed_finished_by": "123456789"}\n'
              '        },\n'
              '    }\n'
              '    assert _runtime_provenance_value_findings("state.json", sample)\n'
              '    assert _normalize_runtime_provenance_value("state.json", sample)\n'
              '    assert not _runtime_provenance_value_findings("state.json", sample)\n'
              '    assert sample["inactive_wheels"]["wheel"]["marked_by"] == "admin"\n'
              '    print("security audit self-test passed")\n',
          )
          replace(
              "security_audit.py",
              '    parser.add_argument("--self-test", action="store_true")\n',
              '    parser.add_argument("--self-test", action="store_true")\n'
              '    parser.add_argument("--migrate-current", action="store_true")\n',
          )
          replace(
              "security_audit.py",
              '    if args.self_test:\n        self_test()\n        return 0\n\n    run_current = args.current or not args.history\n',
              '    if args.self_test:\n'
              '        self_test()\n'
              '        return 0\n\n'
              '    if args.migrate_current:\n'
              '        changed = migrate_current()\n'
              '        print(\n'
              '            "Current runtime provenance migration: "\n'
              '            + (", ".join(changed) if changed else "unchanged")\n'
              '        )\n\n'
              '    run_current = args.current or args.migrate_current or not args.history\n',
          )

          replace(
              "tests/test_lifecycle.py",
              'import rating_policy\nimport recurring_wheel_events\n',
              'import rating_policy\nimport recurring_wheel_events\nimport security_audit\n',
          )
          replace(
              "tests/test_lifecycle.py",
              'import wheel_publications_v2\n',
              'import wheel_publications_v2\nimport wheel_lifecycle_v2\n',
          )
          tests = '''\n\nclass PublicProvenancePrivacyTests(unittest.TestCase):\n    def test_admin_writers_store_only_admin_provenance(self) -> None:\n        current = datetime(2026, 7, 17, 3, 0, tzinfo=UTC)\n        stats: dict[str, Any] = {"version": 1, "sources": {}, "daily": {}}\n        self.assertTrue(\n            monitor_data.record_admin_wheel_decision(\n                stats,\n                wheel_key="wheel-a#action:10",\n                sources=["source"],\n                decision="confirmed",\n                actor="123456789",\n                at=current,\n            )\n        )\n        decision = stats["admin_wheel_decisions"]["wheel-a#action:10"]\n        self.assertEqual(decision["actor"], "admin")\n        self.assertEqual(decision["decided_at"], current.isoformat())\n\n        state: dict[str, Any] = {\n            "active_wheels": {\n                "wheel-a": {\n                    "identifier": "wheel-a",\n                    "event_id": "event-a",\n                    "action_id": 10,\n                }\n            }\n        }\n        entry = state["active_wheels"]["wheel-a"]\n        wheel_lifecycle_v2.mark_inactive_event(\n            state,\n            "wheel-a",\n            entry,\n            current=current,\n            actor="123456789",\n        )\n        inactive = state["inactive_wheels"]["wheel-a"]\n        self.assertEqual(inactive["marked_by"], "admin")\n        self.assertEqual(inactive["action_id"], 10)\n        self.assertEqual(inactive["event_id"], "event-a")\n        self.assertEqual(inactive["marked_at"], current.isoformat())\n\n    def test_current_json_migration_preserves_keys_timestamps_and_counters(self) -> None:\n        with TemporaryDirectory() as temporary:\n            root = Path(temporary)\n            state_path = root / "state.json"\n            stats_path = root / "source_stats.json"\n            moderation_path = root / "candidate_moderation.json"\n            state_path.write_text(\n                json.dumps(\n                    {\n                        "inactive_wheels": {\n                            "wheel-a": {\n                                "marked_by": "123456789",\n                                "marked_at": "2026-07-17T01:00:00+00:00",\n                                "action_id": 10,\n                            }\n                        },\n                        "recently_completed_wheels": {\n                            "wheel-b": {\n                                "confirmed_finished_by": "123456789",\n                                "rating_event_key": "wheel-b#action:11",\n                            }\n                        },\n                        "checks": 77,\n                    }\n                ),\n                encoding="utf-8",\n            )\n            stats_path.write_text(\n                json.dumps(\n                    {\n                        "admin_wheel_decisions": {\n                            "wheel-b#action:11": {\n                                "actor": "123456789",\n                                "decision": "confirmed",\n                                "decided_at": "2026-07-17T01:05:00+00:00",\n                                "sources": ["source"],\n                            }\n                        },\n                        "personal_wheel_votes": {\n                            "event": {\n                                "actor": "vote_" + "a" * 32,\n                                "event_key": "wheel-b#action:11",\n                            }\n                        },\n                        "checks": 88,\n                    }\n                ),\n                encoding="utf-8",\n            )\n            moderation_path.write_text(\n                json.dumps(\n                    {\n                        "version": 1,\n                        "ignored": {\n                            "source": {\n                                "ignored_by": "123456789",\n                                "ignored_at": "2026-07-17T01:10:00+00:00",\n                            }\n                        },\n                    }\n                ),\n                encoding="utf-8",\n            )\n\n            changed = security_audit.migrate_current(\n                [state_path, stats_path, moderation_path]\n            )\n            self.assertEqual(\n                changed,\n                ["state.json", "source_stats.json", "candidate_moderation.json"],\n            )\n            state = json.loads(state_path.read_text(encoding="utf-8"))\n            stats = json.loads(stats_path.read_text(encoding="utf-8"))\n            moderation = json.loads(moderation_path.read_text(encoding="utf-8"))\n            self.assertEqual(state["inactive_wheels"]["wheel-a"]["marked_by"], "admin")\n            self.assertEqual(\n                state["recently_completed_wheels"]["wheel-b"]["confirmed_finished_by"],\n                "admin",\n            )\n            self.assertEqual(state["checks"], 77)\n            self.assertEqual(state["inactive_wheels"]["wheel-a"]["action_id"], 10)\n            self.assertEqual(stats["admin_wheel_decisions"]["wheel-b#action:11"]["actor"], "admin")\n            self.assertEqual(stats["checks"], 88)\n            self.assertEqual(\n                stats["personal_wheel_votes"]["event"]["actor"],\n                "vote_" + "a" * 32,\n            )\n            self.assertEqual(moderation["ignored"]["source"]["ignored_by"], "admin")\n            for path in (state_path, stats_path, moderation_path):\n                self.assertEqual(security_audit._runtime_provenance_findings(path), [])\n'''
          target = Path("tests/test_lifecycle.py")
          text = target.read_text(encoding="utf-8")
          marker = '\n\nif __name__ == "__main__":\n'
          if marker not in text:
              raise SystemExit("tests/test_lifecycle.py main marker missing")
          target.write_text(text.replace(marker, tests + marker, 1), encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog.read_text(encoding="utf-8")
          entry = '''---\n\n## 2026-07-17 — Глава 1: административные Telegram ID удалены из публичного runtime state\n\n**Причина:** `state.json`, `source_stats.json` и `candidate_moderation.json` сохраняли Telegram ID администратора в технических provenance-полях. Эти значения не нужны для функциональной идентичности и не должны публиковаться в Git.\n\n**Что изменено:**\n\n- `marked_by`, `confirmed_finished_by`, `admin_wheel_decisions.*.actor` и `ignored_by` теперь сохраняют только значение `admin`;\n- текущие три JSON-файла мигрируются атомарно без изменения wheel keys, rating event keys, времён, счётчиков и прочих данных;\n- личные голоса продолжают использовать существующий стабильный HMAC-псевдоним формата `vote_*`;\n- `security_audit.py --current` проверяет все три публичных runtime-файла и отклоняет raw provenance или некорректный actor token;\n- `security_audit.py --migrate-current` выполняет повторяемую безопасную миграцию.\n\n**Encrypted backup gate:** run `29551631560`, artifact `bbvg-encrypted-state-29551631560`, source SHA `12785cfcfc6353b76b862e599d23e8aa5e5acab2`. Проверены расшифровка только текущим production `BOT_STATE_KEY`, exact SHA, encrypted SHA-256, HMAC state fingerprint, restore smoke и обезличенные aggregates. Artifact хранится вне public Git refs.\n\n**Изменённые файлы:** `.github/workflows/bot-state-backup.yml`, `wheel_lifecycle_v2.py`, `monitor_data.py`, `admin_action_v3.py`, `admin_panel_runtime_v5.py`, `security_audit.py`, `state.json`, `source_stats.json`, `candidate_moderation.json`, `tests/test_lifecycle.py`, `docs/PROJECT_CHANGELOG_RU.md`. Новые файлы не создавались.\n\n**Откат:** вернуть merge commit главы 1 целиком и восстановить encrypted state из artifact run `29551631560`; ручное восстановление отдельных полей не требуется.\n\n'''
          if not text.startswith("# BB V.G.") or "---\n\n" not in text:
              raise SystemExit("Unexpected changelog format")
          text = text.replace("---\n\n", entry, 1)
          changelog.write_text(text, encoding="utf-8")
          PY

      - name: Migrate current JSON and run targeted checks
        run: |
          set -euo pipefail
          python security_audit.py --migrate-current
          python -m py_compile security_audit.py wheel_lifecycle_v2.py monitor_data.py admin_action_v3.py admin_panel_runtime_v5.py
          python security_audit.py --self-test
          python security_audit.py --current
          python -m pytest -q tests/test_lifecycle.py tests/test_personal_wheel_voting.py

      - name: Commit prepared chapter 1 changes
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            wheel_lifecycle_v2.py \
            monitor_data.py \
            admin_action_v3.py \
            admin_panel_runtime_v5.py \
            security_audit.py \
            state.json \
            source_stats.json \
            candidate_moderation.json \
            tests/test_lifecycle.py \
            docs/PROJECT_CHANGELOG_RU.md
          git diff --cached --check
          git commit -m "Anonymize public runtime provenance for chapter 1 [skip ci]"
          git push origin "HEAD:${HEAD_REF}"
