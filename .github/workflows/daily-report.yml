name: BB V.G. summaries
run-name: BB V.G. summary — ${{ github.event_name }} / ${{ inputs.period || 'daily' }}

on:
  workflow_dispatch:
    inputs:
      period:
        description: "Период сводки"
        required: true
        type: choice
        default: daily
        options:
          - daily
          - weekly
          - monthly
  schedule:
    # 01:12 UTC = 08:12 в Барнауле (UTC+7).
    - cron: "12 1 * * *"

permissions:
  contents: read

concurrency:
  group: bb-vg-summary-${{ inputs.period || 'daily' }}
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify BB V.G. repository layout
        run: python preflight.py

      - name: Check BB V.G. summary code
        env:
          BOT_TOKEN: "test-bot-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
        run: |
          python -m py_compile monitor.py monitor_data.py daily_report.py daily_report_entry.py notification_router.py notification_integrity_v2.py bot_private_state.py bot_notification_state.py privacy_retention.py
          python -c "import daily_report; daily_report.self_test()"
          python notification_router.py
          python notification_integrity_v2.py --self-test
          python bot_notification_state.py
          python -m json.tool partners_catalog.json >/dev/null
          python -m json.tool bot_access.json >/dev/null
          python -m json.tool notification_delivery_state.json >/dev/null

      - name: Send BB V.G. summary
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          DISPLAY_TIMEZONE: Asia/Barnaul
          REPORT_PERIOD: ${{ github.event_name == 'workflow_dispatch' && inputs.period || 'daily' }}
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: python daily_report_entry.py
