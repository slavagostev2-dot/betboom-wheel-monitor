name: Generate direct VK monitor candidate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/direct-vk-wheel-delivery
          fetch-depth: 0
      - name: Generate candidate without materializing the secret
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/monitor.yml').read_text(encoding='utf-8')
          secret_ref = '$' + '{{ secrets.VK_GROUP_TOKEN }}'
          anchor = '          GITHUB_BRANCH: main\n'
          addition = anchor + f'          VK_GROUP_TOKEN: {secret_ref}\n' + '          VK_API_VERSION: "5.199"\n'
          if '          VK_GROUP_TOKEN:' not in source:
              if anchor not in source:
                  raise SystemExit('monitor VK env anchor not found')
              source = source.replace(anchor, addition, 1)
          Path('monitor_direct_vk_candidate.yml').write_text(source, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor_direct_vk_candidate.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Prepare direct VK monitor candidate"
          git push origin HEAD:fix/direct-vk-wheel-delivery
