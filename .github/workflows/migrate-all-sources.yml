name: Verify all 66 sources use telegram.me

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/migrate-all-sources.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bb-vg-source-policy-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify approved source pool and transport domain
        run: |
          python - <<'PY'
          from pathlib import Path

          def read_sources(path):
              result = []
              seen = set()
              for raw in Path(path).read_text(encoding="utf-8").splitlines():
                  value = raw.split("#", 1)[0].strip().lstrip("@")
                  if value and value.casefold() not in seen:
                      seen.add(value.casefold())
                      result.append(value)
              return result

          primary = read_sources("public_sources.txt")
          nightly = read_sources("source_catalog.txt")
          approved = {value.casefold() for value in primary + nightly}
          if len(approved) < 66:
              raise SystemExit(f"Expected at least 66 approved sources, found {len(approved)}")
          if {value.casefold() for value in primary} & {value.casefold() for value in nightly}:
              raise SystemExit("Primary and nightly tiers overlap")
          runtime = "\n".join(
              Path(name).read_text(encoding="utf-8")
              for name in ("monitor.py", "nightly_discovery.py", "source_intelligence.py")
          )
          if "https://t.me/" in runtime:
              raise SystemExit("Blocked Telegram domain remains in runtime")
          print(f"Approved sources: {len(approved)}; primary: {len(primary)}; nightly: {len(nightly)}")
          PY
