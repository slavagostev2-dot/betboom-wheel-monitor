name: Prepare chapter 1 migration

on:
  push:
    branches:
      - chapter1-pii-hardening
    paths:
      - ".github/workflows/chapter1-debug.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chapter1-pii-hardening
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Extract and apply prepared changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          text = Path('.github/workflows/bot-state-backup.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = text.index(start_marker) + len(start_marker)
          end = text.index(end_marker, start)
          script = textwrap.dedent(text[start:end])
          Path('/tmp/apply_chapter1.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/apply_chapter1.py

      - name: Migrate current JSON
        run: python security_audit.py --migrate-current

      - name: Compile changed Python
        run: python -m py_compile security_audit.py wheel_lifecycle_v2.py monitor_data.py admin_action_v3.py admin_panel_runtime_v5.py

      - name: Run security self-test
        run: python security_audit.py --self-test

      - name: Audit current tree
        run: python security_audit.py --current

      - name: Run targeted tests
        run: python -m pytest -q tests/test_lifecycle.py tests/test_personal_wheel_voting.py

      - name: Commit prepared changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            wheel_lifecycle_v2.py \
            monitor_data.py \
            admin_action_v3.py \
            admin_panel_runtime_v5.py \
            security_audit.py \
            state.json \
            source_stats.json \
            candidate_moderation.json \
            tests/test_lifecycle.py \
            docs/PROJECT_CHANGELOG_RU.md
          git diff --cached --check
          git commit -m "Anonymize public runtime provenance for chapter 1 [skip ci]"
          git push origin HEAD:chapter1-pii-hardening
