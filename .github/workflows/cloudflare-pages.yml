name: Deploy Mini App to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-pages-miniapp
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: slavagostev2-betboom-monitor
  CLOUDFLARE_APP_URL: https://slavagostev2-betboom-monitor.pages.dev/

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check Cloudflare credentials
        id: credentials
        shell: bash
        run: |
          if [[ -n "${CLOUDFLARE_API_TOKEN:-}" && -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; deployment is skipped without failing."
          fi

      - name: Set up Node.js
        if: steps.credentials.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Mini App runtime config
        id: runtime
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          username = ""
          token = os.environ.get("BOT_TOKEN", "").strip()
          if token:
              try:
                  with urllib.request.urlopen(
                      f"https://api.telegram.org/bot{token}/getMe", timeout=20
                  ) as response:
                      payload = json.load(response)
                  username = str((payload.get("result") or {}).get("username") or "")
              except Exception as exc:
                  print(f"Could not resolve bot username: {type(exc).__name__}")

          Path("docs/runtime-config.js").write_text(
              "window.BB_CONFIG=" + json.dumps({"botUsername": username}, ensure_ascii=False) + ";\n",
              encoding="utf-8",
          )
          print("Runtime config prepared")
          PY

      - name: Validate Mini App
        id: validate
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node --check docs/app.js
          node --check docs/runtime-config.js
          node --check docs/service-worker.js
          python - <<'PY'
          from pathlib import Path

          html = Path("docs/index.html").read_text(encoding="utf-8")
          required = [
              "app.js", "runtime-config.js", "styles.css",
              "icon.svg", "manifest.webmanifest",
          ]
          missing = [name for name in required if name not in html]
          if missing:
              raise SystemExit(f"Missing assets in index.html: {', '.join(missing)}")

          css = Path("docs/styles.css").read_text(encoding="utf-8")
          if "splash.svg" not in css or not Path("docs/splash.svg").exists():
              raise SystemExit("Generated splash background is missing")
          if not Path("docs/icon.svg").exists():
              raise SystemExit("Generated app icon is missing")

          app = Path("docs/app.js").read_text(encoding="utf-8")
          forbidden = ["pending_posts||{}", "favorites", "healthStatus", "Ближайшие колёса", "Сводка"]
          found = [value for value in forbidden if value in app]
          if found:
              raise SystemExit(f"Removed Mini App features returned: {', '.join(found)}")
          required_features = [
              "sourceRequestForm", "source_request", "active_wheels", "data-route=\"home\"",
              "lightTheme", "HapticFeedback", "setHeaderColor", "setBackgroundColor",
              "setBottomBarColor", "notifications", "https://telegram.me/",
          ]
          absent = [value for value in required_features if value not in (app + html)]
          if absent:
              raise SystemExit(f"Required Mini App features are missing: {', '.join(absent)}")
          if "https://t.me/" in app:
              raise SystemExit("Blocked legacy Telegram domain returned to Mini App runtime")
          if "serviceWorker.register" in app:
              raise SystemExit("Mini App must not restore the stale offline cache")
          print("Mini App validation passed")
          PY

      - name: Create Cloudflare Pages project if needed
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          npx --yes wrangler@4 pages project create "$CLOUDFLARE_PROJECT_NAME" \
            --production-branch main || true

      - name: Deploy Mini App
        id: publish
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          npx --yes wrangler@4 pages deploy docs \
            --project-name "$CLOUDFLARE_PROJECT_NAME" \
            --branch main \
            --commit-hash "$GITHUB_SHA"

      - name: Record deployment state
        if: always()
        env:
          CREDENTIALS: ${{ steps.credentials.outputs.configured }}
          RUNTIME_OUTCOME: ${{ steps.runtime.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).isoformat()
          configured = os.environ.get("CREDENTIALS", "") == "true"
          published = os.environ.get("PUBLISH_OUTCOME", "") == "success"
          deployment = {
              "status": "deployed" if published else ("not_configured" if not configured else "failed"),
              "provider": "cloudflare-pages",
              "url": os.environ["CLOUDFLARE_APP_URL"],
              "checked_at": now,
              "deployed_at": now if published else None,
              "commit": os.environ.get("GITHUB_SHA", ""),
          }
          runtime = {
              "status": "success" if published else ("skipped" if not configured else "failure"),
              "checked_at": now,
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "commit": os.environ.get("GITHUB_SHA", ""),
              "credentials_configured": configured,
              "runtime_config": os.environ.get("RUNTIME_OUTCOME", "unknown"),
              "validation": os.environ.get("VALIDATE_OUTCOME", "unknown"),
              "publication": os.environ.get("PUBLISH_OUTCOME", "unknown"),
          }
          for path, value in (
              ("miniapp_deployment.json", deployment),
              ("miniapp_deploy_runtime.json", runtime),
          ):
              with open(path, "w", encoding="utf-8") as stream:
                  json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
                  stream.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(miniapp_deployment.json miniapp_deploy_runtime.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "Deployment state did not change."
            exit 0
          fi
          git add "${files[@]}"
          git commit -m "Record Mini App deployment state [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Deployment state push attempt ${attempt} failed; rebasing before retry."
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1
