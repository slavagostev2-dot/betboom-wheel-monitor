name: Diagnose VK final pytest failure

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact feature commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/vk-wheel-delivery-final
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture exact failure
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          FINAL_REMINDER_BEFORE_MINUTES: "5"
          ACTIVE_REMOVE_GRACE_MINUTES: "0"
        shell: bash
        run: |
          set +e
          python -m pytest -q --maxfail=1 > pytest.log 2>&1
          status=$?
          tail -n 220 pytest.log > pytest-tail.log
          echo "$status" > pytest-status.txt
          exit 0
      - name: Publish safe diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '## Final VK branch first pytest failure'
            echo '```text'
            cat pytest-tail.log
            echo '```'
            echo "Exit status: $(cat pytest-status.txt)"
          } > body.md
          gh issue edit 111 --repo slavagostev2-dot/BB.V.G. --title "Final VK pytest diagnostic" --body-file body.md
