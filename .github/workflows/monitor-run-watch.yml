name: BB V.G. monitor run watch
run-name: BB V.G. monitor run watch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/monitor-run-watch.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture monitor workflow queue
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh run list \
            --workflow monitor.yml \
            --limit 10 \
            --json databaseId,status,conclusion,event,headSha,createdAt,displayTitle,url \
            > monitor_run_watch.json
          python -m json.tool monitor_run_watch.json >/dev/null
      - name: Save queue snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor_run_watch.json
          git commit -m "Update BB V.G. monitor queue snapshot [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

