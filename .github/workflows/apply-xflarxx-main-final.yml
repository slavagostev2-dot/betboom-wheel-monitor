name: Apply and verify xFLARXx cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feature/xflarxx-account-access-cleanup-final' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Detect pending installer
        id: pending
        shell: bash
        run: |
          if [[ -f scripts/run_xflarxx_patch.py && -f scripts/apply_xflarxx_account_access_cleanup.py && -f scripts/finalize_xflarxx_account_access_cleanup.py ]]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.pending.outputs.apply == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        if: steps.pending.outputs.apply == 'true'
        run: python -m pip install -r requirements-dev.txt

      - name: Apply repository changes
        if: steps.pending.outputs.apply == 'true'
        run: |
          set -euo pipefail
          python scripts/run_xflarxx_patch.py \
            scripts/apply_xflarxx_account_access_cleanup.py \
            scripts/finalize_xflarxx_account_access_cleanup.py
          rm -f \
            scripts/run_xflarxx_patch.py \
            scripts/apply_xflarxx_account_access_cleanup.py \
            scripts/finalize_xflarxx_account_access_cleanup.py \
            scripts/prepare_xflarxx_installer.py \
            xflarxx_final_failure.txt \
            xflarxx_final3_failure.txt \
            xflarxx_final4_failure.txt \
            xflarxx_main_failure.txt \
            xflarxx_main_final2_failure.txt \
            xflarxx_validation.log
          rm -f .github/workflows/apply-xflarxx-*.yml

      - name: Validate changed contracts and full suite
        id: validation
        if: steps.pending.outputs.apply == 'true'
        continue-on-error: true
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        run: |
          set -o pipefail
          {
            python -m py_compile \
              betboom_account_participation.py \
              auto_participation_notifications.py \
              notification_button_recovery.py \
              bbvg/bot/runtime.py \
              tests/test_button_matrix.py
            python betboom_account_participation.py --self-test
            python auto_participation_notifications.py
            python notification_button_recovery.py --self-test
            python -m bbvg.bot.runtime --self-test
            python admin_panel_runtime_v41.py --self-test
            python -m pytest -q
          } 2>&1 | tee xflarxx_validation.log

      - name: Persist validation diagnostic
        if: steps.pending.outputs.apply == 'true' && steps.validation.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard HEAD
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f xflarxx_validation.log
          git commit -m "Record xFLARXx validation failure [skip ci]"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          exit 1

      - name: Commit verified result
        if: steps.pending.outputs.apply == 'true' && steps.validation.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f xflarxx_validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
