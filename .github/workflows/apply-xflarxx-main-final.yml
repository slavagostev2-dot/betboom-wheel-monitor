name: Apply final xFLARXx cleanup to main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-xflarxx-main-final.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEMP_WORKFLOW: .github/workflows/apply-xflarxx-main-final.yml
      SCRIPT_BRANCH: feature/xflarxx-account-access-cleanup-final
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch prepared patch scripts
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$SCRIPT_BRANCH"
          git show "origin/${SCRIPT_BRANCH}:scripts/run_xflarxx_patch.py" > /tmp/run_xflarxx_patch.py
          git show "origin/${SCRIPT_BRANCH}:scripts/apply_xflarxx_account_access_cleanup.py" > /tmp/apply_xflarxx.py
          git show "origin/${SCRIPT_BRANCH}:scripts/finalize_xflarxx_account_access_cleanup.py" > /tmp/finalize_xflarxx.py

      - name: Apply and compile changes
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/run_xflarxx_patch.py /tmp/apply_xflarxx.py /tmp/finalize_xflarxx.py
          rm -f "$TEMP_WORKFLOW" xflarxx_final_failure.txt xflarxx_main_failure.txt
          python -m py_compile \
            betboom_account_participation.py \
            auto_participation_notifications.py \
            notification_button_recovery.py \
            bbvg/bot/runtime.py \
            tests/test_button_matrix.py
          python betboom_account_participation.py --self-test
          python auto_participation_notifications.py
          python notification_button_recovery.py --self-test
          python -m bbvg.bot.runtime --self-test

      - name: Publish changes and delete obsolete branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              git push origin --delete fix/control-center-unified-notification-release || true
              exit 0
            fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1

      - name: Record failure and remove temporary workflow
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git fetch origin main
          git checkout -B cleanup-main origin/main
          rm -f "$TEMP_WORKFLOW"
          printf 'xFLARXx cleanup workflow failed in run %s\n' "$GITHUB_RUN_ID" > xflarxx_main_failure.txt
          git add -A
          git commit -m "Record xFLARXx cleanup workflow failure [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1
