name: Temporary BB V.G. docs sync

on:
  push:
    branches: [main]
    paths:
      - "docs_sync.trigger"

permissions:
  contents: write

concurrency:
  group: bb-vg-temporary-docs-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Update project contracts and changelog
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          agents_path = Path("AGENTS.md")
          agents = agents_path.read_text(encoding="utf-8")

          entrypoint_anchor = "- Монитор колёс: `bbvg_monitor_main.py`, `monitor.py` и тематические модули.\n"
          entrypoint_block = (
              "- Автоучастие: `auto_participation_worker.py` обрабатывает сохранённые event-запросы; "
              "`auto_participation_recovery.py` независимо пересканирует свежие публикации текущего "
              "`public_sources.txt`, сверяет ссылки с BetBoom API и восстанавливает потерянные active/event записи; "
              "`betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия.\n"
              "- Надёжность Telegram-доставки: `notification_integrity_v2.py` хранит HMAC-ledger и локальный claim, "
              "а `notification_remote_checkpoint.py` до внешней отправки фиксирует claim в `main` через Contents API "
              "и запускает recovery-автоучастие для новых wheel-event.\n"
          )
          if "`auto_participation_recovery.py` независимо пересканирует" not in agents:
              if entrypoint_anchor not in agents:
                  raise SystemExit("AGENTS entrypoint anchor not found")
              agents = agents.replace(entrypoint_anchor, entrypoint_anchor + entrypoint_block, 1)

          health_anchor = "### Достоверный health и inventory источников"
          recovery_contract = """### Автоучастие и устойчивость wheel-event\n\n- Новое wheel-событие фаз `detected`, `active` или `available` запускает `.github/workflows/auto-participation.yml` до зависимости от позднего bulk-push `state.json`.\n- Workflow сначала выполняет event-based `auto_participation_worker.py`, затем обязательно запускает независимый `auto_participation_recovery.py`.\n- Recovery берёт количество и список источников только из текущего `public_sources.txt`, извлекает свежие freestream-ссылки и перед попыткой участия подтверждает активность каждой ссылки через BetBoom API. Исторические фиксированные количества источников запрещены.\n- Если событие потеряно до сохранения `state.json`, recovery восстанавливает подтверждённо активную карточку в `active_wheels`; успешное участие записывает в `participating_wheels` и `auto_participation_events`.\n- Recovery не перезаписывает `source`, `message_id`, `message_date` и `message_url` уже существующего активного колеса более поздним репостом. Если ранний recovery уже подменил атрибуцию, `wheel_metadata_quality.py` восстанавливает исходную публикацию из `wheel_publications`, не меняя API-поколение и участие.\n- `betboom_participation_browser.py` ищет семантические кнопки и видимые SPA-обёртки, допускает контрольную перезагрузку и считает успехом только подтверждение участия на стороне BetBoom.\n- Для Telegram-уведомления interprocess claim `notification_delivery_state.json` обязан быть удалённо зафиксирован в `main` **до** вызова Telegram API. После успешной отправки claim переводится в completed delivery таким же remote checkpoint. Если pre-send checkpoint не удался, уведомление с незаписанным claim не отправляется.\n- Временные файлы и режимы `force_*` не являются production-архитектурой и после диагностики должны быть удалены.\n\n"""
          if "### Автоучастие и устойчивость wheel-event" not in agents:
              if health_anchor not in agents:
                  raise SystemExit("AGENTS health anchor not found")
              agents = agents.replace(health_anchor, recovery_contract + health_anchor, 1)

          agents_path.write_text(agents, encoding="utf-8")

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          changelog_entry = """## 2026-07-21 — Автоучастие и доставка wheel-event защищены от отмены monitor-run\n\nДиагностика одновременных симптомов — повторного Telegram-уведомления, отсутствия нового колеса в `active_wheels` и пропущенного автоучастия — подтвердила одно аварийное окно: внешний Telegram-send мог завершиться раньше, чем runner успевал сохранить runtime-state в `main`. При отмене/replacement запуска следующий monitor видел старое состояние и мог повторить уведомление, а event автоучастия и карточка активного колеса терялись.\n\nДля срочной проверки был выполнен независимый скан текущего approved inventory. Новое короткое колесо `zonertw4` было найдено через BetBoom API и участие подтверждено страницей BetBoom. После перевода решения в production-контур штатная цепочка самостоятельно обнаружила новое `aunkere` и записала `auto_participation_status=participated`, что подтвердило работу без аварийного trigger.\n\nДобавлен `notification_remote_checkpoint.py`: HMAC-claim уведомления синхронно merge/CAS-фактически фиксируется в `notification_delivery_state.json` на `main` до Telegram API, а после успешной отправки переводится в completed delivery. Новый wheel-event одновременно инициирует `auto-participation.yml`, поэтому запуск автоучастия больше не зависит от того, успел ли bulk runtime-push сохранить `state.json`.\n\n`auto-participation.yml` теперь после обычного `auto_participation_worker.py` всегда выполняет независимый `auto_participation_recovery.py`. Recovery читает текущий `public_sources.txt`, проверяет свежие freestream-ссылки через BetBoom API, использует устойчивый `betboom_participation_browser.py` и при необходимости восстанавливает потерянную активную карточку/участие. `wheel_metadata_quality.py` не позволяет recovery-пути закрепить более поздний репост как исходный источник существующего колеса; исходная публикация восстанавливается из `wheel_publications`.\n\nВременные аварийные `force_*` trigger/script/result-файлы после переноса логики в постоянные модули удалены. Финальный monitor preflight прошёл на production-модулях; отдельный runtime heartbeat продолжает публиковаться независимо от bulk state push.\n\n**Проверка:** срочное `zonertw4` — участие подтверждено BetBoom; последующее `aunkere` — штатно `participated`; монитор проверяет 167 источников, source errors = 0.\n\n**Промежуточная rollback-точка:** `backup/2026-07-21-after-auto-participation-recovery`. Финальная post-update backup создаётся после этой синхронизации документации.\n\n**Откат:** вернуть post-update/pre-update backup целиком; ручное восстановление отдельных runtime JSON не требуется.\n\n"""
          if "## 2026-07-21 — Автоучастие и доставка wheel-event защищены" not in changelog:
              anchor = "---\n\n"
              if anchor not in changelog:
                  raise SystemExit("Changelog insertion anchor not found")
              changelog = changelog.replace(anchor, anchor + changelog_entry, 1)
              changelog_path.write_text(changelog, encoding="utf-8")
          PY

      - name: Commit docs and remove temporary sync files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/docs-sync-temp.yml docs_sync.trigger
          git add AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Документировать recovery автоучастия и защиту уведомлений"
          git pull --rebase origin main
          git push origin HEAD:main
