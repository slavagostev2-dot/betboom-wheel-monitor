name: Stage chapter 2 non-workflow files

on:
  push:
    branches:
      - agent/chapter2-actions-hardening

permissions:
  contents: write

concurrency:
  group: bb-vg-chapter2-nonworkflow
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/chapter2-actions-hardening
          fetch-depth: 0

      - name: Extract verified patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          source = Path('.github/workflows/chapter2-audit.yml').read_text(encoding='utf-8')
          start = source.index("          H4sIC")
          end = source.index("\n          PAYLOAD", start)
          encoded = ''.join(line.strip() for line in source[start:end].splitlines())
          Path('/tmp/chapter2.patch').write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY
          git apply /tmp/chapter2.patch
          git add AGENTS.md docs/PROJECT_CHANGELOG_RU.md backup_rotation.py monitor_health.py monitor_shift_v41.sh tests/test_actions_security.py
          python -m py_compile backup_rotation.py monitor_health.py tests/test_actions_security.py
          python backup_rotation.py --self-test
          python monitor_health.py --self-test
          bash -n monitor_shift_v41.sh
          git diff --cached --check

      - name: Commit non-workflow files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add chapter 2 Actions contracts"
          git push origin HEAD:agent/chapter2-actions-hardening
