name: Repair auto participation delivery

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  repair:
    if: ${{ github.head_ref == 'repair-auto-participation-delivery' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply durable result and button repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Required patch anchor not found in {path}: {old[:100]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          # A workflow accepted by GitHub but missing a persisted result is transport
          # failure, not a BetBoom failure. Re-arm it automatically.
          replace_once(
              "personal_reminder_filter.py",
              '    if status == "workflow_dispatch_failed" and failure_count < _DISPATCH_FAILURE_LIMIT:\n        retry_at = current + _DISPATCH_RETRY_AFTER\n',
              '    if status in {"workflow_dispatch_failed", "workflow_dispatch_timeout"} and failure_count < _DISPATCH_FAILURE_LIMIT:\n        retry_delay = (\n            _DISPATCH_RETRY_AFTER\n            if status == "workflow_dispatch_failed"\n            else timedelta(minutes=1)\n        )\n        retry_at = current + retry_delay\n',
          )

          integrity = Path("notification_integrity_v2.py")
          text = integrity.read_text(encoding="utf-8")
          text = text.replace(
              '        "entries": {},\n        "claims": {},\n',
              '        "entries": {},\n        "claims": {},\n        "messages": {},\n',
              1,
          )
          text = text.replace(
              '    claims = raw.get("claims") if isinstance(raw.get("claims"), dict) else {}\n    return {\n',
              '''    claims = raw.get("claims") if isinstance(raw.get("claims"), dict) else {}\n    messages = raw.get("messages") if isinstance(raw.get("messages"), dict) else {}\n    return {\n''',
              1,
          )
          text = text.replace(
              '        "claims": _pruned_claims(claims),\n    }\n\n\ndef _pruned_entries',
              '        "claims": _pruned_claims(claims),\n        "messages": _pruned_messages(messages),\n    }\n\n\ndef _pruned_entries',
              1,
          )
          anchor = '''def _pruned_claims(claims: dict[str, Any], current: datetime | None = None) -> dict[str, str]:\n    current = current or now_utc()\n    threshold = current - timedelta(seconds=CLAIM_TTL_SECONDS)\n    rows: list[tuple[str, datetime]] = []\n    for digest, claimed_at in claims.items():\n        key = str(digest).casefold()\n        timestamp = _parse_datetime(claimed_at)\n        if HEX_DIGEST_RE.fullmatch(key) and timestamp is not None and timestamp >= threshold:\n            rows.append((key, timestamp))\n    rows.sort(key=lambda item: item[1], reverse=True)\n    return {digest: timestamp.isoformat() for digest, timestamp in rows[:MAX_CLAIMS]}\n\n\n'''
          addition = anchor + '''def _pruned_messages(\n    messages: dict[str, Any],\n    current: datetime | None = None,\n) -> dict[str, dict[str, Any]]:\n    current = current or now_utc()\n    threshold = current - timedelta(seconds=RETENTION_SECONDS)\n    rows: list[tuple[str, datetime, int]] = []\n    for digest, raw in messages.items():\n        key = str(digest).casefold()\n        record = raw if isinstance(raw, dict) else {}\n        timestamp = _parse_datetime(record.get("recorded_at"))\n        try:\n            message_id = int(record.get("message_id") or 0)\n        except (TypeError, ValueError):\n            message_id = 0\n        if (\n            HEX_DIGEST_RE.fullmatch(key)\n            and timestamp is not None\n            and timestamp >= threshold\n            and message_id > 0\n        ):\n            rows.append((key, timestamp, message_id))\n    rows.sort(key=lambda item: item[1], reverse=True)\n    return {\n        digest: {"message_id": message_id, "recorded_at": timestamp.isoformat()}\n        for digest, timestamp, message_id in rows[:MAX_ENTRIES]\n    }\n\n\n'''
          if anchor not in text:
              raise SystemExit("notification message pruning anchor not found")
          text = text.replace(anchor, addition, 1)
          text = text.replace(
              '    claims = value.get("claims") if isinstance(value, dict) else {}\n    normalized = default_state()\n    normalized["entries"] = _pruned_entries(entries if isinstance(entries, dict) else {})\n    normalized["claims"] = _pruned_claims(claims if isinstance(claims, dict) else {})\n',
              '    claims = value.get("claims") if isinstance(value, dict) else {}\n    messages = value.get("messages") if isinstance(value, dict) else {}\n    normalized = default_state()\n    normalized["entries"] = _pruned_entries(entries if isinstance(entries, dict) else {})\n    normalized["claims"] = _pruned_claims(claims if isinstance(claims, dict) else {})\n    normalized["messages"] = _pruned_messages(messages if isinstance(messages, dict) else {})\n',
              1,
          )
          digest_anchor = '''def duplicate_delivery(digest: str, path: Path | None = None) -> bool:\n'''
          digest_functions = '''def participation_message_digest(\n    chat_id: str,\n    button_token: str,\n    *,\n    secret: str | None = None,\n) -> str:\n    payload = json.dumps(\n        ["participation-message", str(chat_id), str(button_token).casefold()],\n        ensure_ascii=False,\n        separators=(",", ":"),\n    ).encode("utf-8")\n    return hmac.new(_secret(secret), payload, hashlib.sha256).hexdigest()\n\n\ndef record_participation_message(\n    chat_id: str,\n    button_token: str,\n    message_id: int,\n    path: Path | None = None,\n) -> None:\n    token = str(button_token or "").strip().casefold()\n    try:\n        numeric_message_id = int(message_id)\n    except (TypeError, ValueError):\n        return\n    if not token or numeric_message_id <= 0:\n        return\n    digest = participation_message_digest(chat_id, token)\n    target = _state_path(path)\n    with _lock:\n        with _file_lock(target):\n            state = load_state(target)\n            state.setdefault("messages", {})[digest] = {\n                "message_id": numeric_message_id,\n                "recorded_at": now_utc().isoformat(),\n            }\n            save_state(state, target)\n\n\ndef participation_message_id(\n    chat_id: str,\n    button_token: str,\n    path: Path | None = None,\n) -> int | None:\n    token = str(button_token or "").strip().casefold()\n    if not token:\n        return None\n    digest = participation_message_digest(chat_id, token)\n    target = _state_path(path)\n    with _lock:\n        with _file_lock(target):\n            state = load_state(target)\n    record = state.get("messages", {}).get(digest)\n    if not isinstance(record, dict):\n        return None\n    recorded_at = _parse_datetime(record.get("recorded_at"))\n    if recorded_at is None or now_utc() - recorded_at > timedelta(seconds=RETENTION_SECONDS):\n        return None\n    try:\n        value = int(record.get("message_id") or 0)\n    except (TypeError, ValueError):\n        return None\n    return value if value > 0 else None\n\n\n'''
          if digest_anchor not in text:
              raise SystemExit("notification digest insertion anchor not found")
          text = text.replace(digest_anchor, digest_functions + digest_anchor, 1)
          text = text.replace(
              '    entries: dict[str, Any] = {}\n    claims: dict[str, Any] = {}\n',
              '    entries: dict[str, Any] = {}\n    claims: dict[str, Any] = {}\n    messages: dict[str, Any] = {}\n',
              1,
          )
          merge_anchor = '''        raw_claims = value.get("claims") if isinstance(value, dict) else None\n        if isinstance(raw_claims, dict):\n            for digest, claimed_at in raw_claims.items():\n                key = str(digest).casefold()\n                incoming = _parse_datetime(claimed_at)\n                previous = _parse_datetime(claims.get(key))\n                if HEX_DIGEST_RE.fullmatch(key) and incoming is not None and (\n                    previous is None or incoming > previous\n                ):\n                    claims[key] = incoming.isoformat()\n'''
          merge_addition = merge_anchor + '''        raw_messages = value.get("messages") if isinstance(value, dict) else None\n        if isinstance(raw_messages, dict):\n            for digest, raw_record in raw_messages.items():\n                key = str(digest).casefold()\n                record = raw_record if isinstance(raw_record, dict) else {}\n                incoming = _parse_datetime(record.get("recorded_at"))\n                previous_record = messages.get(key) if isinstance(messages.get(key), dict) else {}\n                previous = _parse_datetime(previous_record.get("recorded_at"))\n                try:\n                    message_id = int(record.get("message_id") or 0)\n                except (TypeError, ValueError):\n                    message_id = 0\n                if (\n                    HEX_DIGEST_RE.fullmatch(key)\n                    and incoming is not None\n                    and message_id > 0\n                    and (previous is None or incoming > previous)\n                ):\n                    messages[key] = {\n                        "message_id": message_id,\n                        "recorded_at": incoming.isoformat(),\n                    }\n'''
          if merge_anchor not in text:
              raise SystemExit("notification merge anchor not found")
          text = text.replace(merge_anchor, merge_addition, 1)
          text = text.replace(
              '    merged["claims"] = _pruned_claims(claims)\n    for digest in merged["entries"]:\n',
              '    merged["claims"] = _pruned_claims(claims)\n    merged["messages"] = _pruned_messages(messages)\n    for digest in merged["entries"]:\n',
              1,
          )
          text = text.replace(
              '    router_module.complete_delivery = complete_delivery\n    router_module._bbvg_notification_integrity_v2_installed = True\n',
              '    router_module.complete_delivery = complete_delivery\n    router_module.record_participation_message = record_participation_message\n    router_module.participation_message_id = participation_message_id\n    router_module._bbvg_notification_integrity_v2_installed = True\n',
              1,
          )
          self_test_anchor = '''            state = load_state()\n            assert digest in state["entries"]\n\n            config = {\n'''
          self_test_addition = '''            state = load_state()\n            assert digest in state["entries"]\n            record_participation_message("123456", "token-1", 777)\n            assert participation_message_id("123456", "token-1") == 777\n            raw = STATE_PATH.read_text(encoding="utf-8")\n            assert "123456" not in raw\n            assert "token-1" not in raw\n\n            config = {\n'''
          if self_test_anchor not in text:
              raise SystemExit("notification self-test anchor not found")
          text = text.replace(self_test_anchor, self_test_addition, 1)
          integrity.write_text(text, encoding="utf-8")

          router = Path("notification_router.py")
          text = router.read_text(encoding="utf-8")
          router_anchor = '''def install(monitor_module: Any) -> None:\n'''
          router_helpers = '''def participation_button_token(reply_markup: dict | None) -> str:\n    if not isinstance(reply_markup, dict):\n        return ""\n    for row in reply_markup.get("inline_keyboard", []):\n        if not isinstance(row, list):\n            continue\n        for button in row:\n            if not isinstance(button, dict):\n                continue\n            callback = str(button.get("callback_data") or "")\n            if callback.startswith("bb:p:"):\n                return callback.split(":", 2)[2].casefold()\n    return ""\n\n\ndef record_participation_message(\n    _chat_id: str,\n    _button_token: str,\n    _message_id: int,\n) -> None:\n    """Installed by notification_integrity_v2; default keeps router standalone."""\n\n\ndef participation_message_id(_chat_id: str, _button_token: str) -> int | None:\n    return None\n\n\n'''
          if router_anchor not in text:
              raise SystemExit("notification router install anchor not found")
          text = text.replace(router_anchor, router_helpers + router_anchor, 1)
          send_anchor = '''                response = monitor_module.telegram_api("sendMessage", payload)\n                result = response\n                sent += 1\n'''
          send_replacement = '''                response = monitor_module.telegram_api("sendMessage", payload)\n                result = response\n                response_result = response.get("result") if isinstance(response, dict) else None\n                button_token = participation_button_token(target_markup)\n                if button_token and isinstance(response_result, dict):\n                    try:\n                        sent_message_id = int(response_result.get("message_id") or 0)\n                    except (TypeError, ValueError):\n                        sent_message_id = 0\n                    if sent_message_id > 0:\n                        record_participation_message(chat_id, button_token, sent_message_id)\n                sent += 1\n'''
          if send_anchor not in text:
              raise SystemExit("notification router send anchor not found")
          text = text.replace(send_anchor, send_replacement, 1)
          router_test_anchor = '''    assert notification_event_identity(\n        "wheel_final_reminders",\n'''
          router_test_insert = '''    assert participation_button_token(\n        {"inline_keyboard": [[{"text": "Участвую", "callback_data": "bb:p:ABC123"}]]}\n    ) == "abc123"\n    assert notification_event_identity(\n        "wheel_final_reminders",\n'''
          if router_test_anchor not in text:
              raise SystemExit("notification router test anchor not found")
          text = text.replace(router_test_anchor, router_test_insert, 1)
          router.write_text(text, encoding="utf-8")

          owner_sync = Path("auto_participation_owner_sync.py")
          text = owner_sync.read_text(encoding="utf-8")
          text = text.replace(
              'import personal_wheel_voting\n',
              'import notification_integrity_v2\nimport personal_wheel_voting\n',
              1,
          )
          owner_anchor = '''def _success_message(\n'''
          owner_helper = '''def _mark_original_notification(\n    panel: Any,\n    owner_chat_id: str,\n    item: dict[str, Any],\n) -> bool:\n    button_token = str(item.get("button_token") or "").strip().casefold()\n    if not button_token:\n        return False\n    try:\n        message_id = notification_integrity_v2.participation_message_id(\n            owner_chat_id, button_token\n        )\n    except Exception as exc:\n        print(\n            "WARNING participation notification lookup failed: "\n            f"{type(exc).__name__}: {exc}"\n        )\n        return False\n    if not message_id:\n        return False\n    url = str(item.get("url") or "").strip()\n    button: dict[str, Any] = {\n        "text": "✅ Участвую",\n        "callback_data": f"bb:p:{button_token}",\n    }\n    if url:\n        button = {"text": "✅ Участвую", "url": url}\n    try:\n        response = panel.telegram_api(\n            "editMessageReplyMarkup",\n            {\n                "chat_id": owner_chat_id,\n                "message_id": int(message_id),\n                "reply_markup": {"inline_keyboard": [[button]]},\n            },\n        )\n    except Exception as exc:\n        print(\n            "WARNING automatic participation button update failed: "\n            f"message_id={message_id} {type(exc).__name__}: {exc}"\n        )\n        return False\n    return bool(response.get("ok", True)) if isinstance(response, dict) else True\n\n\n'''
          if owner_anchor not in text:
              raise SystemExit("owner sync message anchor not found")
          text = text.replace(owner_anchor, owner_helper + owner_anchor, 1)
          owner_call_anchor = '''            sources = panel._sources_for_item(snap, key, item)\n            text, markup = _success_message(key, item, sources, weight, changed)\n            panel.send(text, reply_markup=markup, chat_id=owner_chat_id)\n'''
          owner_call_replacement = '''            sources = panel._sources_for_item(snap, key, item)\n            original_button_updated = _mark_original_notification(\n                panel, owner_chat_id, item\n            )\n            text, markup = _success_message(key, item, sources, weight, changed)\n            panel.send(text, reply_markup=markup, chat_id=owner_chat_id)\n'''
          if owner_call_anchor not in text:
              raise SystemExit("owner sync success call anchor not found")
          text = text.replace(owner_call_anchor, owner_call_replacement, 1)
          text = text.replace(
              '                    "rating_weight": weight,\n                    "vote_command_id": (\n',
              '                    "rating_weight": weight,\n                    "original_button_updated": original_button_updated,\n                    "vote_command_id": (\n',
              1,
          )
          owner_sync.write_text(text, encoding="utf-8")

          # Keep the repository contract explicit and prevent future regression.
          agents = Path("AGENTS.md")
          text = agents.read_text(encoding="utf-8")
          marker = '- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку;'
          index = text.find(marker)
          if index < 0:
              raise SystemExit("AGENTS auto participation contract not found")
          line_end = text.find("\n", index)
          line = text[index:line_end]
          addition = (
              " Запуски `auto-participation.yml` сериализованы без отмены активного запуска; "
              "результат объединяется с последним `state.json` перед каждым push. "
              "Для исходной Telegram-кнопки хранится только HMAC-ссылка на message_id без chat ID; "
              "после успеха Control Center переводит кнопку в состояние «✅ Участвую»."
          )
          if "сериализованы без отмены" not in line:
              text = text[:line_end] + addition + text[line_end:]
              agents.write_text(text, encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog.read_text(encoding="utf-8")
          heading = "## 2026-07-22 — Результат автоучастия больше не теряется между workflow и Control Center"
          if heading not in text:
              marker = "---\n\n"
              entry = '''## 2026-07-22 — Результат автоучастия больше не теряется между workflow и Control Center\n\nИнцидент `zonertg13` показал разрыв: GitHub принял `workflow_dispatch`, но активный запуск автоучастия не записал outcome в `auto_participation_events`. Поэтому Control Center не получил `bot_success_pending_at`, не отправил подтверждение и не выполнил автоматическую личную отметку владельца.\n\n`auto-participation.yml` больше не отменяет активный запуск новым dispatch. Worker и recovery допускают завершение с технической ошибкой, но очередь Control Center и сохранение состояния выполняются через `always()`. Перед каждым push outcome объединяется с самым свежим `state.json`, поэтому heartbeat или параллельный monitor-коммит не могут стереть подтверждённое участие. Dispatch без результата автоматически переводится в retry, а не в пользовательскую неудачу.\n\nМонитор сохраняет HMAC-ссылку на Telegram message_id без публикации chat ID или callback-токена. После штатной личной отметки Control Center обновляет исходную кнопку владельца до «✅ Участвую» и затем отправляет отдельное подтверждение.\n\n**Pre-update backup:** `backup/2026-07-22-before-auto-participation-delivery-repair` → `4f2810554534a966fbe173b2f25880e620f9780d`.\n\n'''
              if marker not in text:
                  raise SystemExit("PROJECT_CHANGELOG_RU.md marker not found")
              changelog.write_text(text.replace(marker, marker + entry, 1), encoding="utf-8")

          Path(".github/workflows/repair-auto-participation-delivery.yml").unlink()
          PY

      - name: Validate repair
        shell: bash
        env:
          BOT_STATE_KEY: repair-validation-secret
        run: |
          set -euo pipefail
          python -m py_compile \
            auto_participation_bot_sync.py \
            auto_participation_owner_sync.py \
            personal_reminder_filter.py \
            notification_router.py \
            notification_integrity_v2.py
          python auto_participation_bot_sync.py --self-test
          python notification_integrity_v2.py --self-test
          python notification_router.py
          python personal_reminder_filter.py
          python auto_participation_owner_sync.py
          python - <<'PY'
          from tests import test_actions_security
          test_actions_security.test_official_actions_are_immutably_pinned()
          print("Auto participation delivery repair validation passed")
          PY

      - name: Publish repair and rerun current auto participation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить доставку результата автоучастия и кнопку Участвую"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done

          gh workflow run auto-participation.yml --repo "$REPOSITORY" --ref main
          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Исправление опубликовано; автоучастие для текущего активного колеса запущено повторно."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/repair-auto-participation-delivery"
