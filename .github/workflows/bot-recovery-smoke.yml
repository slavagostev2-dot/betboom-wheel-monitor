name: Bot recovery smoke test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      EXPECTED_SOURCE_COUNT: "66"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run recovery smoke test
        run: |
          set -euo pipefail
          python -m py_compile \
            admin_panel_runtime_v25.py admin_panel_runtime_v26.py \
            admin_panel_runtime_v27.py admin_panel_runtime_v28.py admin_panel_runtime_v29.py \
            bot_private_state.py bot_notification_state.py migrate_bot_private_state.py \
            admin_action_v2.py rating_policy.py bbvg_monitor_main.py \
            system_checks_v2.py source_tier_maintenance_v2.py
          python bot_private_state.py
          python migrate_bot_private_state.py --check
          python admin_panel_runtime_v25.py --self-test
          python admin_panel_runtime_v26.py --self-test
          python admin_panel_runtime_v28.py --self-test
          python admin_panel_runtime_v29.py --self-test
          python admin_action_v2.py --self-test
          python system_checks_v2.py --self-test
          python source_tier_maintenance_v2.py --self-test
          python - <<'PY'
          import admin_panel_runtime_v25
          import admin_panel_runtime_v26
          import admin_panel_runtime_v28
          import admin_panel_runtime_v29
          import bbvg_monitor_main
          import bot_notification_state
          import notification_router

          assert admin_panel_runtime_v25.TelegramPanelRuntimeV25.__mro__[1].__name__ == "TelegramPanelRuntimeV22"
          assert admin_panel_runtime_v26.TelegramPanelRuntimeV26.__mro__[1].__name__ == "TelegramPanelRuntimeV25"
          assert admin_panel_runtime_v29.TelegramPanelRuntimeV29.__mro__[1].__name__ == "TelegramPanelRuntimeV28"
          assert notification_router.load_config is bot_notification_state.load_config
          assert bbvg_monitor_main.monitor.data_store.record_admin_wheel_decision.__module__ == "bbvg_monitor_main"

          def callbacks(rows):
              return [button.get("callback_data") for row in rows for button in row]

          admin_main = callbacks(admin_panel_runtime_v29.TelegramPanelRuntimeV29.compact_menu_rows(True))
          user_main = callbacks(admin_panel_runtime_v29.TelegramPanelRuntimeV29.compact_menu_rows(False))
          assert len(admin_main) == len(set(admin_main))
          assert len(user_main) == len(set(user_main))
          assert "page:control" in admin_main
          assert "page:settings" in user_main
          assert "page:status" in user_main
          assert "page:discovery" not in admin_main
          assert "page:intelligence" not in admin_main

          admin_sources = callbacks(admin_panel_runtime_v29.TelegramPanelRuntimeV29.source_menu_rows(True))
          user_sources = callbacks(admin_panel_runtime_v29.TelegramPanelRuntimeV29.source_menu_rows(False))
          assert {"page:discovery", "page:intelligence", "source:add"} <= set(admin_sources)
          assert not {"page:discovery", "page:intelligence", "source:add"} & set(user_sources)
          assert "source:request_help" in user_sources
          print("Bot recovery smoke test passed")
          PY
