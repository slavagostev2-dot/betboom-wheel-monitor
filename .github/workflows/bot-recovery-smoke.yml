name: Bot recovery smoke test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Audit bot access state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'bot_access.json']); assert not f,f"
      - name: Audit source request state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'source_requests.json']); assert not f,f"
      - name: Audit system check state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'system_check_state.json']); assert not f,f"
      - name: Audit notification delivery state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'notification_delivery_state.json']); assert not f,f"
      - name: Audit encrypted bot state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'bot_private_state.enc.json']); assert not f,f"
      - name: Audit wheel state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'state.json']); assert not f,f"
      - name: Audit source statistics state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'source_stats.json']); assert not f,f"
      - name: Audit candidate moderation state
        run: python -c "from security_audit import ROOT,scan_current; f=scan_current([ROOT/'candidate_moderation.json']); assert not f,f"

      - name: Audit remaining root files
        run: |
          python - <<'PY'
          from security_audit import ROOT, scan_current, tracked_files
          excluded = {
              'bot_access.json', 'source_requests.json', 'system_check_state.json',
              'notification_delivery_state.json', 'bot_private_state.enc.json',
              'state.json', 'source_stats.json', 'candidate_moderation.json',
          }
          paths = [p for p in tracked_files() if '/' not in p.relative_to(ROOT).as_posix() and p.name not in excluded]
          findings = scan_current(paths)
          assert not findings, findings
          PY
      - name: Audit bbvg package
        run: |
          python - <<'PY'
          from security_audit import ROOT, scan_current, tracked_files
          paths = [p for p in tracked_files() if p.relative_to(ROOT).as_posix().startswith('bbvg/')]
          findings = scan_current(paths)
          assert not findings, findings
          PY
      - name: Audit tests
        run: |
          python - <<'PY'
          from security_audit import ROOT, scan_current, tracked_files
          paths = [p for p in tracked_files() if p.relative_to(ROOT).as_posix().startswith('tests/')]
          findings = scan_current(paths)
          assert not findings, findings
          PY
      - name: Audit documentation
        run: |
          python - <<'PY'
          from security_audit import ROOT, scan_current, tracked_files
          paths = [p for p in tracked_files() if p.relative_to(ROOT).as_posix().startswith('docs/')]
          findings = scan_current(paths)
          assert not findings, findings
          PY
      - name: Audit workflows
        run: |
          python - <<'PY'
          from security_audit import ROOT, scan_current, tracked_files
          paths = [p for p in tracked_files() if p.relative_to(ROOT).as_posix().startswith('.github/')]
          findings = scan_current(paths)
          assert not findings, findings
          PY
