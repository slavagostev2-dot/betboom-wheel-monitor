name: Apply direct VK architecture docs

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/direct-vk-wheel-delivery-production
          fetch-depth: 0
      - name: Update AGENTS and changelog
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          anchor = '- Монитор колёс: `bbvg_monitor_main.py`, `monitor.py` и тематические модули.\n'
          line = anchor + '- VK-уведомления о новых колёсах отправляются напрямую из monitor-runtime: `vk_wheel_notifications.py` определяет событие и дедупликацию, `vk_dynamic_subscribers.py` получает доступные диалоги и вызывает VK API. `vk-wheel-notification.yml` остаётся только ручным fallback/диагностикой.\n'
          if 'VK-уведомления о новых колёсах отправляются напрямую' not in text:
              if anchor not in text:
                  raise SystemExit('AGENTS monitor anchor not found')
              agents.write_text(text.replace(anchor, line, 1), encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          title = '## 2026-07-21 — VK-доставка переведена напрямую в монитор'
          entry = '''## 2026-07-21 — VK-доставка переведена напрямую в монитор\n\nПовторная production-диагностика после пропуска `zonertg12` показала: монитор исправно видит колесо, `VK_GROUP_TOKEN` настроен, VK API возвращает три доступных для записи пользовательских диалога, но после 19 июля не создавался ни один новый запуск `VK wheel notification`. Доставка обрывалась на промежуточном переходе monitor → GitHub workflow ещё до обращения к VK API.\n\nProduction-доставка новых колёс теперь выполняется напрямую из живого monitor-runtime через существующий `vk_dynamic_subscribers.py`. Распознавание только первичного события, event-level dedupe и изоляция Telegram остаются в `vk_wheel_notifications.py`. В monitor workflow передаётся repository secret `VK_GROUP_TOKEN`; значение секрета не сохраняется в коде или runtime-state. Ошибка VK освобождает dedupe-claim для повторной попытки и не ломает Telegram.\n\nДобавлены regression-тесты прямой отправки всем доступным диалогам и повторной попытки после ошибки. `vk-wheel-notification.yml` оставлен только как ручной fallback/диагностика и больше не является production-hop.\n\n**Pre-update backup:** `backup/before-direct-vk-wheel-delivery-2026-07-21` → `7d435b7efc7f74c9dd7731337f351a96d6b228d9`.\n\n**Откат:** вернуть commit целиком; миграция данных не требуется.\n\n'''
          if title not in text:
              marker = '---\n\n'
              if marker not in text:
                  raise SystemExit('changelog marker not found')
              changelog.write_text(text.replace(marker, marker + entry, 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Document direct VK wheel delivery"
          git push origin HEAD:fix/direct-vk-wheel-delivery-production
