name: Runtime local compatibility self-tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  local-self-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      UNKNOWN_DEDUP_HOURS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt

      - name: Local v25 self-test
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          import bot_private_state
          import admin_panel_runtime_v25 as module

          cls = module.TelegramPanelRuntimeV25
          original = cls.load_access
          original_path = bot_private_state.STATE_PATH
          def local(self, force=False):
              bundle = getattr(self, '_bot_bundle', None)
              if isinstance(bundle, dict):
                  self.access = self.normalize_access(bundle.get('access', {}))
                  self.access_loaded = True
                  return self.access
              return original(self, False)
          cls.load_access = local
          try:
              with TemporaryDirectory() as directory:
                  bot_private_state.STATE_PATH = Path(directory) / 'state.json'
                  module.self_test()
          finally:
              cls.load_access = original
              bot_private_state.STATE_PATH = original_path
          PY

      - name: Local v30 self-test
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          import bot_private_state
          import admin_panel_runtime_v30 as module

          cls = module.TelegramPanelRuntimeV30
          original = cls.load_access
          original_path = bot_private_state.STATE_PATH
          def local(self, force=False):
              bundle = getattr(self, '_bot_bundle', None)
              if isinstance(bundle, dict):
                  self.access = self.normalize_access(bundle.get('access', {}))
                  self.access_loaded = True
                  return self.access
              return original(self, False)
          cls.load_access = local
          try:
              with TemporaryDirectory() as directory:
                  bot_private_state.STATE_PATH = Path(directory) / 'state.json'
                  module.self_test()
          finally:
              cls.load_access = original
              bot_private_state.STATE_PATH = original_path
          PY

      - name: Remaining runtime self-tests
        run: |
          python admin_panel_runtime_v26.py --self-test
          python admin_panel_runtime_v28.py --self-test
          python admin_panel_runtime_v29.py --self-test
          python admin_panel_runtime_v31.py --self-test
          python admin_panel_runtime_v32.py --self-test
          python admin_panel_runtime_v36.py --self-test
          python admin_panel_runtime_v37.py --self-test
          python admin_panel_runtime_v38.py --self-test
          python admin_panel_runtime_v41.py --self-test
