name: Gorilla public post diagnostic

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/gorilla-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install requests beautifulsoup4
      - name: Capture public Gorilla posts
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from datetime import datetime, timezone

          import requests
          from bs4 import BeautifulSoup

          marker = re.compile(r'data-post="([^"/]+)/([0-9]+)"', re.I)
          result = {"captured_at": datetime.now(timezone.utc).isoformat(), "sources": {}}
          for source in ("danila_gorilla", "gorilla_armor"):
              response = requests.get(
                  f"https://telegram.me/s/{source}",
                  timeout=30,
                  headers={"User-Agent": "Mozilla/5.0"},
              )
              response.raise_for_status()
              page = response.text
              matches = list(marker.finditer(page))
              posts = []
              for index, match in enumerate(matches[-20:]):
                  absolute = len(matches) - min(20, len(matches)) + index
                  end = matches[absolute + 1].start() if absolute + 1 < len(matches) else len(page)
                  segment = page[match.start():end]
                  soup = BeautifulSoup(segment, "html.parser")
                  node = soup.select_one("div.tgme_widget_message_text")
                  text = node.get_text("\n", strip=True) if node else ""
                  hrefs = []
                  for value in re.findall(r'href=["\']([^"\']+)', segment, re.I):
                      value = html.unescape(value).strip()
                      if value and value not in hrefs:
                          hrefs.append(value)
                  time_node = soup.select_one("time[datetime]")
                  posts.append({
                      "post": f"{match.group(1)}/{match.group(2)}",
                      "datetime": str(time_node.get("datetime") or "") if time_node else "",
                      "text": text[:2000],
                      "hrefs": hrefs,
                  })
              result["sources"][source] = {
                  "status": response.status_code,
                  "post_count": len(posts),
                  "posts": posts,
              }
          with open("gorilla_diagnostic.json", "w", encoding="utf-8") as stream:
              json.dump(result, stream, ensure_ascii=False, indent=2)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gorilla_diagnostic.json
          git commit -m "Capture Gorilla public post diagnostic [skip ci]" || true
          git push origin HEAD:main
