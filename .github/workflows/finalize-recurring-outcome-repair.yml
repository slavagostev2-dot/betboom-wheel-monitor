name: Finalize recurring wheel outcome repair

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/finalize-recurring-outcome-repair.yml"

permissions:
  contents: read

jobs:
  finalize:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/recurring-wheel-auto-outcome-delivery
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply validated repair
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/apply_recurring_outcome_repair.py")
          text = path.read_text(encoding="utf-8")
          old = "Запуски `auto-participation.yml` сериализованы без отмены активного запуска. Подтверждённый успех основной event-попытки сразу ставится в очередь Control Center; затем выполняется быстрый независимый retry только по уже найденным активным колёсам, проверяются второй аккаунт владельца и `xFLARXx`, а промежуточный результат публикуется в `state.json` до полного пересканирования источников. Полный source-recovery остаётся страховочным вторым проходом, и каждый push объединяется с последним `state.json`."
          current = "Запуски `auto-participation.yml` сериализованы без отмены активного запуска; результат объединяется с последним `state.json` перед каждым push."
          if old not in text:
              raise SystemExit("Old AGENTS expectation not found")
          path.write_text(text.replace(old, current, 1), encoding="utf-8")
          PY
          python scripts/apply_recurring_outcome_repair.py

      - name: Remove temporary automation and diagnostics
        run: |
          rm -f scripts/apply_recurring_outcome_repair.py
          rm -f repair_failure.txt recurring_repair_failure_v3.txt recurring_repair_failure_v4.txt
          rm -f .github/workflows/apply-recurring-outcome-repair.yml
          rm -f .github/workflows/apply-faster-notification-core-v2.yml

      - name: Compile changed modules
        run: |
          python -m py_compile \
            auto_participation_bot_sync.py \
            auto_participation_recovery.py \
            auto_participation_notifications.py \
            bbvg_monitor_runtime.py

      - name: Run focused self-tests and preflight
        run: |
          python - <<'PY'
          import auto_participation_bot_sync
          import auto_participation_notifications
          import auto_participation_recovery
          auto_participation_bot_sync.self_test()
          auto_participation_notifications.self_test()
          auto_participation_recovery.self_test()
          PY
          python preflight.py

      - name: Run full pytest suite
        run: python -m pytest

      - name: Publish validated feature branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix recurring wheel notifications and auto outcomes"
          git push origin HEAD:fix/recurring-wheel-auto-outcome-delivery

      - name: Remove finalizer from main
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/finalize-recurring-outcome-repair.yml
          git commit -m "Remove recurring outcome repair finalizer [skip ci]" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
