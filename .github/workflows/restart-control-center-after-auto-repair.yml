name: Restart Control Center after auto participation repair

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  restart:
    if: ${{ github.head_ref == 'restart-control-center-after-auto-repair' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Clean temporary repair files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/bot-state-backup.yml')
          text = workflow.read_text(encoding='utf-8')
          start_marker = '  # BEGIN AUTO_PARTICIPATION_DELIVERY_REPAIR_ONCE\n'
          end_marker = '  # END AUTO_PARTICIPATION_DELIVERY_REPAIR_ONCE\n'
          start = text.find(start_marker)
          if start >= 0:
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit('Temporary repair end marker not found')
              end += len(end_marker)
              workflow.write_text(text[:start] + text[end:], encoding='utf-8')

          for relative in (
              'repair-auto-participation-delivery.trigger',
              '.github/workflows/restart-control-center-after-auto-repair.yml',
          ):
              Path(relative).unlink(missing_ok=True)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Завершить ремонт доставки автоучастия"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done

      - name: Start corrected Control Center
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run admin-bot.yml --repo "$REPOSITORY" --ref main
          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Временные файлы удалены; исправленный Control Center запущен на текущем main."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/restart-control-center-after-auto-repair"
