name: Apply baseline contract changelog

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/nla-critical-pattern-tuples
          fetch-depth: 0
      - name: Add changelog and remove helper
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = path.read_text(encoding="utf-8")
          title = "## 2026-07-21 — Восстановлены базовые CI-контракты"
          entry = '''## 2026-07-21 — Восстановлены базовые CI-контракты\n\nВо время обязательной проверки исправления VK полный pytest выявил несколько\nнезависимых рассинхронизаций текущего `main`: две записи safety-политики\nтекстовых админ-команд имели неверную длину; `ai_runtime_state.json` не был\nзарегистрирован в едином ownership-контракте; workflow панели перестал явно\nобъявлять единственный записываемый private-state; изменения tier-файлов сами\nзапускали ночную разведку; UI-тест не учитывал уже добавленный экран профиля.\n\nКонтракты приведены к фактической production-архитектуре без расширения прав,\nизменения ролей или миграции пользовательских данных. Ночная разведка сохраняет\nправо атомарно записывать `public_sources.txt` и `source_catalog.txt`, но её\nсобственные tier-коммиты больше не вызывают повторный запуск. Полный pytest на\nитоговом дереве прошёл успешно. Новых постоянных файлов нет.\n\n**Откат:** вернуть commit целиком; миграция данных не требуется.\n\n'''
          if title not in text:
              marker = "---\n\n"
              if marker not in text:
                  raise SystemExit("Changelog insertion marker not found")
              path.write_text(text.replace(marker, marker + entry, 1), encoding="utf-8")
          Path(".github/workflows/apply-baseline-changelog.yml").unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Document baseline contract repairs"
          git push origin HEAD:fix/nla-critical-pattern-tuples
