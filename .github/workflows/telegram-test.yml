name: Telegram notification test

on:
  workflow_dispatch:
  push:
    branches:
      - test/codex-connector-write

jobs:
  telegram-test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test Telegram message
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        run: |
          set -e
          curl --fail --silent --show-error \
            -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${BOT_CHAT_ID}" \
            --data-urlencode "text=✅ Тестовое уведомление\n\nCodex Connector подключён к betboom-wheel-monitor. GitHub Actions и Telegram работают."