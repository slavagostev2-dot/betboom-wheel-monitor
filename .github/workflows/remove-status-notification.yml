name: Remove automatic monitor status notification

on:
  push:
    branches:
      - agent/remove-monitor-status-notification
    paths:
      - ".github/workflows/remove-status-notification.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-monitor-status-notification
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Disable periodic status message and verify
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path("bbvg_monitor_main.py")
          text = runtime.read_text(encoding="utf-8")
          old = (
              "# Error notifications are produced by system_checks.py and deduplicated in\n"
              "# incident_state.json. The five-minute worker must not repeat the same warning.\n"
              "monitor.all_failed_alert_due = lambda state: False\n"
          )
          new = (
              "# Error notifications are produced by system_checks.py and deduplicated in\n"
              "# incident_state.json. The five-minute worker must not repeat the same warning.\n"
              "monitor.all_failed_alert_due = lambda state: False\n\n"
              "# Routine monitor health is available from the panel on demand. Do not send\n"
              "# a periodic Telegram status message when there is no actionable event.\n"
              "monitor.automatic_status_due = lambda state: False\n"
          )
          if old not in text:
              raise SystemExit("Expected runtime integration point was not found")
          runtime.write_text(text.replace(old, new, 1), encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          log = changelog.read_text(encoding="utf-8")
          marker = "---\n\n"
          entry = (
              "## 2026-07-17 — Удалено периодическое уведомление о штатной работе монитора\n\n"
              "**Причина:** отчёт «BB V.G. работает» не содержал полезного действия и засорял чат при штатной проверке источников.\n\n"
              "**Что изменено:** автоматический двенадцатичасовой status-report больше не отправляется. Уведомления о найденных колёсах, напоминания, ручная проверка и сообщения об ошибках сохраняются. Состояние монитора по-прежнему доступно через интерфейс бота.\n\n"
              "**Изменённые файлы:** `bbvg_monitor_main.py`, `docs/PROJECT_CHANGELOG_RU.md`. Новые постоянные файлы не создавались.\n\n"
              "**Откат:** вернуть commit изменения целиком.\n\n"
          )
          if marker not in log:
              raise SystemExit("Changelog insertion marker was not found")
          changelog.write_text(log.replace(marker, marker + entry, 1), encoding="utf-8")
          PY
          python -m py_compile bbvg_monitor_main.py
          python -m pytest -q tests/test_lifecycle.py

      - name: Commit result and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/remove-status-notification.yml
          git add bbvg_monitor_main.py docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Remove periodic monitor status notification"
          git push origin HEAD:agent/remove-monitor-status-notification
