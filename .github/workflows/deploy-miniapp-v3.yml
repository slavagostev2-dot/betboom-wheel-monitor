name: Deploy Mini App v3

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-miniapp-v3.yml"
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: cloudflare-pages-miniapp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      PROJECT_NAME: slavagostev2-betboom-monitor
      APP_URL: https://slavagostev2-betboom-monitor.pages.dev/

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build public runtime configuration
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          token = os.environ.get("BOT_TOKEN", "").strip()
          username = ""
          if token:
              with urllib.request.urlopen(
                  f"https://api.telegram.org/bot{token}/getMe", timeout=20
              ) as response:
                  payload = json.load(response)
              username = str((payload.get("result") or {}).get("username") or "")
          Path("docs/runtime-config.js").write_text(
              "window.BB_CONFIG=" + json.dumps({"botUsername": username}, ensure_ascii=False) + ";\n",
              encoding="utf-8",
          )
          print(f"Bot username configured: {bool(username)}")
          PY

      - name: Validate application
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -f docs/index.html
          test -f docs/styles.css
          test -f docs/app.js
          test -f docs/icon.svg
          test -f docs/splash.svg
          node --check docs/app.js
          node --check docs/runtime-config.js
          node --check docs/service-worker.js
          ! grep -q "pending_posts||{}" docs/app.js
          ! grep -q "favorites" docs/app.js
          ! grep -q "Ближайшие колёса" docs/app.js
          ! grep -q "Сводка" docs/app.js
          grep -q "sourceRequestForm" docs/app.js
          grep -q "active_wheels" docs/app.js
          grep -q "splash.svg" docs/styles.css

      - name: Publish to Cloudflare Pages
        run: |
          npx --yes wrangler@4 pages project create "$PROJECT_NAME" --production-branch main || true
          npx --yes wrangler@4 pages deploy docs \
            --project-name "$PROJECT_NAME" \
            --branch main \
            --commit-hash "$GITHUB_SHA"

      - name: Record successful deployment
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).isoformat()
          deployment = {
              "status": "deployed",
              "provider": "cloudflare-pages",
              "url": os.environ["APP_URL"],
              "deployed_at": now,
              "commit": os.environ.get("GITHUB_SHA", ""),
          }
          runtime = {
              "status": "success",
              "checked_at": now,
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "commit": os.environ.get("GITHUB_SHA", ""),
          }
          for path, value in [
              ("miniapp_deployment.json", deployment),
              ("miniapp_deploy_runtime.json", runtime),
          ]:
              with open(path, "w", encoding="utf-8") as stream:
                  json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
                  stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp_deployment.json miniapp_deploy_runtime.json
          git commit -m "Record Mini App v3 deployment [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main
