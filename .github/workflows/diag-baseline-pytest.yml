name: Align Chapter 4 analytics ownership test

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/analytics-buttons-pre-update-order
          fetch-depth: 0
      - name: Align test with current analytics section ownership
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/test_ui_chapter4.py')
          text = path.read_text(encoding='utf-8')
          old = '''        self.assertIn("Активных колёс: <b>1</b>", text)\n        self.assertIn("Вы участвуете: <b>1</b>", text)\n'''
          new = '''        self.assertNotIn("Активных колёс", text)\n        self.assertNotIn("Вы участвуете", text)\n'''
          if old not in text:
              raise SystemExit('legacy live-analytics expectations not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_ui_chapter4.py
          git commit -m "Align Chapter 4 analytics ownership test"
          git push origin HEAD:fix/analytics-buttons-pre-update-order
