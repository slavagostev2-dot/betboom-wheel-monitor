name: VK test diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
    steps:
      - name: Diagnose first pytest failure
        shell: bash
        run: |
          git init -q repo
          cd repo
          git remote add origin https://github.com/slavagostev2-dot/betboom-wheel-monitor.git
          git fetch -q --depth=1 origin ${{ github.event.pull_request.head.sha }}
          git checkout -q FETCH_HEAD
          python3 -m pip install -q -r requirements-dev.txt >/dev/null 2>&1
          set +e
          python3 -m pytest -q -x > /tmp/pytest-output.txt 2>&1
          status=$?
          echo "PYTEST_EXIT=$status"
          tail -n 90 /tmp/pytest-output.txt
          exit $status
