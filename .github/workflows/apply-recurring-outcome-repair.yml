name: Apply recurring wheel outcome repair

on:
  push:
    branches: [fix/recurring-wheel-auto-outcome-delivery]
    paths:
      - ".github/workflows/apply-recurring-outcome-repair.yml"

permissions:
  contents: read

jobs:
  apply:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/recurring-wheel-auto-outcome-delivery
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply repair
        run: python scripts/apply_recurring_outcome_repair.py

      - name: Remove one-time repair files before validation
        run: |
          rm scripts/apply_recurring_outcome_repair.py
          rm .github/workflows/apply-recurring-outcome-repair.yml

      - name: Compile changed modules
        run: |
          python -m py_compile \
            auto_participation_bot_sync.py \
            auto_participation_recovery.py \
            auto_participation_notifications.py \
            bbvg_monitor_runtime.py

      - name: Run focused self-tests
        run: |
          python - <<'PY'
          import auto_participation_bot_sync
          import auto_participation_notifications
          import auto_participation_recovery
          auto_participation_bot_sync.self_test()
          auto_participation_notifications.self_test()
          auto_participation_recovery.self_test()
          PY

      - name: Run repository preflight
        run: python preflight.py

      - name: Run full pytest suite
        run: python -m pytest

      - name: Commit validated repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix recurring wheel notifications and auto outcomes"
          git push origin HEAD:fix/recurring-wheel-auto-outcome-delivery
