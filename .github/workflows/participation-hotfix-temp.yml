name: BB V.G. temporary participation hotfix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/participation-hotfix-temp.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Integrate hotfix and clean temporary files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          panel_path = Path("admin_panel_runtime_v41.py")
          panel = panel_path.read_text(encoding="utf-8")
          panel = panel.replace("import argparse\nimport html\n", "import argparse\nimport hashlib\nimport html\n", 1)
          old = '''    def _mark_personal_from_notification(self, query: dict[str, Any]) -> None:\n        data = str(query.get("data") or "")\n        token = data.split(":", 2)[2]\n        context = self.snapshot().state.get("button_contexts", {}).get(token)\n        if not isinstance(context, dict):\n            raise ValueError("Контекст кнопки устарел")\n        key = str(context.get("wheel_key") or context.get("identifier") or "").casefold()\n        if not key:\n            raise ValueError("Не удалось определить колесо")\n        self.mark_personal_participation(key)\n'''
          new = '''    @staticmethod\n    def _notification_button_token(key: str, entry: dict[str, Any]) -> str:\n        normalized = str(key or entry.get("wheel_key") or entry.get("identifier") or "").casefold()\n        source = str(entry.get("source") or "").strip().casefold()\n        try:\n            message_id = int(entry.get("message_id") or 0)\n        except (TypeError, ValueError):\n            message_id = 0\n        if not normalized or not source or message_id <= 0:\n            return ""\n        raw = f"{source}:{message_id}:{normalized}"\n        return hashlib.sha256(raw.encode("utf-8")).hexdigest()[:14]\n\n    def _mark_personal_from_notification(self, query: dict[str, Any]) -> None:\n        data = str(query.get("data") or "")\n        token = data.split(":", 2)[2]\n        snap = self.snapshot()\n        state = snap.state if isinstance(getattr(snap, "state", None), dict) else {}\n        context = state.get("button_contexts", {}).get(token)\n        if isinstance(context, dict):\n            key = str(context.get("wheel_key") or context.get("identifier") or "").casefold()\n            if not key:\n                raise ValueError("Не удалось определить колесо")\n            self.mark_personal_participation(key)\n            return\n\n        matches: list[str] = []\n        active = state.get("active_wheels")\n        if isinstance(active, dict):\n            for key, raw in active.items():\n                if not isinstance(raw, dict):\n                    continue\n                normalized = str(key).casefold()\n                stored = str(raw.get("button_token") or "")\n                computed = self._notification_button_token(normalized, raw)\n                if token and token in {stored, computed}:\n                    matches.append(normalized)\n        unique = sorted(set(matches))\n        if len(unique) != 1:\n            raise ValueError("Контекст кнопки устарел")\n        self.mark_personal_participation(unique[0])\n'''
          if old not in panel:
              raise SystemExit("notification callback block not found")
          panel = panel.replace(old, new, 1)
          test_anchor = '    assert ("delete", "bb:p:token") in events\n\n'
          test_insert = '''    assert ("delete", "bb:p:token") in events\n\n    events.clear()\n    panel.snapshot = lambda force=False: type(  # type: ignore[method-assign]\n        "Snap",\n        (),\n        {\n            "state": {\n                "button_contexts": {},\n                "active_wheels": {\n                    "hooch07": {\n                        "source": "hoochcs2",\n                        "message_id": 2198,\n                        "identifier": "hooch07",\n                    }\n                },\n            }\n        },\n    )()\n    panel._mark_personal_from_notification({"data": "bb:p:cba7abb40c5b77"})\n    assert ("participate", "hooch07") in events\n\n'''
          if test_anchor not in panel:
              raise SystemExit("notification callback self-test anchor not found")
          panel = panel.replace(test_anchor, test_insert, 1)
          panel_path.write_text(panel, encoding="utf-8")

          workflow_path = Path(".github/workflows/admin-bot.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          workflow = workflow.replace('      - "notification_button_recovery.py"\n', '', 1)
          validation = '''      - name: Validate notification participation recovery\n        env:\n          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}\n          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}\n          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}\n          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}\n          BBVG_TEST_MODE: "1"\n        run: python notification_button_recovery.py --self-test\n\n'''
          workflow = workflow.replace(validation, '', 1)
          workflow = workflow.replace(
              '        run: python notification_button_recovery.py\n',
              '        run: python admin_panel_runtime_v41.py\n',
              1,
          )
          workflow_path.write_text(workflow, encoding="utf-8")

          agents_path = Path("AGENTS.md")
          agents = agents_path.read_text(encoding="utf-8")
          old_agents = '- Автоучастие: `auto_participation_worker.py` обрабатывает сохранённые event-запросы; `auto_participation_recovery.py` независимо пересканирует свежие публикации текущего `public_sources.txt`, сверяет ссылки с BetBoom API и восстанавливает потерянные active/event записи; `betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия.\n'
          new_agents = '- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку, но не отправляет пользователю окончательное сообщение о неудаче до independent recovery; `auto_participation_recovery.py` пересканирует свежие публикации текущего `public_sources.txt`, сверяет ссылки с BetBoom API, делает финальную browser-попытку, восстанавливает потерянные active/event и callback-context записи и только после собственной неудачи отправляет предупреждение о ручном участии; `betboom_participation_browser.py` является устойчивым Playwright fallback фактического участия.\n'
          if old_agents not in agents:
              raise SystemExit("AGENTS auto participation line not found")
          agents_path.write_text(agents.replace(old_agents, new_agents, 1), encoding="utf-8")

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          insert_at = changelog.find("\n## ")
          if insert_at < 0:
              raise SystemExit("changelog insertion point not found")
          entry = '''\n## 2026-07-21 — Исправлены ложная ошибка автоучастия и кнопка «Участвую»\n\n- Реальный инцидент `hooch07`: recovery подтвердил участие BetBoom после нажатия, но первая event-попытка успела отправить ложное предупреждение о неудаче. Теперь event-worker откладывает failure-alert, а окончательное предупреждение разрешено только после неудачи независимого recovery.\n- Recovery восстанавливает `button_contexts` и `button_token` для active-wheel, если состояние колеса пришлось восстановить после уже доставленного Telegram-уведомления.\n- `admin_panel_runtime_v41.py` умеет восстановить wheel-key старой кнопки `bb:p:<token>` по стабильной формуле `source + message_id + wheel_key`, поэтому уже отправленная кнопка остаётся рабочей даже при утрате `button_contexts`.\n- Временный helper `notification_button_recovery.py` удалён: ответственность оставлена в действующем production entrypoint, без новой versioned/runtime-прослойки.\n'''
          changelog = changelog[:insert_at] + entry + changelog[insert_at:]
          changelog_path.write_text(changelog, encoding="utf-8")

          Path("notification_button_recovery.py").unlink(missing_ok=True)
          Path(".github/workflows/participation-hotfix-temp.yml").unlink(missing_ok=True)
          PY

          python admin_panel_runtime_v41.py --self-test
          python -m py_compile auto_participation_worker.py auto_participation_recovery.py admin_panel_runtime_v41.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить финальный результат автоучастия и кнопку Участвую"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

# retrigger: 2026-07-21
