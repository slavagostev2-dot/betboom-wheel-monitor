name: Prepare clean xFLARXx branch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cherry-pick-xflarxx-clean.yml"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WORK_BRANCH: feature/xflarxx-clean
      SOURCE_COMMIT: 3eb5419809820e3dfa9ed07560de78a087b8fe3b
      TEMP_WORKFLOW: .github/workflows/cherry-pick-xflarxx-clean.yml
    steps:
      - name: Checkout clean branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-clean
          fetch-depth: 0
          persist-credentials: true

      - name: Cherry-pick verified code commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$SOURCE_COMMIT"
          git cherry-pick "$SOURCE_COMMIT"
          git push origin "HEAD:${WORK_BRANCH}"

      - name: Remove temporary workflow from main
        if: ${{ always() }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$TEMP_WORKFLOW" ]]; then
            git rm "$TEMP_WORKFLOW"
            git commit -m "Remove completed clean xFLARXx preparation [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
