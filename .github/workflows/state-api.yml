name: Deploy BB V.G. private state API

on:
  push:
    branches: [main]
    paths:
      - "state_api/**"
      - ".github/workflows/state-api.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: bbvg-private-state-api
  cancel-in-progress: false

env:
  WORKER_NAME: bbvg-private-state
  DATABASE_NAME: bbvg-private-state
  APP_ORIGIN: https://slavagostev2-betboom-monitor.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check required secrets
        id: credentials
        shell: bash
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID BOT_TOKEN; do
            [[ -n "${!name:-}" ]] || { echo "Missing required secret: ${name}" >&2; exit 1; }
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Worker source
        id: validate
        run: node --check state_api/src/index.js

      - name: Resolve or create D1 database
        id: database
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "").strip()
          token = os.environ.get("CLOUDFLARE_API_TOKEN", "").strip()
          database_name = os.environ.get("DATABASE_NAME", "bbvg-private-state").strip()
          base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database"

          def call(method: str, url: str, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                      "User-Agent": "BBVG-GitHub-Actions/1.0",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      status = int(response.status)
                      raw = response.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  status = int(exc.code)
                  raw = exc.read().decode("utf-8", errors="replace")
              except urllib.error.URLError as exc:
                  return 0, {}, f"transport_error: {exc.reason}"
              try:
                  parsed = json.loads(raw) if raw else {}
              except json.JSONDecodeError:
                  parsed = {}
              return status, parsed if isinstance(parsed, dict) else {}, raw[:500]

          def error_details(payload, raw, status):
              errors = payload.get("errors") if isinstance(payload, dict) else None
              first = errors[0] if isinstance(errors, list) and errors else {}
              if not isinstance(first, dict):
                  first = {}
              code = str(first.get("code") or status or "unknown")[:80]
              message = str(first.get("message") or raw or "Cloudflare D1 request failed")
              message = " ".join(message.split())[:300]
              return code, message

          diagnostic = {
              "operation": "list",
              "http_status": 0,
              "error_code": "",
              "error_message": "",
          }
          database_id = ""
          status, payload, raw = call("GET", base + "?per_page=100")
          diagnostic["http_status"] = status
          if status == 200 and payload.get("success") is True:
              for item in payload.get("result") or []:
                  if isinstance(item, dict) and str(item.get("name") or "") == database_name:
                      database_id = str(item.get("uuid") or item.get("id") or "")
                      break
              if not database_id:
                  diagnostic["operation"] = "create"
                  status, payload, raw = call(
                      "POST",
                      base,
                      {"name": database_name, "jurisdiction": "eu"},
                  )
                  diagnostic["http_status"] = status
                  if status in {200, 201} and payload.get("success") is True:
                      result = payload.get("result") or {}
                      if isinstance(result, dict):
                          database_id = str(result.get("uuid") or result.get("id") or "")
          if database_id:
              diagnostic.update({
                  "ready": True,
                  "database_id_present": True,
                  "error_code": "",
                  "error_message": "",
              })
          else:
              code, message = error_details(payload, raw, status)
              diagnostic.update({
                  "ready": False,
                  "database_id_present": False,
                  "error_code": code,
                  "error_message": message,
              })

          Path("d1-diagnostic.json").write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as stream:
              stream.write(f"ready={'true' if database_id else 'false'}\n")
              stream.write(f"database_id={database_id}\n")
          print(
              "D1 resolution: "
              f"operation={diagnostic['operation']}, "
              f"http_status={diagnostic['http_status']}, "
              f"ready={diagnostic['ready']}"
          )
          PY

      - name: Build Wrangler configuration
        id: config
        if: steps.database.outputs.ready == 'true'
        env:
          DATABASE_ID: ${{ steps.database.outputs.database_id }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          value = {
              'name': os.environ['WORKER_NAME'],
              'main': 'src/index.js',
              'compatibility_date': '2026-07-14',
              'workers_dev': True,
              'vars': {
                  'APP_ORIGIN': os.environ['APP_ORIGIN'],
                  'TMA_MAX_AGE_SECONDS': '86400',
              },
              'd1_databases': [{
                  'binding': 'DB',
                  'database_name': os.environ['DATABASE_NAME'],
                  'database_id': os.environ['DATABASE_ID'],
              }],
          }
          Path('state_api/wrangler.generated.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Initialize D1 schema
        id: schema
        if: steps.database.outputs.ready == 'true'
        run: >-
          npx --yes wrangler@4 d1 execute "$DATABASE_NAME"
          --remote --config state_api/wrangler.generated.json
          --file state_api/schema.sql

      - name: Deploy Worker
        id: worker
        if: steps.database.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npx --yes wrangler@4 deploy --config state_api/wrangler.generated.json 2>&1 | tee worker-deploy.log
          worker_url="$(python - <<'PY'
          import re
          text = open('worker-deploy.log', encoding='utf-8', errors='replace').read()
          urls = re.findall(r'https://[^\s]+\.workers\.dev', text)
          print(urls[-1].rstrip('/')) if urls else None
          PY
          )"
          [[ -n "$worker_url" ]] || { echo "Worker URL not found" >&2; exit 1; }
          echo "url=$worker_url" >> "$GITHUB_OUTPUT"

      - name: Configure Worker secret
        id: secret
        if: steps.database.outputs.ready == 'true'
        run: >-
          printf '%s' "$BOT_TOKEN" |
          npx --yes wrangler@4 secret put BOT_TOKEN
          --config state_api/wrangler.generated.json

      - name: Verify Worker health
        id: health
        if: steps.database.outputs.ready == 'true'
        env:
          WORKER_URL: ${{ steps.worker.outputs.url }}
        run: curl -fsS --retry 5 --retry-delay 3 "$WORKER_URL/health"

      - name: Record deployment URL
        id: deployment_record
        if: steps.database.outputs.ready == 'true'
        env:
          WORKER_URL: ${{ steps.worker.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          value = {
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'database': os.environ['DATABASE_NAME'],
              'status': 'deployed',
              'url': os.environ['WORKER_URL'].rstrip('/'),
          }
          Path('private_state_deployment.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add private_state_deployment.json
          if git commit -m "Record private state API deployment [skip ci]"; then
            git push origin HEAD:main
          fi

      - name: Start controlled migration
        id: migration
        if: steps.database.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run migrate-private-state.yml --ref main

      - name: Record deployment diagnostics
        id: diagnostics
        if: always()
        continue-on-error: true
        env:
          CREDENTIALS: ${{ steps.credentials.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          DATABASE: ${{ steps.database.outcome }}
          DATABASE_READY: ${{ steps.database.outputs.ready }}
          CONFIG: ${{ steps.config.outcome }}
          SCHEMA: ${{ steps.schema.outcome }}
          DEPLOYMENT: ${{ steps.worker.outcome }}
          SECRET: ${{ steps.secret.outcome }}
          HEALTH: ${{ steps.health.outcome }}
          DEPLOYMENT_RECORD: ${{ steps.deployment_record.outcome }}
          MIGRATION: ${{ steps.migration.outcome }}
        shell: bash
        run: |
          set -uo pipefail
          git pull --rebase origin main || { git rebase --abort || true; }
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          keys = {
              'credentials': 'CREDENTIALS',
              'validation': 'VALIDATE',
              'database': 'DATABASE',
              'configuration': 'CONFIG',
              'schema': 'SCHEMA',
              'deployment': 'DEPLOYMENT',
              'secret': 'SECRET',
              'health': 'HEALTH',
              'deployment_record': 'DEPLOYMENT_RECORD',
              'migration_dispatch': 'MIGRATION',
          }
          value = {key: os.environ.get(env_name, 'unknown') for key, env_name in keys.items()}
          value['checked_at'] = datetime.now(timezone.utc).isoformat()
          value['run_id'] = os.environ.get('GITHUB_RUN_ID', '')
          value['database_ready'] = os.environ.get('DATABASE_READY', '') == 'true'
          try:
              d1 = json.loads(Path('d1-diagnostic.json').read_text(encoding='utf-8'))
          except Exception:
              d1 = {}
          value['database_operation'] = str(d1.get('operation') or '')
          value['database_http_status'] = int(d1.get('http_status') or 0)
          value['database_error_code'] = str(d1.get('error_code') or '')[:80]
          value['database_error_message'] = str(d1.get('error_message') or '')[:300]
          value['status'] = 'success' if all(
              value[key] == 'success'
              for key in (
                  'credentials', 'validation', 'database', 'configuration', 'schema',
                  'deployment', 'secret', 'health', 'deployment_record', 'migration_dispatch'
              )
          ) and value['database_ready'] else 'failure'
          Path('state_api_runtime.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state_api_runtime.json
          git commit -m "Record private state deployment diagnostics [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Fail unsuccessful deployment
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path('state_api_runtime.json').read_text(encoding='utf-8'))
          if value.get('status') != 'success':
              raise SystemExit(
                  'Private state deployment failed: '
                  f"database_http_status={value.get('database_http_status')}, "
                  f"database_error_code={value.get('database_error_code')}"
              )
          print('Private state deployment completed successfully')
          PY
