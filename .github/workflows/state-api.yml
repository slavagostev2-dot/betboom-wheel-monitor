name: Deploy BB V.G. private state API

on:
  push:
    branches: [main]
    paths:
      - "state_api/**"
      - ".github/workflows/state-api.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: bbvg-private-state-api
  cancel-in-progress: false

env:
  WORKER_NAME: bbvg-private-state
  DATABASE_NAME: bbvg-private-state
  APP_ORIGIN: https://slavagostev2-betboom-monitor.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check required secrets
        id: credentials
        shell: bash
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID BOT_TOKEN; do
            [[ -n "${!name:-}" ]] || { echo "Missing required secret: ${name}" >&2; exit 1; }
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Worker source
        id: validate
        run: node --check state_api/src/index.js

      - name: Resolve or create D1 database
        id: database
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" > d1-list.json
          database_id="$(python - <<'PY'
          import json, os
          payload = json.load(open('d1-list.json', encoding='utf-8'))
          if not payload.get('success', True):
              raise SystemExit(payload.get('errors') or 'D1 list failed')
          for item in payload.get('result') or []:
              if str(item.get('name') or '') == os.environ['DATABASE_NAME']:
                  print(item.get('uuid') or item.get('id') or '')
                  break
          PY
          )"
          if [[ -z "$database_id" ]]; then
            curl -fsS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${DATABASE_NAME}\",\"jurisdiction\":\"eu\"}" > d1-create.json
            database_id="$(python - <<'PY'
          import json
          payload = json.load(open('d1-create.json', encoding='utf-8'))
          if not payload.get('success'):
              raise SystemExit(payload.get('errors') or 'D1 creation failed')
          result = payload.get('result') or {}
          print(result.get('uuid') or result.get('id') or '')
          PY
            )"
          fi
          [[ -n "$database_id" ]]
          echo "database_id=$database_id" >> "$GITHUB_OUTPUT"

      - name: Build Wrangler configuration
        id: config
        env:
          DATABASE_ID: ${{ steps.database.outputs.database_id }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          value = {
              'name': os.environ['WORKER_NAME'],
              'main': 'src/index.js',
              'compatibility_date': '2026-07-14',
              'workers_dev': True,
              'vars': {
                  'APP_ORIGIN': os.environ['APP_ORIGIN'],
                  'TMA_MAX_AGE_SECONDS': '86400',
              },
              'd1_databases': [{
                  'binding': 'DB',
                  'database_name': os.environ['DATABASE_NAME'],
                  'database_id': os.environ['DATABASE_ID'],
              }],
          }
          Path('state_api/wrangler.generated.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Initialize D1 schema
        id: schema
        run: >-
          npx --yes wrangler@4 d1 execute "$DATABASE_NAME"
          --remote --config state_api/wrangler.generated.json
          --file state_api/schema.sql

      - name: Deploy Worker
        id: worker
        shell: bash
        run: |
          set -euo pipefail
          npx --yes wrangler@4 deploy --config state_api/wrangler.generated.json 2>&1 | tee worker-deploy.log
          worker_url="$(python - <<'PY'
          import re
          text = open('worker-deploy.log', encoding='utf-8', errors='replace').read()
          urls = re.findall(r'https://[^\s]+\.workers\.dev', text)
          print(urls[-1].rstrip('/')) if urls else None
          PY
          )"
          [[ -n "$worker_url" ]] || { echo "Worker URL not found" >&2; exit 1; }
          echo "url=$worker_url" >> "$GITHUB_OUTPUT"

      - name: Configure Worker secret
        id: secret
        run: >-
          printf '%s' "$BOT_TOKEN" |
          npx --yes wrangler@4 secret put BOT_TOKEN
          --config state_api/wrangler.generated.json

      - name: Verify Worker health
        id: health
        env:
          WORKER_URL: ${{ steps.worker.outputs.url }}
        run: curl -fsS --retry 5 --retry-delay 3 "$WORKER_URL/health"

      - name: Record deployment URL
        id: deployment_record
        env:
          WORKER_URL: ${{ steps.worker.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          value = {
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'database': os.environ['DATABASE_NAME'],
              'status': 'deployed',
              'url': os.environ['WORKER_URL'].rstrip('/'),
          }
          Path('private_state_deployment.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add private_state_deployment.json
          if git commit -m "Record private state API deployment [skip ci]"; then
            git push origin HEAD:main
          fi

      - name: Start controlled migration
        id: migration
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run migrate-private-state.yml --ref main

      - name: Record deployment diagnostics
        if: always()
        continue-on-error: true
        env:
          CREDENTIALS: ${{ steps.credentials.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          DATABASE: ${{ steps.database.outcome }}
          CONFIG: ${{ steps.config.outcome }}
          SCHEMA: ${{ steps.schema.outcome }}
          DEPLOYMENT: ${{ steps.worker.outcome }}
          SECRET: ${{ steps.secret.outcome }}
          HEALTH: ${{ steps.health.outcome }}
          DEPLOYMENT_RECORD: ${{ steps.deployment_record.outcome }}
          MIGRATION: ${{ steps.migration.outcome }}
        shell: bash
        run: |
          set -uo pipefail
          git pull --rebase origin main || { git rebase --abort || true; }
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          keys = {
              'credentials': 'CREDENTIALS',
              'validation': 'VALIDATE',
              'database': 'DATABASE',
              'configuration': 'CONFIG',
              'schema': 'SCHEMA',
              'deployment': 'DEPLOYMENT',
              'secret': 'SECRET',
              'health': 'HEALTH',
              'deployment_record': 'DEPLOYMENT_RECORD',
              'migration_dispatch': 'MIGRATION',
          }
          value = {key: os.environ.get(env_name, 'unknown') for key, env_name in keys.items()}
          value['checked_at'] = datetime.now(timezone.utc).isoformat()
          value['status'] = 'success' if all(
              value[key] == 'success'
              for key in ('credentials','validation','database','configuration','schema','deployment','secret','health','deployment_record','migration_dispatch')
          ) else 'failure'
          Path('state_api_runtime.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state_api_runtime.json
          git commit -m "Record private state deployment diagnostics [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
