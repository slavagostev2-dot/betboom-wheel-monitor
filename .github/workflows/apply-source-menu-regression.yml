name: Apply source menu regression correction

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply role-safe source menu
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          runtime = Path('bbvg/bot/runtime.py')
          text = runtime.read_text(encoding='utf-8')
          old = '''        rows: list[list[dict[str, str]]] = [
            [{"text": f"⚡ Основная проверка ({len(primary)})", "callback_data": "source_list:primary:0"}],
            [{"text": f"🌙 Ночное наблюдение ({len(reserve)})", "callback_data": "source_list:reserve:0"}],
            [{"text": f"⏸ Приостановлены ({len(paused)})", "callback_data": "source_list:paused:0"}],
        ]
        if self.is_admin():
            rows.append([{"text": "➕ Добавить источник", "callback_data": "source:add"}])
'''
          new = '''        # Reuse the existing role-safe source controls. The richer registry
        # text must not hide rating, discovery, intelligence or source requests.
        rows = self.source_menu_rows(self.is_admin())
'''
          if new not in text:
              if old not in text:
                  raise RuntimeError('show_sources row marker missing')
              text = text.replace(old, new, 1)
          runtime.write_text(text, encoding='utf-8')

          tests = Path('tests/test_button_matrix.py')
          text = tests.read_text(encoding='utf-8')
          marker = '''    def test_notification_button_role_matrix(self) -> None:
'''
          test = '''    def test_source_controls_remain_role_safe_after_analytics_expansion(self) -> None:
        admin = callbacks(TelegramPanelRuntime.source_menu_rows(True))
        user = callbacks(TelegramPanelRuntime.source_menu_rows(False))
        self.assertTrue({"page:ranking", "source_list:primary:0", "page:discovery", "page:intelligence", "source:add"} <= admin)
        self.assertTrue({"page:ranking", "source_list:primary:0", "source:request"} <= user)
        self.assertNotIn("source:add", user)
        self.assertNotIn("page:intelligence", user)

'''
          if test not in text:
              if marker not in text:
                  raise RuntimeError('button matrix marker missing')
              text = text.replace(marker, test + marker, 1)
          tests.write_text(text, encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          old_line = '- экран источников показывает состояние реестра и фактическое время его обновления;\n'
          new_line = old_line + '- расширенная карточка источников сохраняет прежнюю role-safe навигацию: рейтинг, основную проверку, ночное наблюдение, разведку, добавление администратором и предложение источника пользователем;\n'
          if new_line not in text:
              if old_line not in text:
                  raise RuntimeError('changelog source marker missing')
              text = text.replace(old_line, new_line, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

      - name: Verify correction
        shell: bash
        run: |
          set -euo pipefail
          mv .github/workflows/apply-source-menu-regression.yml /tmp/apply-source-menu-regression.yml
          restore() { mv /tmp/apply-source-menu-regression.yml .github/workflows/; }
          trap restore EXIT
          python -m py_compile bbvg/bot/runtime.py tests/test_button_matrix.py
          python -m pytest -q tests/test_button_matrix.py
          python -m pytest -q
          python -m bbvg.bot.runtime --self-test
          python tests/production_acceptance.py --section all
          restore
          trap - EXIT

      - name: Commit verified correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bbvg/bot/runtime.py tests/test_button_matrix.py docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Сохранить управление источниками после расширения аналитики"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
