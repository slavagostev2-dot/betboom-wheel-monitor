name: Apply faster notification core v2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-faster-notification-core-v2.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/faster-auto-participation-notifications
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply and validate core changes
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/apply_faster_notification_core.py
          python - <<'PY'
          from pathlib import Path
          path = Path("auto_participation_owner_sync.py")
          text = path.read_text(encoding="utf-8")
          old = '''            "failed#action:2:2026-07-21T14:00:00+00:00": {
                "wheel_key": "failed",
                "status": "unconfirmed",
                "bot_failure_pending_at": "2026-07-21T14:00:00+00:00",
            },
'''
          new = old.replace('"status": "unconfirmed"', '"status": "button_not_found"')
          if old not in text:
              raise SystemExit("Owner sync terminal-failure self-test fixture not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          python -m pip install -r requirements.txt
          python -m py_compile \
            auto_participation_owner_sync.py \
            auto_participation_recovery.py \
            auto_participation_notifications.py \
            xflarxx_account_participation.py \
            notification_button_recovery.py
          python auto_participation_owner_sync.py
          python auto_participation_recovery.py --self-test
          python auto_participation_notifications.py
          python xflarxx_account_participation.py --self-test
          python notification_button_recovery.py --self-test
          pytest -q
          git add \
            auto_participation_owner_sync.py \
            auto_participation_recovery.py \
            AGENTS.md \
            docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Ускорить обработку итогов автоучастия"
          git push origin HEAD:feature/faster-auto-participation-notifications

      - name: Remove temporary workflow
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f .github/workflows/apply-faster-notification-core-v2.yml ]]; then
            git rm .github/workflows/apply-faster-notification-core-v2.yml
            git commit -m "Remove completed faster notification core v2 workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
