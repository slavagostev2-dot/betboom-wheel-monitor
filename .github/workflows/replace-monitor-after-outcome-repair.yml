name: Replace monitor after recurring outcome repair

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/replace-monitor-after-outcome-repair.yml"

permissions:
  contents: read

jobs:
  replace:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Start replacement monitor
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow run monitor.yml \
            --repo "$GH_REPO" \
            --ref main \
            -f continuous=true \
            -f replace=true

      - name: Remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/replace-monitor-after-outcome-repair.yml
          git commit -m "Remove completed monitor replacement workflow [skip ci]" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
