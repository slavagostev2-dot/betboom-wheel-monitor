name: Apply final xFLARXx account and access cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-xflarxx-account-access-cleanup-main.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      WORK_BRANCH: feature/xflarxx-account-access-cleanup-final
      TEMP_WORKFLOW: .github/workflows/apply-xflarxx-account-access-cleanup-main.yml
      PATCH_SCRIPT: scripts/apply_xflarxx_account_access_cleanup.py
      FINALIZER_SCRIPT: scripts/finalize_xflarxx_account_access_cleanup.py
    steps:
      - name: Checkout working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-account-access-cleanup-final
          fetch-depth: 0
          persist-credentials: true

      - name: Rebase onto current main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply focused changes
        run: |
          set -euo pipefail
          python "$PATCH_SCRIPT"
          python "$FINALIZER_SCRIPT"
          rm -f "$PATCH_SCRIPT" "$FINALIZER_SCRIPT" "$TEMP_WORKFLOW"

      - name: Validate changed contracts and full suite
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        run: |
          set -euo pipefail
          python -m py_compile \
            betboom_account_participation.py \
            auto_participation_notifications.py \
            notification_button_recovery.py \
            bbvg/bot/runtime.py \
            tests/test_button_matrix.py
          python betboom_account_participation.py --self-test
          python auto_participation_notifications.py
          python notification_button_recovery.py --self-test
          python -m bbvg.bot.runtime --self-test
          python admin_panel_runtime_v41.py --self-test
          python -m pytest -q

      - name: Push reviewed branch and remove obsolete branch
        run: |
          set -euo pipefail
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          git push --force-with-lease origin "HEAD:${WORK_BRANCH}"
          git push origin --delete fix/control-center-unified-notification-release || true

      - name: Remove temporary workflow from main
        if: ${{ always() }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$TEMP_WORKFLOW" ]]; then
            git rm "$TEMP_WORKFLOW"
            git commit -m "Remove completed xFLARXx cleanup workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                exit 0
              fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
