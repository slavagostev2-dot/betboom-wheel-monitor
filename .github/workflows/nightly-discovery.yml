name: Telegram candidate discovery

on:
  push:
    branches: [main]
    paths:
      - "nightly_discovery.py"
      - "nightly_discovery_entry.py"
      - "telegram_transport.py"
      - "public_sources.txt"
      - "source_catalog.txt"
      - ".github/workflows/nightly-discovery.yml"
  workflow_dispatch:
  schedule:
    - cron: "27 20 * * *"

permissions:
  contents: write

concurrency:
  group: betboom-wheel-candidate-discovery
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify repository layout
        run: python preflight.py

      - name: Check project files
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: |
          python -m py_compile monitor.py monitor_data.py nightly_discovery.py nightly_discovery_entry.py telegram_transport.py daily_report.py notification_router.py
          python telegram_transport.py
          python notification_router.py
          python -m json.tool bot_access.json >/dev/null
          python self_test.py

      - name: Scan candidate source catalog
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          TELEGRAM_WEB_DOMAIN: telegram.me
          EXPECTED_SOURCE_COUNT: "66"
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          DISCOVERY_LOOKBACK_HOURS: "48"
          DISCOVERY_PAGES: "4"
          MAX_NEW_POST_AGE_MINUTES: "360"
          FRESH_UNKNOWN_POST_MINUTES: "0"
          QUARANTINE_FAILURE_THRESHOLD: "3"
          QUARANTINE_EMPTY_THRESHOLD: "4"
          QUARANTINE_RECHECK_HOURS: "6"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: python nightly_discovery_entry.py

      - name: Save discovery state
        id: save
        shell: bash
        run: |
          set -euo pipefail
          files=(public_sources.txt source_catalog.txt discovery_state.json)
          if git diff --quiet -- "${files[@]}"; then
            echo "Discovery data did not change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "Update Telegram candidate discovery [skip ci]"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Discovery push attempt ${attempt} failed; rebasing before retry."
            if ! git pull --rebase origin "${GITHUB_REF_NAME:-main}"; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Restart primary monitor after promotion
        if: steps.save.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true
