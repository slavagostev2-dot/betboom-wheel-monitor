name: Diagnostic VK wheel history

on:
  push:
    branches:
      - diag/vk-wheel-history
    paths:
      - ".github/workflows/diag-vk-wheel-history.yml"

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current production state
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          persist-credentials: false

      - name: Inspect CTOM05 delivery chain
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: "111"
        shell: bash
        run: |
          set -euo pipefail
          vk_runs="$(gh run list --repo "$GH_REPO" --workflow vk-wheel-notification.yml --limit 150 --json databaseId,status,conclusion,createdAt,updatedAt,event,displayTitle,headSha,url)"
          selected_vk="$(printf '%s' "$vk_runs" | jq '[.[] | select((.createdAt >= "2026-07-20T20:30:00Z" and .createdAt <= "2026-07-20T22:30:00Z") or (.createdAt >= "2026-07-21T03:00:00Z" and .createdAt <= "2026-07-21T03:40:00Z"))]')"
          vk_logs_file="$(mktemp)"
          printf '%s' "$selected_vk" | jq -r '.[].databaseId' | while read -r run_id; do
            [[ -z "$run_id" ]] && continue
            echo "===== VK RUN $run_id =====" >> "$vk_logs_file"
            gh run view "$run_id" --repo "$GH_REPO" --log 2>&1 | tail -n 100 >> "$vk_logs_file" || true
          done
          state_matches="$(grep -Rni -C 12 'CTOM05\|meowbettt' state.json source_stats.json notification_delivery_state.json 2>/dev/null | head -n 360 || true)"
          body_file="$(mktemp)"
          {
            echo '## VK workflow runs around CTOM05'
            echo '```json'
            printf '%s\n' "$selected_vk" | jq .
            echo '```'
            echo
            echo '## VK run logs'
            echo '```text'
            cat "$vk_logs_file"
            echo '```'
            echo
            echo '## Runtime state matches'
            echo '```text'
            printf '%s\n' "$state_matches"
            echo '```'
          } > "$body_file"
          gh issue edit "$ISSUE_NUMBER" --repo "$GH_REPO" --title "VK CTOM05 diagnostic result" --body-file "$body_file"
