name: Diagnostic VK wheel history

on:
  push:
    branches:
      - diag/vk-wheel-history
    paths:
      - ".github/workflows/diag-vk-wheel-history.yml"

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current production state
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          persist-credentials: false

      - name: Inspect CTOM05 delivery chain
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: "111"
        shell: bash
        run: |
          set -euo pipefail
          vk_runs="$(gh run list --repo "$GH_REPO" --workflow vk-wheel-notification.yml --limit 100 --json databaseId,status,conclusion,createdAt,updatedAt,event,displayTitle,headSha,url)"
          monitor_runs="$(gh run list --repo "$GH_REPO" --workflow monitor.yml --limit 40 --json databaseId,status,conclusion,createdAt,updatedAt,event,displayTitle,headSha,url)"
          target_monitor_id="$(printf '%s' "$monitor_runs" | jq -r '[.[] | select(.createdAt <= "2026-07-20T21:19:08Z" and .updatedAt >= "2026-07-20T21:19:08Z")][0].databaseId // empty')"
          if [[ -z "$target_monitor_id" ]]; then
            target_monitor_id="$(printf '%s' "$monitor_runs" | jq -r '[.[] | select(.createdAt <= "2026-07-20T21:19:08Z")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty')"
          fi
          monitor_matches=""
          if [[ -n "$target_monitor_id" ]]; then
            monitor_matches="$(gh run view "$target_monitor_id" --repo "$GH_REPO" --log 2>&1 | grep -Ei -C 8 'CTOM05|meowbettt|WARNING VK|VK wheel notification|workflow dispatch' | tail -n 260 || true)"
          fi
          state_matches="$(grep -Rni -C 8 'CTOM05\|meowbettt' state.json source_stats.json notification_delivery_state.json 2>/dev/null | head -n 260 || true)"
          body_file="$(mktemp)"
          {
            echo '## VK workflow runs around CTOM05'
            echo '```json'
            printf '%s\n' "$vk_runs" | jq '[.[] | select(.createdAt >= "2026-07-20T21:00:00Z" and .createdAt <= "2026-07-20T21:40:00Z")]'
            echo '```'
            echo
            echo '## Matching monitor run'
            echo "Run id: ${target_monitor_id:-none}"
            echo '```text'
            printf '%s\n' "$monitor_matches"
            echo '```'
            echo
            echo '## Runtime state matches'
            echo '```text'
            printf '%s\n' "$state_matches"
            echo '```'
          } > "$body_file"
          gh issue edit "$ISSUE_NUMBER" --repo "$GH_REPO" --title "VK CTOM05 diagnostic result" --body-file "$body_file"
