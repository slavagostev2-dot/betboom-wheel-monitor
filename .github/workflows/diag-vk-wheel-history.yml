name: Inspect VK regression test failures

on:
  push:
    branches:
      - diag/vk-wheel-history
    paths:
      - ".github/workflows/diag-vk-wheel-history.yml"

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect failed PR logs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: "111"
        shell: bash
        run: |
          set -euo pipefail
          body_file="$(mktemp)"
          {
            echo '## PR 112 failed test logs'
            for run_id in 29802179686 29802179677; do
              echo
              echo "### Run ${run_id}"
              echo '```text'
              gh run view "$run_id" --repo "$GH_REPO" --log 2>&1 | grep -E -A 25 -B 12 'FAILED|FAILURES|AssertionError|assert |E   |short test summary|coverage' | tail -n 500 || true
              echo '```'
            done
          } > "$body_file"
          gh issue edit "$ISSUE_NUMBER" --repo "$GH_REPO" --title "VK PR 112 test diagnostic" --body-file "$body_file"
