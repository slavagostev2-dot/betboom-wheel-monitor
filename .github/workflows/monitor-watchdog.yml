name: BB V.G. monitor watchdog
run-name: BB V.G. watchdog — ${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "monitor_health.py"
      - ".github/workflows/monitor.yml"
      - ".github/workflows/monitor-watchdog.yml"
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: bb-vg-monitor-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check monitor progress and freshness
        id: health
        run: |
          python monitor_health.py check \
            --max-age-minutes 30 \
            --max-success-age-minutes 30 \
            --max-consecutive-failures 2 \
            --max-consecutive-no-progress 2

      - name: Queue non-destructive recovery
        if: ${{ steps.health.outputs.stale == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          queued=$(gh run list \
            --workflow monitor.yml \
            --status queued \
            --limit 20 \
            --json databaseId \
            --jq 'length')

          if (( queued > 0 )); then
            echo "A recovery monitor run is already queued."
            exit 0
          fi

          echo "Queueing recovery without cancelling the current process: ${{ steps.health.outputs.reason }}"
          gh workflow run monitor.yml --ref main -f continuous=true

      - name: Report healthy monitor
        if: ${{ steps.health.outputs.stale != 'true' }}
        run: |
          echo "BB V.G. runtime is healthy."
          echo "Status: ${{ steps.health.outputs.status }}"
          echo "Checks total: ${{ steps.health.outputs.checks_total }}"
