name: Apply final VK wheel delivery patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout final branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/vk-wheel-delivery-final
          fetch-depth: 0

      - name: Copy verified VK modules
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin refs/heads/fix/vk-detect-all-new-wheels:refs/remotes/origin/fix/vk-detect-all-new-wheels
          git checkout origin/fix/vk-detect-all-new-wheels -- \
            vk_wheel_notifications.py tests/test_vk_wheel_notifications.py

      - name: Update changelog
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog.read_text(encoding="utf-8")
          title = "## 2026-07-21 — Исправлена доставка новых колёс во VK"
          entry = '''## 2026-07-21 — Исправлена доставка новых колёс во VK\n\nНочное колесо `CTOM05` было найдено и отправлено в Telegram, но отдельный\nworkflow VK не запускался. Диагностика подтвердила, что токен и диалоги VK\nработают; сообщение отсеивалось локально до обращения к VK API, потому что\nтранспорт требовал один из фиксированных заголовков уведомления. Публикация\nCTOM05 содержала корректную ссылку BetBoom, но имела другую формулировку.\n\nПервичное событие теперь распознаётся по ссылке колеса или разметке кнопки, а\nне по конкретному заголовку. Меню активных колёс, напоминания, уведомления о\nвремени прокрутки и системные ошибки по-прежнему не отправляются во VK. Все\nдопустимые первичные формулировки приводятся к фазе `detected`, чтобы смена\nтекста не создавала повторную рассылку. Добавлены regression-тест реального\nформата CTOM05 и отрицательный тест системной ошибки со ссылкой.\n\n`monitor.yml` обновляется отдельным API-commit, потому что job-токен не имеет\nправа изменять другие workflow-файлы. Новых постоянных файлов и миграции\nсостояния нет.\n\n**Pre-update backup:**\n`backup/before-vk-wheel-detection-2026-07-21` →\n`505dd34bc58efb5bb77dd0f3a2552c05604a1dfa`.\n\n**Откат:** вернуть commit целиком; миграция данных не требуется.\n\n'''
          if title not in text:
              marker = "---\n\n"
              if marker not in text:
                  raise SystemExit("changelog insertion marker not found")
              changelog.write_text(text.replace(marker, marker + entry, 1), encoding="utf-8")
          PY

      - name: Commit VK code and documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vk_wheel_notifications.py tests/test_vk_wheel_notifications.py docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Fix VK delivery for all new wheel wordings"
          git push origin HEAD:fix/vk-wheel-delivery-final
