name: Apply final VK wheel delivery patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout final branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/vk-wheel-delivery-final
          fetch-depth: 0
      - name: Apply verified VK changes
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin fix/vk-detect-all-new-wheels
          git checkout origin/fix/vk-detect-all-new-wheels -- \
            vk_wheel_notifications.py tests/test_vk_wheel_notifications.py

          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/monitor.yml")
          text = workflow.read_text(encoding="utf-8")
          path_anchor = '      - "notification_router.py"\n'
          path_block = (
              path_anchor
              + '      - "vk_wheel_notifications.py"\n'
              + '      - "vk_dynamic_subscribers.py"\n'
              + '      - "vk_start_welcome.py"\n'
              + '      - ".github/workflows/vk-wheel-notification.yml"\n'
              + '      - ".github/workflows/vk-start-welcome.yml"\n'
          )
          if '      - "vk_wheel_notifications.py"\n' not in text:
              if path_anchor not in text:
                  raise SystemExit("monitor path anchor not found")
              text = text.replace(path_anchor, path_block, 1)

          compile_anchor = "notification_router.py bot_notification_state.py"
          compile_block = (
              "notification_router.py vk_wheel_notifications.py "
              "vk_dynamic_subscribers.py vk_start_welcome.py bot_notification_state.py"
          )
          if compile_block not in text:
              if compile_anchor not in text:
                  raise SystemExit("monitor py_compile anchor not found")
              text = text.replace(compile_anchor, compile_block, 1)

          selftest_anchor = "          python notification_router.py\n"
          selftest_block = (
              selftest_anchor
              + "          python vk_wheel_notifications.py --self-test\n"
              + "          python vk_dynamic_subscribers.py --self-test\n"
          )
          if "python vk_wheel_notifications.py --self-test" not in text:
              if selftest_anchor not in text:
                  raise SystemExit("monitor self-test anchor not found")
              text = text.replace(selftest_anchor, selftest_block, 1)
          workflow.write_text(text, encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog.read_text(encoding="utf-8")
          title = "## 2026-07-21 — Исправлена доставка новых колёс во VK"
          entry = '''## 2026-07-21 — Исправлена доставка новых колёс во VK\n\nНочное колесо `CTOM05` было найдено и отправлено в Telegram, но отдельный\nworkflow VK не запускался. Диагностика подтвердила, что токен и диалоги VK\nработают; сообщение отсеивалось локально до обращения к VK API, потому что\nтранспорт требовал один из фиксированных заголовков уведомления. Публикация\nCTOM05 содержала корректную ссылку BetBoom, но имела другую формулировку.\n\nПервичное событие теперь распознаётся по ссылке колеса или разметке кнопки, а\nне по конкретному заголовку. Меню активных колёс, напоминания, уведомления о\nвремени прокрутки и системные ошибки по-прежнему не отправляются во VK. Все\nдопустимые первичные формулировки приводятся к фазе `detected`, чтобы смена\nтекста не создавала повторную рассылку. Добавлены regression-тест реального\nформата CTOM05 и отрицательный тест системной ошибки со ссылкой.\n\n`monitor.yml` теперь отслеживает production-модули и workflow VK, компилирует\nих и запускает безопасные self-test. Новых постоянных файлов и миграции\nсостояния нет.\n\n**Pre-update backup:**\n`backup/before-vk-wheel-detection-2026-07-21` →\n`505dd34bc58efb5bb77dd0f3a2552c05604a1dfa`.\n\n**Откат:** вернуть commit целиком; миграция данных не требуется.\n\n'''
          if title not in text:
              marker = "---\n\n"
              if marker not in text:
                  raise SystemExit("changelog insertion marker not found")
              changelog.write_text(text.replace(marker, marker + entry, 1), encoding="utf-8")

          Path(".github/workflows/apply-vk-final.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix VK delivery for all new wheel wordings"
          git push origin HEAD:fix/vk-wheel-delivery-final
