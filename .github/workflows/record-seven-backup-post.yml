name: Record seven backup post-update point

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  record:
    if: ${{ github.head_ref == 'seven-backup-post-doc' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Record post-update backup and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = path.read_text(encoding="utf-8")
          post = (
              "**Post-update backup:** "
              "`backup/2026-07-22-after-seven-backup-retention` → "
              "`01d2141af1988f8915e0e1ae95b0537846bec813`."
          )
          if post not in text:
              needle = (
                  "**Pre-update rollback:** "
                  "`backup/2026-07-22-after-referral-wheel-label`.\n"
              )
              if needle not in text:
                  raise SystemExit("Seven-backup changelog entry not found")
              text = text.replace(needle, needle + "\n" + post + "\n", 1)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/record-seven-backup-post.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_CHANGELOG_RU.md .github/workflows/record-seven-backup-post.yml
          git commit -m "Зафиксировать post-update backup политики семи веток"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done

          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Post-update backup зафиксирован в журнале; техническая ветка удаляется."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/seven-backup-post-doc"
