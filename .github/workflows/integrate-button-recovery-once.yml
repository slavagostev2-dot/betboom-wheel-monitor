name: BB V.G. integrate notification button recovery once

# Second push activates the registered one-shot integration workflow.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/integrate-button-recovery-once.yml"

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Integrate fallback and publish exact release
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

          python - <<'PY'
          from pathlib import Path
          import re

          runtime_path = Path("admin_panel_runtime_v41.py")
          runtime = runtime_path.read_text(encoding="utf-8")
          if "import hashlib\n" not in runtime:
              runtime = runtime.replace("import html\n", "import hashlib\nimport html\n", 1)

          old_method = '''    def _mark_personal_from_notification(self, query: dict[str, Any]) -> None:
              data = str(query.get("data") or "")
              token = data.split(":", 2)[2]
              context = self.snapshot().state.get("button_contexts", {}).get(token)
              if not isinstance(context, dict):
                  raise ValueError("Контекст кнопки устарел")
              key = str(context.get("wheel_key") or context.get("identifier") or "").casefold()
              if not key:
                  raise ValueError("Не удалось определить колесо")
              self.mark_personal_participation(key)
          '''
          new_method = '''    @staticmethod
              def _notification_button_token(key: str, entry: dict[str, Any]) -> str:
                  normalized = str(
                      key or entry.get("wheel_key") or entry.get("identifier") or ""
                  ).casefold()
                  source = str(entry.get("source") or "").strip().casefold()
                  try:
                      message_id = int(entry.get("message_id") or 0)
                  except (TypeError, ValueError):
                      message_id = 0
                  if not normalized or not source or message_id <= 0:
                      return ""
                  raw = f"{source}:{message_id}:{normalized}"
                  return hashlib.sha256(raw.encode("utf-8")).hexdigest()[:14]
          
              def _mark_personal_from_notification(self, query: dict[str, Any]) -> None:
                  data = str(query.get("data") or "")
                  token = data.split(":", 2)[2]
                  snap = self.snapshot()
                  state = snap.state if isinstance(getattr(snap, "state", None), dict) else {}
          
                  context = state.get("button_contexts", {}).get(token)
                  if isinstance(context, dict):
                      key = str(
                          context.get("wheel_key") or context.get("identifier") or ""
                      ).casefold()
                      if not key:
                          raise ValueError("Не удалось определить колесо")
                      self.mark_personal_participation(key)
                      return
          
                  matches: list[str] = []
                  active = state.get("active_wheels")
                  if isinstance(active, dict):
                      for key, raw in active.items():
                          if not isinstance(raw, dict):
                              continue
                          normalized = str(key).casefold()
                          stored = str(raw.get("button_token") or "")
                          computed = self._notification_button_token(normalized, raw)
                          if token and token in {stored, computed}:
                              matches.append(normalized)
          
                  unique = sorted(set(matches))
                  if len(unique) != 1:
                      raise ValueError("Контекст кнопки устарел")
                  self.mark_personal_participation(unique[0])
          '''
          if old_method not in runtime:
              raise SystemExit("v41 notification participation method anchor not found")
          runtime = runtime.replace(old_method, new_method, 1)

          test_anchor = '''    assert ("participate", "wheel-b") in events
              assert ("delete", "bb:p:token") in events
          
              assert TelegramPanelRuntimeV41._without_callbacks(
          '''
          test_replacement = '''    assert ("participate", "wheel-b") in events
              assert ("delete", "bb:p:token") in events
          
              events.clear()
              panel.snapshot = lambda force=False: type(  # type: ignore[method-assign]
                  "Snap",
                  (),
                  {
                      "state": {
                          "button_contexts": {},
                          "active_wheels": {
                              "hooch07": {
                                  "source": "hoochcs2",
                                  "message_id": 2198,
                                  "identifier": "hooch07",
                              }
                          },
                      }
                  },
              )()
              token = TelegramPanelRuntimeV41._notification_button_token(
                  "hooch07", {"source": "hoochcs2", "message_id": 2198}
              )
              assert token == "cba7abb40c5b77"
              panel.handle_callback(
                  {
                      "id": "q-recovered-notify",
                      "data": f"bb:p:{token}",
                      "message": {"message_id": 79, "chat": {"id": "1"}},
                      "from": {"id": "1"},
                  }
              )
              assert ("participate", "hooch07") in events
              assert ("delete", f"bb:p:{token}") in events
          
              assert TelegramPanelRuntimeV41._without_callbacks(
          '''
          if test_anchor not in runtime:
              raise SystemExit("v41 notification fallback self-test anchor not found")
          runtime = runtime.replace(test_anchor, test_replacement, 1)
          runtime_path.write_text(runtime, encoding="utf-8")

          workflow_path = Path(".github/workflows/admin-bot.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          workflow = workflow.replace('      - "notification_button_recovery.py"\n', "", 1)
          workflow, count = re.subn(
              r'''\n      - name: Validate notification participation recovery\n.*?        run: python notification_button_recovery\.py --self-test\n''',
              "\n",
              workflow,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f"notification helper validation block count={count}")
          workflow = workflow.replace(
              "        run: python notification_button_recovery.py\n",
              "        run: python admin_panel_runtime_v41.py\n",
              1,
          )
          workflow_path.write_text(workflow, encoding="utf-8")

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          heading = "## 2026-07-22 — Единый исход автоучастия и восстановление Control Center"
          if heading not in changelog:
              marker = "---\n\n"
              entry = f'''{heading}
          
          Скриншоты production подтвердили три связанных сбоя: после подтверждённого участия `chopper`, `pomidor2` и `MAGER01` старый monitor-dispatcher отправлял ложное сообщение «не сработало»; временный Playwright `TimeoutError/Page.goto` по `little` показывался пользователю как финальный отказ; Control Center завершился по job timeout до запуска следующей смены.
          
          Прямой failure через legacy `_notify_manual_participation` запрещён глобально. GitHub dispatch, очередь Actions, сетевые и browser timeout сохраняются как бесшумно повторяемое техническое состояние. Единственный Control Center ждёт пять минут, повторно сверяет точное событие `wheel_key + action_id + server_start_at`, отдаёт безусловный приоритет уже подтверждённому успеху и показывает только нормализованную причину без stack trace.
          
          Control Center ограничен 4,5 часами при job timeout 350 минут и получил почасовой страховочный запуск; schedule не отменяет здоровый процесс. Полные system-health проверки сериализованы отдельно от пятиминутного monitor-watchdog. Временный `notification_button_recovery.py` удалён: fallback потерянного callback-контекста и regression-сценарий `hooch07` перенесены в основной `admin_panel_runtime_v41.py`.
          
          **Pre-update backup:** `backup/2026-07-22-before-auto-participation-and-panel-recovery` → `5548817ce2d956b1256f2367dc18ff815034f9ef`.
          
          '''
              if marker not in changelog:
                  raise SystemExit("changelog insertion marker not found")
              changelog = changelog.replace(marker, marker + entry, 1)
              changelog_path.write_text(changelog, encoding="utf-8")
          PY

          python -m py_compile admin_panel_runtime_v41.py bot_notification_state.py auto_participation_owner_sync.py
          python admin_panel_runtime_v41.py --self-test
          python chapter4_acceptance.py
          python bot_notification_state.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm notification_button_recovery.py
          git rm .github/workflows/integrate-button-recovery-once.yml
          git add admin_panel_runtime_v41.py .github/workflows/admin-bot.yml docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Перенести fallback кнопки в основной Control Center"

          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done

          code_sha=$(git rev-parse HEAD)
          printf '%s\n' "$code_sha" > control_center_release.txt
          git add control_center_release.txt
          git commit -m "Выпустить основной Control Center после интеграции fallback"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
