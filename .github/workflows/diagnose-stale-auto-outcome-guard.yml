name: Diagnose stale auto outcome guard

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-stale-auto-outcome-guard.yml"

permissions:
  contents: read

jobs:
  diagnose:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/stale-auto-outcome-backlog
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Capture exact pytest failure
        shell: bash
        run: |
          set +e
          python -m pip install -r requirements-dev.txt >/tmp/stale-guard-pip.log 2>&1
          python -m pytest >/tmp/stale-guard-pytest.log 2>&1
          code=$?
          {
            echo "pytest_exit=$code"
            tail -n 180 /tmp/stale-guard-pytest.log
          } > stale_guard_failure.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stale_guard_failure.txt
          git commit -m "Record stale outcome guard diagnostic [skip ci]" || true
          git push origin HEAD:fix/stale-auto-outcome-backlog
          exit 0

      - name: Remove diagnostic workflow from main
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/diagnose-stale-auto-outcome-guard.yml
          git commit -m "Remove stale outcome guard diagnostic [skip ci]" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
