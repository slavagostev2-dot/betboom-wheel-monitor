name: BB V.G. participation and Control Center repair

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/repair-auto-participation-control-center.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply authoritative outcome and continuity repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, pattern: str, replacement: str, label: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S | re.M)
              if count != 1:
                  raise SystemExit(f"{label}: expected one replacement, got {count}")
              file_path.write_text(updated, encoding="utf-8")

          # Global fail-safe: legacy/transport code may never send a user-facing
          # auto-participation failure. Only the live Control Center owns outcomes.
          replace_once(
              "betboom_auto_participation.py",
              r"def _notify_manual_participation\([\s\S]*?\n\ndef _attempt_version",
              '''def _notify_manual_participation(
              monitor: Any,
              entry: dict[str, Any],
              result: ParticipationResult,
          ) -> tuple[bool, str]:
              """Compatibility fail-safe: final user outcomes belong only to Control Center."""

              return False, "control_center_authoritative"


          def _attempt_version''',
              "disable legacy direct failure delivery",
          )

          # A GitHub dispatch delay/failure is transport state, not evidence that
          # BetBoom rejected participation. Keep retrying silently and never create
          # a user failure event from this path.
          replace_once(
              "personal_reminder_filter.py",
              r"def _record_dispatch_failure\([\s\S]*?\n\ndef _schedule_auto_participation_dispatch",
              '''def _record_dispatch_failure(
              state: dict[str, Any],
              monitor_module: Any,
              token: str,
              wheel_key: str,
              *,
              status: str,
              detail: str,
          ) -> bool:
              """Persist a transport problem and retry silently; it is not a BetBoom outcome."""

              current = monitor_module.now_utc()
              active = state.setdefault("active_wheels", {})
              entry = active.get(wheel_key)
              if not isinstance(entry, dict):
                  entry = {"wheel_key": wheel_key, "identifier": wheel_key}
                  active[wheel_key] = entry

              dispatches = state.setdefault("auto_participation_dispatch_events", {})
              dispatch_record = dispatches.get(token)
              if not isinstance(dispatch_record, dict):
                  dispatch_record = {"wheel_key": wheel_key}
                  dispatches[token] = dispatch_record

              try:
                  previous_failures = int(dispatch_record.get("failure_count", 0) or 0)
              except (TypeError, ValueError):
                  previous_failures = 0
              failure_count = previous_failures + 1
              retry_minutes = min(30, max(3, failure_count * 3))
              retry_at = current + timedelta(minutes=retry_minutes)

              dispatch_record.update(
                  {
                      "wheel_key": wheel_key,
                      "status": "workflow_dispatch_retry_wait",
                      "dispatch_error": detail[:500],
                      "last_failure_at": current.isoformat(),
                      "retry_after_at": retry_at.isoformat(),
                      "failure_count": failure_count,
                      "manual_notification_sent": False,
                      "user_alert_policy": "forbidden_transport_is_not_participation_outcome",
                  }
              )
              for field in (
                  "alert_attempted_at",
                  "manual_notification_at",
                  "manual_notification_detail",
              ):
                  dispatch_record.pop(field, None)

              entry["auto_participation_status"] = "workflow_dispatch_retry_wait"
              entry["auto_participation_checked_at"] = current.isoformat()
              entry["auto_participation_retry_allowed"] = True
              entry["auto_participation_error"] = detail[:300]
              entry.pop("auto_participation_manual_notification_at", None)
              entry.pop("auto_participation_manual_notification_error", None)

              print(
                  "Auto participation dispatch problem recorded without user alert: "
                  f"wheel={wheel_key} attempt={failure_count} retry_at={retry_at.isoformat()}"
              )
              return False


          def _schedule_auto_participation_dispatch''',
              "make dispatch failures silent and retryable",
          )

          reminder_path = Path("personal_reminder_filter.py")
          reminder = reminder_path.read_text(encoding="utf-8")
          transient_anchor = '''    if status == "button_not_found":
          '''
          transient_rule = '''    transient_detail = " ".join(
              str(value or "")
              for value in (
                  record.get("detail"),
                  record.get("dispatch_error"),
                  entry.get("auto_participation_error"),
              )
          ).casefold()
              if status in {"browser_error", "timeout", "navigation_timeout", "page_timeout"} or any(
                  marker in transient_detail
                  for marker in ("timeouterror", "timeout", "page.goto", "net::", "connection", "target closed")
              ):
                  return "transient_browser_failure"
          
              if status == "button_not_found":
          '''
          if "transient_browser_failure" not in reminder:
              if transient_anchor not in reminder:
                  raise SystemExit("transient browser rearm anchor not found")
              reminder = reminder.replace(transient_anchor, transient_rule, 1)
              reminder_path.write_text(reminder, encoding="utf-8")

          # Control Center waits longer, ignores transient browser/network errors,
          # and never exposes raw Playwright stack traces to the user.
          owner_path = Path("auto_participation_owner_sync.py")
          owner = owner_path.read_text(encoding="utf-8")
          owner = owner.replace("FAILURE_GRACE_SECONDS = 90", "FAILURE_GRACE_SECONDS = 300", 1)
          helper_anchor = '''def _event_token(item: dict[str, Any]) -> str:
          '''
          helper = '''_TRANSIENT_FAILURE_STATUSES = {
              "browser_error",
              "timeout",
              "navigation_timeout",
              "page_timeout",
              "workflow_dispatch_failed",
              "workflow_dispatch_timeout",
              "workflow_dispatch_retry_wait",
          }
          _TRANSIENT_FAILURE_MARKERS = (
              "timeouterror",
              "timeout",
              "page.goto",
              "net::",
              "connection",
              "target closed",
          )


          def _is_transient_failure(record: dict[str, Any]) -> bool:
              status = str(record.get("status") or record.get("bot_failure_status") or "").casefold()
              detail = str(
                  record.get("bot_failure_detail")
                  or record.get("detail")
                  or ""
              ).casefold()
              return status in _TRANSIENT_FAILURE_STATUSES or any(
                  marker in detail for marker in _TRANSIENT_FAILURE_MARKERS
              )


          def _event_token(item: dict[str, Any]) -> str:
          '''
          if "_TRANSIENT_FAILURE_STATUSES" not in owner:
              if helper_anchor not in owner:
                  raise SystemExit("owner transient helper anchor not found")
              owner = owner.replace(helper_anchor, helper, 1)

          pending_anchor = '''        if bool(raw.get("manual_notification_sent")):
                      continue
          '''
          pending_rule = '''        if bool(raw.get("manual_notification_sent")):
                      continue
                  if _is_transient_failure(raw):
                      continue
          '''
          if "if _is_transient_failure(raw):" not in owner:
              if pending_anchor not in owner:
                  raise SystemExit("owner pending transient anchor not found")
              owner = owner.replace(pending_anchor, pending_rule, 1)

          final_anchor = '''        if bool(record.get("manual_notification_sent")):
                      continue
          
                  event_key = personal_wheel_voting.wheel_event_key(key, item)
          '''
          final_rule = '''        if bool(record.get("manual_notification_sent")):
                      continue
                  if _is_transient_failure(record):
                      continue
          
                  event_key = personal_wheel_voting.wheel_event_key(key, item)
          '''
          if "if _is_transient_failure(record):" not in owner:
              if final_anchor not in owner:
                  raise SystemExit("owner final transient anchor not found")
              owner = owner.replace(final_anchor, final_rule, 1)

          detail_pattern = r'''    detail = html\.escape\(\n        str\(\n            record\.get\("bot_failure_detail"\)\n            or record\.get\("detail"\)\n            or "BetBoom не подтвердил автоматическое участие"\n        \)\[:300\]\n    \)'''
          detail_replacement = '''    status = str(record.get("status") or record.get("bot_failure_status") or "").casefold()
              if status == "unconfirmed":
                  public_detail = "BetBoom не показал подтверждение участия после нажатия кнопки"
              elif status == "button_not_found":
                  public_detail = "на странице BetBoom не найдена доступная кнопка участия"
              else:
                  public_detail = "BetBoom не подтвердил автоматическое участие после повторной проверки"
              detail = html.escape(public_detail)'''
          owner, detail_count = re.subn(detail_pattern, detail_replacement, owner, count=1, flags=re.S)
          if detail_count != 1:
              raise SystemExit(f"sanitize owner failure detail: expected one replacement, got {detail_count}")
          owner_path.write_text(owner, encoding="utf-8")

          # Guaranteed Control Center successor: scheduled safety runs queue without
          # cancelling a healthy panel; release/manual runs replace it immediately.
          admin_path = Path(".github/workflows/admin-bot.yml")
          admin = admin_path.read_text(encoding="utf-8")
          admin = admin.replace('    - cron: "37 3 * * *"', '    - cron: "37 * * * *"', 1)
          admin = admin.replace(
              "      cancel-in-progress: true",
              "      cancel-in-progress: ${{ github.event_name != 'schedule' }}",
              1,
          )
          admin = admin.replace('          RUN_SECONDS: "19800"', '          RUN_SECONDS: "16200"', 1)
          admin_path.write_text(admin, encoding="utf-8")

          # Health runs that describe the same incident must not overlap. Keep the
          # 5-minute monitor watchdog in its own group and serialize all full checks.
          health_path = Path(".github/workflows/system-health.yml")
          health = health_path.read_text(encoding="utf-8")
          old_concurrency = '''concurrency:
            group: bb-vg-system-health-${{ github.event_name == 'schedule' && github.event.schedule || github.event_name }}
            cancel-in-progress: true
          '''
          new_concurrency = '''concurrency:
            group: ${{ github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *' && 'bb-vg-monitor-watchdog' || 'bb-vg-system-health' }}
            cancel-in-progress: false
          '''
          if old_concurrency not in health:
              raise SystemExit("system health concurrency block not found")
          health = health.replace(old_concurrency, new_concurrency, 1)
          health_path.write_text(health, encoding="utf-8")

          agents_path = Path("AGENTS.md")
          agents = agents_path.read_text(encoding="utf-8")
          rule_anchor = "- Recovery никогда не отправляет финальное пользовательское сообщение «автоучастие не сработало» напрямую."
          extra_rule = (
              "- Ошибка запуска/ожидания GitHub workflow и временный Playwright/сетевой timeout не являются результатом участия BetBoom: "
              "они повторяются бесшумно. Прямой legacy-send через `_notify_manual_participation` запрещён глобально; отрицательное "
              "сообщение может создать только Control Center после стабилизации точного события.\n"
          )
          if extra_rule not in agents:
              position = agents.find(rule_anchor)
              if position < 0:
                  raise SystemExit("AGENTS auto-participation rule anchor not found")
              line_end = agents.find("\n", position)
              agents = agents[: line_end + 1] + extra_rule + agents[line_end + 1 :]
              agents_path.write_text(agents, encoding="utf-8")

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          heading = "## 2026-07-22 — Устранены ложные failure после подтверждённого автоучастия и простой Control Center"
          if heading not in changelog:
              entry = f'''{heading}

Скриншоты production подтвердили, что после успешного сообщения по `chopper`, `pomidor2` и `MAGER01` через несколько минут приходило старое «автоучастие не сработало». Причиной оказался второй отправитель в monitor-runtime: таймаут получения результата GitHub workflow ошибочно трактовался как отказ BetBoom и напрямую вызывал legacy `_notify_manual_participation`.

Прямой пользовательский failure теперь запрещён глобально. Сбой dispatch, очередь GitHub Actions, `TimeoutError`, `Page.goto` и сетевые ошибки сохраняются как retryable transport/browser state и повторяются бесшумно. Только единый Control Center может сформировать отрицательный исход; он ждёт пять минут, повторно сверяет точное событие и показывает нормализованную причину без Playwright stack trace.

Control Center получил почасовой страховочный successor: schedule не отменяет здоровый процесс, а push/manual release заменяет его сразу. Runtime сокращён до 4,5 часов, чтобы следующий запуск гарантированно успевал стартовать до job timeout. Полные system-health проверки сериализованы отдельно от пятиминутного monitor-watchdog, исключая параллельную отправку одинакового incident digest.

**Pre-update backup:** `backup/2026-07-22-before-auto-participation-and-panel-recovery` → `5548817ce2d956b1256f2367dc18ff815034f9ef`.

'''
              marker = "---\n\n"
              if marker not in changelog:
                  raise SystemExit("changelog marker not found")
              changelog = changelog.replace(marker, marker + entry, 1)
              changelog_path.write_text(changelog, encoding="utf-8")
          PY

          python -m py_compile betboom_auto_participation.py personal_reminder_filter.py auto_participation_owner_sync.py auto_participation_recovery.py
          python personal_reminder_filter.py
          python auto_participation_owner_sync.py
          python auto_participation_recovery.py --self-test
          python - <<'PY'
          from datetime import datetime, timezone
          import betboom_auto_participation as auto
          import auto_participation_owner_sync as owner
          import personal_reminder_filter as reminder

          result = auto.ParticipationResult(False, "browser_error", "TimeoutError")
          assert auto._notify_manual_participation(None, {}, result) == (
              False,
              "control_center_authoritative",
          )
          assert owner._is_transient_failure(
              {"status": "browser_error", "detail": "TimeoutError: Page.goto"}
          )
          values = owner.pending_failure_events(
              {
                  "auto_participation_events": {
                      "little#action:1:now": {
                          "wheel_key": "little",
                          "status": "browser_error",
                          "detail": "TimeoutError: Page.goto",
                          "bot_failure_pending_at": "2026-07-22T00:00:00+00:00",
                      }
                  }
              },
              now=datetime(2026, 7, 22, 1, 0, tzinfo=timezone.utc),
          )
          assert values == []

          class FakeMonitor:
              @staticmethod
              def now_utc():
                  return datetime(2026, 7, 22, 1, 0, tzinfo=timezone.utc)

          state = {"active_wheels": {"wheel": {"identifier": "wheel"}}}
          assert reminder._record_dispatch_failure(
              state,
              FakeMonitor,
              "wheel#action:1:now",
              "wheel",
              status="workflow_dispatch_timeout",
              detail="worker result delayed",
          ) is False
          dispatch = state["auto_participation_dispatch_events"]["wheel#action:1:now"]
          assert dispatch["status"] == "workflow_dispatch_retry_wait"
          assert dispatch["manual_notification_sent"] is False
          assert "auto_participation_events" not in state
          print("Authoritative participation outcome and retry policy verified")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/repair-auto-participation-control-center.yml
          git add betboom_auto_participation.py personal_reminder_filter.py auto_participation_owner_sync.py .github/workflows/admin-bot.yml .github/workflows/system-health.yml AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Устранить ложные failure автоучастия и восстановить Control Center"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
