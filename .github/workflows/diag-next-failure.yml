name: Finish profile menu contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/nla-critical-pattern-tuples
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Repair admin menu expectation and remove helper
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path("tests/test_ui_chapter4.py")
          text = path.read_text(encoding="utf-8")
          old = '{"page:active", "page:analytics", "page:sources", "page:settings", "page:control"}'
          new = '{"page:active", "page:analytics", "page:profile", "page:sources", "page:settings", "page:control"}'
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("Admin menu expectation not found")
          Path(".github/workflows/diag-next-failure.yml").unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align menu tests with profile entry"
          git push origin HEAD:fix/nla-critical-pattern-tuples
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run full pytest after repairs
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          FINAL_REMINDER_BEFORE_MINUTES: "5"
          ACTIVE_REMOVE_GRACE_MINUTES: "0"
        shell: bash
        run: python -m pytest -q
