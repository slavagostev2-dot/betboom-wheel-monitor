name: Apply wheel generation follow-up

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/wheel-server-generation'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Apply follow-up
        run: python generation_followup_patch.py
      - name: Compile
        run: python -m py_compile wheel_event_runtime.py tests/test_recurring_event_hotfix.py
      - name: Targeted tests
        run: python -m pytest -q tests/test_recurring_event_hotfix.py tests/test_personal_wheel_voting.py tests/test_lifecycle.py
      - name: Hide temporary files
        run: |
          mv .github/workflows/apply-generation-followup.yml /tmp/apply-generation-followup.yml
          mv generation_followup_patch.py /tmp/generation_followup_patch.py
      - name: Full pytest
        run: python -m pytest -q
      - name: Production acceptance
        run: python tests/production_acceptance.py --section all
      - name: Restore temporary files
        if: always()
        run: |
          mv /tmp/apply-generation-followup.yml .github/workflows/apply-generation-followup.yml
          mv /tmp/generation_followup_patch.py generation_followup_patch.py
      - name: Commit verified follow-up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wheel_event_runtime.py tests/test_recurring_event_hotfix.py
          git commit -m "Сохранить поколение для отложенной доступности"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
