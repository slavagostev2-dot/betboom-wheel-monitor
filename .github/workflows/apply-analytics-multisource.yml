name: Apply analytics and multi-source correction

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: analytics-multisource-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt PyYAML

      - name: Apply implementation
        shell: bash
        run: |
          set -o pipefail
          python .github/apply_analytics_core.py 2>&1 | tee analytics-core.log
          python .github/apply_analytics_ui.py 2>&1 | tee analytics-ui.log

      - name: Verify implementation
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python -m compileall -q -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' .
            python - <<'PY'
          from pathlib import Path
          import yaml
          for path in sorted(Path('.github/workflows').glob('*.yml')):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          PY
            python -m pytest -q tests/test_lifecycle.py tests/test_personal_wheel_voting.py
            python -m pytest -q
            python -m bbvg.bot.sources
            python -m bbvg.bot.runtime --self-test
            python preflight.py
            python monitor_validation_v41.py
            python tests/production_acceptance.py --section all
            if git diff --name-only | grep -E '^(state|source_stats|source_health|source_registry|monitor_status|admin_panel_status)\.json$'; then
              exit 1
            fi
          } 2>&1 | tee analytics-verify.log

      - name: Commit verified implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor_entry.py personal_wheel_voting.py bbvg_monitor_main.py bbvg/bot/sources.py bbvg/bot/runtime.py tests/test_lifecycle.py tests/test_personal_wheel_voting.py docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Расширить аналитику и исправить multi-source рейтинг"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: analytics-multisource-${{ github.run_id }}
          path: |
            analytics-core.log
            analytics-ui.log
            analytics-verify.log
          retention-days: 1
          if-no-files-found: warn
