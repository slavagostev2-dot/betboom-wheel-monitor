name: Prepare xFLARXx branch from main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/prepare-xflarxx-branch-from-main.yml"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      WORK_BRANCH: feature/xflarxx-ready-20260723
      SOURCE_COMMIT: 3eb5419809820e3dfa9ed07560de78a087b8fe3b
      BRANCH_TEMP_WORKFLOW: .github/workflows/prepare-xflarxx-ready.yml
      MAIN_TEMP_WORKFLOW: .github/workflows/prepare-xflarxx-branch-from-main.yml
    steps:
      - name: Checkout working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-ready-20260723
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply verified changes and validate
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git fetch origin "$SOURCE_COMMIT"
          git cherry-pick "$SOURCE_COMMIT"
          rm -f scripts/prepared_apply_xflarxx_account_access_cleanup.py

          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/auto-participation.yml')
          text = workflow.read_text(encoding='utf-8')
          old_env = '''          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
          BETBOOM_ACCOUNT2_TELEGRAM_USER: "Вячеслав"
'''
          new_env = old_env + '''          BETBOOM_STORAGE_STATE_JSON_PART5: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART5 }}
          BETBOOM_STORAGE_STATE_JSON_PART6: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART6 }}
          BETBOOM_ACCOUNT3_LABEL: "xFLARXx"
          BETBOOM_ACCOUNT3_TELEGRAM_USER: "xFLARXx"
'''
          count = text.count(old_env)
          if count != 2:
              raise SystemExit(f'auto-participation env marker count={count}, expected 2')
          text = text.replace(old_env, new_env)

          old_check = '''          if not betboom_account_participation.configured():
              raise SystemExit("Vyacheslav second BetBoom session PART3/PART4 is not configured")
'''
          new_check = old_check + '''          if not betboom_account_participation.xflarxx_configured():
              raise SystemExit("xFLARXx BetBoom session PART5/PART6 is not configured")
'''
          if text.count(old_check) != 1:
              raise SystemExit('xFLARXx preflight marker not found exactly once')
          text = text.replace(old_check, new_check, 1)
          text = text.replace(
              '          print("Auto participation preflight OK for both BetBoom accounts")',
              '          print("Auto participation preflight OK for all configured BetBoom accounts")',
              1,
          )
          text = text.replace(
              '      - name: Run second BetBoom account for Vyacheslav',
              '      - name: Run additional BetBoom accounts',
              1,
          )
          workflow.write_text(text, encoding='utf-8')

          admin_workflow = Path('.github/workflows/admin-bot.yml')
          text = admin_workflow.read_text(encoding='utf-8')
          marker = '      - "auto_participation_notifications.py"\n'
          addition = marker + '      - "betboom_account_participation.py"\n'
          if '      - "betboom_account_participation.py"\n' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('admin-bot path marker not found exactly once')
              text = text.replace(marker, addition, 1)
          admin_workflow.write_text(text, encoding='utf-8')
          PY

          rm -f "$BRANCH_TEMP_WORKFLOW"

          python -m pip install -r requirements.txt
          python -m py_compile betboom_account_participation.py auto_participation_notifications.py notification_button_recovery.py bbvg/bot/runtime.py
          python betboom_account_participation.py --self-test
          python auto_participation_notifications.py
          python notification_button_recovery.py --self-test
          python -m bbvg.bot.runtime --self-test

          python - <<'PY'
          import inspect
          from notification_button_recovery import TelegramPanelRuntimeButtonRecovery
          from bbvg.bot.runtime import TelegramPanelRuntime

          settings = inspect.getsource(TelegramPanelRuntime.show_settings)
          assert "API и Legacy" not in settings
          assert "Отключённый функционал" not in settings
          options = TelegramPanelRuntimeButtonRecovery._notification_options_for_role("owner")
          assert any(str(item[0]) == "auto_participation" for item in options)

          panel = TelegramPanelRuntimeButtonRecovery.__new__(TelegramPanelRuntimeButtonRecovery)
          panel.current_user_id = "1"
          panel.current_chat_id = "1"
          panel.current_role = "owner"
          panel.load_access = lambda force=False: {
              "owner_id": "1",
              "admins": [],
              "blocked_users": [],
              "notification_recipients": [],
              "settings": {},
              "users": {
                  "1": {"id": "1", "chat_id": "1", "username": "owner", "first_name": "Owner", "notification_preferences": {}},
                  "2": {"id": "2", "chat_id": "2", "username": "xFLARXx", "first_name": "xFLARXx", "notification_preferences": {}},
              },
          }
          panel.role_for = lambda user_id: "owner" if str(user_id) == "1" else "user"
          panel.role_name = lambda role: {"owner": "Владелец", "user": "Пользователь"}.get(role, role)
          panel.fmt_dt = lambda value: "—"
          panel.with_nav = lambda rows=None: {"inline_keyboard": rows or []}
          sent = []
          panel.send = lambda text, **kwargs: sent.append((text, kwargs)) or {}
          panel.show_user_detail("2")
          assert sent and "xFLARXx" in sent[-1][0]
          print("xFLARXx account, settings cleanup and user detail regression passed")
          PY

          pytest -q

          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          git push --force-with-lease origin "HEAD:${WORK_BRANCH}"

          for branch in \
            fix/control-center-unified-notification-release \
            feature/xflarxx-account-access-cleanup \
            feature/xflarxx-account-access-cleanup-v2 \
            feature/xflarxx-account-access-cleanup-v3 \
            feature/xflarxx-account-access-cleanup-final \
            feature/xflarxx-account-access-cleanup-work \
            feature/xflarxx-clean; do
            git push origin --delete "$branch" || true
          done

      - name: Remove temporary workflow from main
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git rebase --abort || true
          git cherry-pick --abort || true
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$MAIN_TEMP_WORKFLOW" ]]; then
            git rm "$MAIN_TEMP_WORKFLOW"
            git commit -m "Remove completed xFLARXx branch preparation [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
