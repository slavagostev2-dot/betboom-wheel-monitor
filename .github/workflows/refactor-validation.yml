name: BB V.G. refactor validation

on:
  push:
    branches:
      - refactor/consolidate-runtime-v42
    paths:
      - "bbvg/bot/*.py"
      - "admin_panel_runtime_v*.py"
      - "*.py"
      - "tests/**"
      - "chapter*.py"
      - "docs/CODE_INVENTORY_RU.md"
      - "docs/PROJECT_CHANGELOG_RU.md"
      - ".github/workflows/refactor-validation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  acceptance-equivalence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/consolidate-runtime-v42
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Compile consolidated code
        id: compile
        run: |
          python -m py_compile tests/production_acceptance.py
          python -m py_compile bbvg/bot/runtime.py
          python -m py_compile bbvg/bot/foundation.py
          python -m py_compile bbvg/bot/interface.py
          python -m py_compile bbvg/bot/source_requests.py
          python -m py_compile bbvg/bot/wheels.py
          python -m py_compile rating_policy.py
      - name: Validate consolidated panel foundation
        id: panel_foundation
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: python -m bbvg.bot.foundation
      - name: Validate consolidated panel interface
        id: panel_interface
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: python -m bbvg.bot.interface
      - name: Validate consolidated source requests
        id: source_requests
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: python -m bbvg.bot.source_requests
      - name: Validate consolidated wheel interactions
        id: wheel_interactions
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: python -m bbvg.bot.wheels
      - name: Validate consolidated panel runtime
        id: panel_runtime
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
        run: python -m bbvg.bot.runtime --self-test
      - name: Validate rating normalization CLI
        id: rating_cli
        run: python rating_policy.py --self-test
      - name: Run full pytest suite
        id: pytest
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          UNKNOWN_DEDUP_HOURS: "2"
        run: python -m pytest -q
      - name: Run legacy acceptance files
        id: legacy
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          UNKNOWN_DEDUP_HOURS: "2"
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
          python chapter4_acceptance.py
          python chapter5_acceptance.py
      - name: Run consolidated acceptance sections
        id: consolidated
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          UNKNOWN_DEDUP_HOURS: "2"
        run: |
          python tests/production_acceptance.py --section stability
          python tests/production_acceptance.py --section unified
          python tests/production_acceptance.py --section ci
          python tests/production_acceptance.py --section interface
          python tests/production_acceptance.py --section lifecycle
          python tests/production_acceptance.py --section all
      - name: Record validation result
        if: ${{ always() }}
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          PANEL_FOUNDATION_OUTCOME: ${{ steps.panel_foundation.outcome }}
          PANEL_INTERFACE_OUTCOME: ${{ steps.panel_interface.outcome }}
          SOURCE_REQUESTS_OUTCOME: ${{ steps.source_requests.outcome }}
          WHEEL_INTERACTIONS_OUTCOME: ${{ steps.wheel_interactions.outcome }}
          PANEL_RUNTIME_OUTCOME: ${{ steps.panel_runtime.outcome }}
          RATING_CLI_OUTCOME: ${{ steps.rating_cli.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          LEGACY_OUTCOME: ${{ steps.legacy.outcome }}
          CONSOLIDATED_OUTCOME: ${{ steps.consolidated.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          parts = {
              "compile": os.environ.get("COMPILE_OUTCOME", "unknown"),
              "panel_foundation": os.environ.get("PANEL_FOUNDATION_OUTCOME", "unknown"),
              "panel_interface": os.environ.get("PANEL_INTERFACE_OUTCOME", "unknown"),
              "source_requests": os.environ.get("SOURCE_REQUESTS_OUTCOME", "unknown"),
              "wheel_interactions": os.environ.get("WHEEL_INTERACTIONS_OUTCOME", "unknown"),
              "panel_runtime": os.environ.get("PANEL_RUNTIME_OUTCOME", "unknown"),
              "rating_cli": os.environ.get("RATING_CLI_OUTCOME", "unknown"),
              "pytest": os.environ.get("PYTEST_OUTCOME", "unknown"),
              "legacy": os.environ.get("LEGACY_OUTCOME", "unknown"),
              "consolidated": os.environ.get("CONSOLIDATED_OUTCOME", "unknown"),
          }
          value = {
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "result": "success" if all(item == "success" for item in parts.values()) else "failure",
              "parts": parts,
              "stage": "full_refactor_validation",
          }
          with open("refactor_validation_status.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add refactor_validation_status.json
          git commit -m "Update refactor validation status [skip ci]" || exit 0
          git pull --rebase origin refactor/consolidate-runtime-v42 || { git rebase --abort || true; exit 1; }
          git push origin HEAD:refactor/consolidate-runtime-v42
