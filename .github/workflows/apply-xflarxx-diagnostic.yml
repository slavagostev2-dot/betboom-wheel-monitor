name: Apply prepared xFLARXx cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-xflarxx-diagnostic.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WORK_BRANCH: feature/xflarxx-account-access-cleanup-final
      TEMP_WORKFLOW: .github/workflows/apply-xflarxx-diagnostic.yml
      PREPARE_SCRIPT: scripts/prepare_xflarxx_installer.py
      PATCH_SCRIPT: scripts/apply_xflarxx_account_access_cleanup.py
      FINALIZER_SCRIPT: scripts/finalize_xflarxx_account_access_cleanup.py
    steps:
      - name: Checkout working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-account-access-cleanup-final
          fetch-depth: 0
          persist-credentials: true

      - name: Apply and persist result
        shell: bash
        run: |
          set +e
          exec > >(tee /tmp/xflarxx-final.log) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          stage="rebase"
          git fetch origin main
          code=$?
          if [[ "$code" == 0 ]]; then git rebase origin/main; code=$?; fi
          if [[ "$code" == 0 ]]; then stage="prepare"; python "$PREPARE_SCRIPT"; code=$?; fi
          if [[ "$code" == 0 ]]; then stage="patch"; python "$PATCH_SCRIPT"; code=$?; fi
          if [[ "$code" == 0 ]]; then stage="finalize"; python "$FINALIZER_SCRIPT"; code=$?; fi
          if [[ "$code" == 0 ]]; then
            stage="compile"
            rm -f "$PREPARE_SCRIPT" "$PATCH_SCRIPT" "$FINALIZER_SCRIPT" "$TEMP_WORKFLOW" xflarxx_final_failure.txt
            python -m py_compile betboom_account_participation.py auto_participation_notifications.py notification_button_recovery.py bbvg/bot/runtime.py tests/test_button_matrix.py
            code=$?
          fi
          if [[ "$code" != 0 ]]; then
            echo "FAILED_STAGE=${stage}" | tee -a /tmp/xflarxx-final.log
            git reset --hard HEAD
            rm -f "$TEMP_WORKFLOW"
            cp /tmp/xflarxx-final.log xflarxx_final_failure.txt
            git add -f xflarxx_final_failure.txt
            git commit -m "Record xFLARXx final failure at ${stage} [skip ci]" || true
            git push --force-with-lease origin "HEAD:${WORK_BRANCH}"
            exit "$code"
          fi
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          git push --force-with-lease origin "HEAD:${WORK_BRANCH}"
          git push origin --delete fix/control-center-unified-notification-release || true

      - name: Remove diagnostic workflow from main
        if: ${{ always() }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$TEMP_WORKFLOW" ]]; then
            git rm "$TEMP_WORKFLOW"
            git commit -m "Remove completed xFLARXx diagnostic workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
