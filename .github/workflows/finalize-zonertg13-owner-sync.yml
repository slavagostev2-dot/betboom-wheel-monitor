name: Finalize zonertg13 owner participation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'finalize-zonertg13-owner-sync' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
      BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
      ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Repair event identity fallback
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("auto_participation_owner_sync.py")
          text = path.read_text(encoding="utf-8")
          old = '''def _event_token(item: dict[str, Any]) -> str:\n    key = str(item.get("wheel_key") or "").casefold()\n'''
          new = '''def _event_token(\n    item: dict[str, Any],\n    wheel_key: str = "",\n) -> str:\n    key = str(\n        wheel_key\n        or item.get("wheel_key")\n        or item.get("identifier")\n        or ""\n    ).casefold()\n'''
          if old not in text:
              raise SystemExit("owner sync event-token anchor not found")
          text = text.replace(old, new, 1)
          if text.count("if _event_token(item) != token:") != 2:
              raise SystemExit("unexpected owner sync event-token call count")
          text = text.replace("if _event_token(item) != token:", "if _event_token(item, key) != token:")

          test_anchor = '''    assert _event_token(\n        {\n            "wheel_key": "ctom11",\n            "action_id": 958,\n            "server_start_at": "2026-07-21T15:28:57.035000+00:00",\n        }\n    ) == "ctom11#action:958:2026-07-21T15:28:57.035000+00:00"\n'''
          test_insert = '''    assert _event_token(\n        {\n            "action_id": 698,\n            "server_start_at": "2026-07-22T08:04:56.849000+00:00",\n        },\n        "zonertg13",\n    ) == "zonertg13#action:698:2026-07-22T08:04:56.849000+00:00"\n    assert _event_token(\n        {\n            "wheel_key": "ctom11",\n            "action_id": 958,\n            "server_start_at": "2026-07-21T15:28:57.035000+00:00",\n        }\n    ) == "ctom11#action:958:2026-07-21T15:28:57.035000+00:00"\n'''
          if test_anchor not in text:
              raise SystemExit("owner sync self-test anchor not found")
          text = text.replace(test_anchor, test_insert, 1)
          path.write_text(text, encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog_text = changelog.read_text(encoding="utf-8")
          paragraph = (
              "\nДополнительная production-диагностика `zonertg13` выявила, что "
              "активная карточка может не дублировать `wheel_key` внутри объекта. "
              "Owner-sync теперь использует ключ словаря `active_wheels` как "
              "authoritative fallback при построении event-token, поэтому точное "
              "событие больше не пропускается молча.\n"
          )
          heading = "## 2026-07-22 — Результат автоучастия больше не теряется между workflow и Control Center"
          heading_at = changelog_text.find(heading)
          if heading_at < 0:
              raise SystemExit("auto-participation changelog entry not found")
          next_heading = changelog_text.find("\n## ", heading_at + len(heading))
          section_end = next_heading if next_heading >= 0 else len(changelog_text)
          section = changelog_text[heading_at:section_end]
          if "authoritative fallback" not in section:
              changelog_text = changelog_text[:section_end] + paragraph + changelog_text[section_end:]
              changelog.write_text(changelog_text, encoding="utf-8")
          PY

          python -m py_compile auto_participation_owner_sync.py
          python auto_participation_owner_sync.py

      - name: Publish identity repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auto_participation_owner_sync.py docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Исправить event identity автоматической отметки участия"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1

      - name: Finalize exact owner outcome
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          python - <<'PY'
          import auto_participation_owner_sync
          import personal_wheel_voting
          from notification_button_recovery import TelegramPanelRuntimeButtonRecovery

          panel = TelegramPanelRuntimeButtonRecovery()
          result = auto_participation_owner_sync.sync_once(panel)
          print(f"owner sync result: {result}")

          snap = panel.snapshot(force=True)
          item = snap.state.get("active_wheels", {}).get("zonertg13")
          assert isinstance(item, dict), "zonertg13 is absent from active_wheels"
          assert bool(item.get("participating")), "zonertg13 is not BetBoom-confirmed"
          event_key = personal_wheel_voting.wheel_event_key("zonertg13", item)

          access = panel.load_access(force=True)
          owner_id = str(access.get("owner_id") or "")
          owner = access.get("users", {}).get(owner_id, {})
          completed = owner.get("auto_participation_success_events", {})
          record = completed.get(event_key) if isinstance(completed, dict) else None
          assert isinstance(record, dict) and record.get("notified_at"), (
              f"Owner success completion is missing for {event_key}"
          )
          print(
              "zonertg13 owner completion verified: "
              f"event_key={event_key}, notified_at={record.get('notified_at')}, "
              f"original_button_updated={record.get('original_button_updated')}"
          )
          PY

      - name: Remove diagnostic and one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/finalize-zonertg13-owner-sync.yml zonertg13_owner_sync_diagnostic.json
          git commit -m "Удалить диагностику финализации zonertg13"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done
          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Event identity исправлен; личная отметка и уведомление zonertg13 подтверждены."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/finalize-zonertg13-owner-sync"
