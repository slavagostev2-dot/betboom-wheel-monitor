name: Finalize zonertg13 owner participation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'finalize-zonertg13-owner-sync' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
      BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
      ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Diagnose exact owner outcome
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import contextlib
          import io
          import json
          import traceback
          from datetime import datetime, timezone
          from pathlib import Path

          import auto_participation_owner_sync as owner_sync
          import personal_wheel_voting
          from notification_button_recovery import TelegramPanelRuntimeButtonRecovery

          diagnostic = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "wheel_key": "zonertg13",
              "uncaught_exception": None,
          }
          panel = TelegramPanelRuntimeButtonRecovery()
          capture = io.StringIO()
          try:
              snap = panel.snapshot(force=True)
              state = snap.state if isinstance(snap.state, dict) else {}
              active = state.get("active_wheels") if isinstance(state.get("active_wheels"), dict) else {}
              item = active.get("zonertg13")
              diagnostic["active_present"] = isinstance(item, dict)
              diagnostic["participating"] = bool(item.get("participating")) if isinstance(item, dict) else False
              diagnostic["active_event_token"] = owner_sync._event_token(item) if isinstance(item, dict) else ""
              diagnostic["pending_success_tokens"] = [token for token, _ in owner_sync.pending_events(state)]
              diagnostic["pending_failure_tokens"] = [
                  token for token, _ in owner_sync.pending_failure_events(state)
              ]
              if isinstance(item, dict):
                  diagnostic["event_key"] = personal_wheel_voting.wheel_event_key("zonertg13", item)

              access, owner_id, owner, owner_chat_id = owner_sync._owner_context(panel)
              diagnostic["owner_present"] = bool(owner_id and isinstance(owner, dict))
              diagnostic["owner_chat_present"] = bool(owner_chat_id)
              diagnostic["completion_before"] = bool(
                  owner_sync._completion_records(owner).get(diagnostic.get("event_key", ""), {}).get("notified_at")
              )

              with contextlib.redirect_stdout(capture), contextlib.redirect_stderr(capture):
                  diagnostic["sync_result"] = owner_sync.sync_once(panel)

              access_after = panel.load_access(force=True)
              users_after = access_after.get("users") if isinstance(access_after.get("users"), dict) else {}
              owner_after = users_after.get(owner_id) if isinstance(users_after.get(owner_id), dict) else {}
              completion = owner_sync._completion_records(owner_after).get(
                  diagnostic.get("event_key", ""), {}
              )
              diagnostic["completion_after"] = bool(
                  isinstance(completion, dict) and completion.get("notified_at")
              )
              diagnostic["completion_fields"] = sorted(completion) if isinstance(completion, dict) else []
          except Exception as exc:
              diagnostic["uncaught_exception"] = {
                  "type": type(exc).__name__,
                  "message": str(exc)[:500],
                  "traceback": traceback.format_exc()[-3000:],
              }
          diagnostic["captured_output"] = capture.getvalue()[-4000:]
          Path("zonertg13_owner_sync_diagnostic.json").write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(diagnostic, ensure_ascii=False, indent=2, sort_keys=True))
          PY

      - name: Persist diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zonertg13_owner_sync_diagnostic.json
          git commit -m "Record zonertg13 owner sync diagnostic [skip ci]" || exit 0
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
