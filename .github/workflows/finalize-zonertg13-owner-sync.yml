name: Finalize zonertg13 owner participation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'finalize-zonertg13-owner-sync' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
      BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
      ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Finalize exact owner outcome
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import auto_participation_owner_sync
          import personal_wheel_voting
          from notification_button_recovery import TelegramPanelRuntimeButtonRecovery

          panel = TelegramPanelRuntimeButtonRecovery()
          result = auto_participation_owner_sync.sync_once(panel)
          print(f"owner sync result: {result}")

          snap = panel.snapshot(force=True)
          item = snap.state.get("active_wheels", {}).get("zonertg13")
          assert isinstance(item, dict), "zonertg13 is absent from active_wheels"
          assert bool(item.get("participating")), "zonertg13 is not BetBoom-confirmed"
          event_key = personal_wheel_voting.wheel_event_key("zonertg13", item)

          access = panel.load_access(force=True)
          owner_id = str(access.get("owner_id") or "")
          owner = access.get("users", {}).get(owner_id, {})
          completed = owner.get("auto_participation_success_events", {})
          record = completed.get(event_key) if isinstance(completed, dict) else None
          assert isinstance(record, dict) and record.get("notified_at"), (
              f"Owner success completion is missing for {event_key}"
          )
          print(
              "zonertg13 owner completion verified: "
              f"event_key={event_key}, notified_at={record.get('notified_at')}, "
              f"original_button_updated={record.get('original_button_updated')}"
          )
          PY

      - name: Remove one-shot workflow and technical branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/finalize-zonertg13-owner-sync.yml
          git commit -m "Удалить одноразовую финализацию zonertg13"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done
          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Личная отметка и уведомление zonertg13 проверены; одноразовый job удалён."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/finalize-zonertg13-owner-sync"
