name: Apply clean xFLARXx commits

on:
  push:
    branches: [feature/xflarxx-clean-integration-v3]
    paths:
      - ".github/workflows/apply-clean-xflarxx-cherry-picks.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout target branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-clean-integration-v3
          fetch-depth: 0
          persist-credentials: true

      - name: Cherry-pick reviewed commits
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin feature/xflarxx-clean-integration
          git cherry-pick \
            10767def15b869e4009a42a456bbd98441e46f8d \
            ae85834d1f7da218cbd21688334819ba9c188455 \
            d8b387e490dc28f2afc63d2a995643412e03287d \
            6850ca52c1a508cc5d4d02b686b414c9d23608d7 \
            7a90cd91a1b4f7b4f49306e2c4f5f36595bd1337 \
            4271dac7fedeabdb78f947061d6b429fbed344dd
          git rm .github/workflows/apply-clean-xflarxx-cherry-picks.yml
          git commit -m "Remove completed xFLARXx cherry-pick workflow [skip ci]"
          git push origin HEAD:feature/xflarxx-clean-integration-v3
