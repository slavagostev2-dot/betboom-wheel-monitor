name: VK token health diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/vk-token-health-diagnostic.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact diagnostic commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Validate VK community token without sending messages
        env:
          VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
          VK_API_VERSION: "5.199"
        run: |
          python - <<'PY'
          import os
          from vk_dynamic_subscribers import conversation_peer_ids

          token = os.getenv("VK_GROUP_TOKEN", "").strip()
          if not token:
              raise SystemExit("VK_GROUP_TOKEN is missing")
          peers = conversation_peer_ids(token)
          print(f"VK token health: writable_user_conversations={len(peers)}")
          if not peers:
              raise SystemExit("VK has no writable user conversations")
          PY
