name: Candidate diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch candidate data
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${HEAD_SHA}/intelligence_state.json" -o /tmp/intelligence_state.json
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${HEAD_SHA}/public_sources.txt" -o /tmp/public_sources.txt
      - name: Print BetBoom-network candidates
        run: |
          python - <<'PY'
          import json, re
          from pathlib import Path
          state=json.loads(Path('/tmp/intelligence_state.json').read_text(encoding='utf-8'))
          known={x.strip().lstrip('@').casefold() for x in Path('/tmp/public_sources.txt').read_text(encoding='utf-8').splitlines() if x.strip() and not x.lstrip().startswith('#')}
          competitors=re.compile(r'(fonbet|betcity|pari|ligastavok|liga_stavok|winline|leon|melbet|xbet|1xbet|olimp|marathon)',re.I)
          betboom_network=re.compile(r'(betboom|blast_betboom|kolesabb|bbteam|ewc_betboom|betboom_baza)',re.I)
          rows=[]
          for key,raw in state.get('candidates',{}).items():
              if not isinstance(raw,dict): continue
              source=str(raw.get('source') or key).strip().lstrip('@')
              if not source or source.casefold() in known or competitors.search(source) or not raw.get('public'): continue
              discovered=[str(x).strip().lstrip('@') for x in raw.get('discovered_from',[]) if str(x).strip()]
              linked=[x for x in discovered if betboom_network.search(x)]
              if not linked: continue
              rows.append((source,int(raw.get('score',0) or 0),int(raw.get('wheel_links_found',0) or 0),','.join(linked)))
          for source,score,wheels,linked in sorted(rows,key=lambda x:(-x[1],-x[2],x[0].casefold())):
              print(f'CANDIDATE @{source} score={score} wheels={wheels} via={linked}')
          print(f'TOTAL={len(rows)}')
          PY
