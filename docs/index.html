<!doctype html>
<html lang="ru" class="light-theme" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#f4f1f8">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="BB V.G. — актуальные колёса, статистика и источники">
  <title>BB V.G.</title>
  <script>try{const raw=JSON.parse(localStorage.getItem('bbvg:settings')||'{}');const light=Number(raw.themeVersion||0)<2||raw.lightTheme!==false;document.documentElement.classList.toggle('light-theme',light);document.documentElement.dataset.theme=light?'light':'dark'}catch{}</script>
  <link rel="manifest" href="manifest.webmanifest?v=5.8.0">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="preload" as="image" href="splash-3d.webp?v=5.8.0" type="image/webp">
  <link rel="stylesheet" href="styles.css?v=5.8.0">
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <script src="runtime-config.js?v=5.8.0"></script>
</head>
<body>
  <div id="splash" class="splash" aria-label="Загрузка BB V.G."><img src="splash-3d.webp?v=5.8.0" alt=""></div>
  <div id="app" class="app-shell" hidden>
    <header class="app-header">
      <button class="header-profile" type="button" data-route="profile" aria-label="Открыть профиль"><img id="headerAvatar" src="icon.svg" alt=""><span><strong id="headerUserName">Пользователь</strong><small id="headerUserMeta">Профиль</small></span></button>
      <div class="header-actions"><button id="themeButton" class="icon-button" type="button" aria-label="Переключить светлую тему" aria-pressed="false"><svg class="theme-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg><svg class="theme-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.4 14.6A8.8 8.8 0 1 1 9.4 3.6a7.2 7.2 0 0 0 11 11Z"/></svg></button><button id="refreshButton" class="icon-button" type="button" aria-label="Обновить данные"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7v5h-5"/><path d="M19.3 12a7.5 7.5 0 1 0-2.2 5.3"/></svg></button></div>
    </header>
    <main class="page-wrap">
      <section id="page-home" class="page active" data-page="home"></section>
      <section id="page-stats" class="page" data-page="stats"></section>
      <section id="page-sources" class="page" data-page="sources"></section>
      <section id="page-profile" class="page" data-page="profile"></section>
    </main>
    <nav class="bottom-nav" aria-label="Навигация приложения">
      <button class="nav-item active" type="button" data-route="home"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 10.5 12 3l8.5 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-4.5v-6h-5v6H5a1.5 1.5 0 0 1-1.5-1.5z"/></svg><span>Главная</span></button>
      <button class="nav-item" type="button" data-route="stats"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V11m7 9V4m7 16v-6M3 20h18"/></svg><span>Статистика</span></button>
      <button class="nav-item" type="button" data-route="sources"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="2"/><path d="M7.8 7.8a6 6 0 0 0 0 8.4m8.4-8.4a6 6 0 0 1 0 8.4M4.3 4.3a11 11 0 0 0 0 15.4m15.4-15.4a11 11 0 0 1 0 15.4"/></svg><span>Источники</span></button>
      <button class="nav-item" type="button" data-route="profile"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4.5 21a7.5 7.5 0 0 1 15 0"/></svg><span>Профиль</span></button>
    </nav>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <dialog id="dialog" class="dialog"><button class="dialog-close" type="button" data-action="close-dialog" aria-label="Закрыть">×</button><div id="dialogBody"></div></dialog>
  <script src="app.js?v=5.8.0"></script>
  <script src="bbvg-controls.js?v=2.5.0"></script>
</body>
</html>
